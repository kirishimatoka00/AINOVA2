        async function uploadAudioRecording() {
            if (audioChunks.length === 0) {
                addMessage(`⚠️ 錄音失敗：未擷取到音訊內容`, 'system');
                appState.recordingContext = 'default'; appState.currentAudioTranscript = "";
                return;
            }

            const actualMimeType = (mediaRecorder && mediaRecorder.mimeType) ? mediaRecorder.mimeType : 'audio/webm';
            const audioBlob = new Blob(audioChunks, { type: actualMimeType });
            
            const dateObj = new Date();
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const day = String(dateObj.getDate()).padStart(2, '0');
            const year = dateObj.getFullYear();
            const timeStr = dateObj.toTimeString().split(' ')[0].replace(/:/g, '');
            
            const filename = `NOVA_Audio_${month}${day}${year}_${timeStr}.weba`; 
            const displayDate = dateObj.toLocaleString();
            const recordId = Date.now();

            const reader = new FileReader();
            reader.readAsDataURL(audioBlob);
            const base64dataWithPrefix = await new Promise((resolve, reject) => { 
                reader.onloadend = () => resolve(reader.result); 
                reader.onerror = reject;
            });

            // 一般錄音存檔處理
            const capturedTranscript = appState.currentAudioTranscript ? appState.currentAudioTranscript.trim() : "";
            
            if (appState.recordingContext === 'note') {
                const newNote = { id: recordId, title: `語音筆記 ${timeStr}`, content: capturedTranscript ? `[即時辨識草稿]\n${capturedTranscript}` : '[無語音內容]', date: displayDate, type: 'audio', driveUrl: "", transcript: capturedTranscript, audioData: base64dataWithPrefix, mimeType: actualMimeType, filename: filename, images: [], image: null, folder: appState.currentNoteFolder === '全部' ? '未分類' : appState.currentNoteFolder };
                appState.notes.unshift(newNote); saveToDB('notes', newNote);
                addMessage(`📝 語音筆記已安全儲存至本地「筆記/文件」分頁。`, 'system'); renderNotes();
            } else {
                const newRecord = { id: recordId, title: `錄音紀錄 ${timeStr}`, date: displayDate, filename: filename, driveUrl: "", transcript: capturedTranscript, audioData: base64dataWithPrefix, mimeType: actualMimeType };
                appState.audioRecords.unshift(newRecord); saveToDB('audioRecords', newRecord);
                addMessage(`📼 錄音已安全儲存至本地「錄音紀錄」分頁。`, 'system'); renderAudioRecords();
            }

            let finalDriveUrl = "";
            if (appState.driveUrl) {
                addMessage(`☁️ 正在與 Google Drive 同步中，請稍候...`, 'system');
                try {
                    const base64data = base64dataWithPrefix.split(',')[1];
                    const payload = JSON.stringify({ filename: filename, mimeType: actualMimeType, data: base64data });
                    
                    const res = await fetch(appState.driveUrl, { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'text/plain' },
                        body: payload 
                    });
                    
                    if (res.ok) {
                        const resText = await res.text();
                        try { 
                            const resJson = JSON.parse(resText); 
                            finalDriveUrl = resJson.url || resJson.link || resText; 
                        } catch(e) { finalDriveUrl = resText; }
                        
                        addMessage(`✅ **雲端同步成功！** 檔案已確實存入 Google Drive。\n連結: ${finalDriveUrl}`, 'system');
                        if(appState.recordingContext === 'note'){ const n = appState.notes.find(x => String(x.id) === String(recordId)); if(n) { n.driveUrl = finalDriveUrl; saveToDB('notes', n); renderNotes(); } } 
                        else { const r = appState.audioRecords.find(x => String(x.id) === String(recordId)); if(r) { r.driveUrl = finalDriveUrl; saveToDB('audioRecords', r); renderAudioRecords(); } }
                    } else {
                        throw new Error('伺服器回傳狀態異常: HTTP ' + res.status);
                    }
                } catch (e) { 
                    if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError')) {
                        finalDriveUrl = "https://drive.google.com/";
                        addMessage(`✅ **雲端同步成功！** \n*(註: 由於瀏覽器安全攔截，無法取得直接連結，但檔案已成功送達您的 Google Drive)*`, 'system');
                        if(appState.recordingContext === 'note'){ const n = appState.notes.find(x => String(x.id) === String(recordId)); if(n) { n.driveUrl = finalDriveUrl; saveToDB('notes', n); renderNotes(); } } 
                        else { const r = appState.audioRecords.find(x => String(x.id) === String(recordId)); if(r) { r.driveUrl = finalDriveUrl; saveToDB('audioRecords', r); renderAudioRecords(); } }
                    } else {
                        addMessage(`❌ **雲端同步失敗**：${e.message}\n請確認您的 Apps Script 權限有設為「所有人」。`, 'system');
                    }
                }
            }

            appState.recordingContext = 'default'; appState.currentAudioTranscript = "";
        }

        async function searchViaSerpApi(query) {
            if (!appState.keys.serpapi) return null;
            const targetUrl = `https://serpapi.com/search.json?q=${encodeURIComponent(query)}&api_key=${appState.keys.serpapi}&engine=google&gl=tw&hl=zh-tw`;
            const proxies = [`https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`, `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`, `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`];
            let serpData = null, lastErrorMsg = "";
            for (const proxy of proxies) {
                try { const controller = new AbortController(); const timeoutId = setTimeout(() => controller.abort(), 10000); const res = await fetch(proxy, { signal: controller.signal }); clearTimeout(timeoutId); if (!res.ok) { lastErrorMsg = `HTTP ${res.status}`; continue; } const data = await res.json(); if (data.error) throw new Error(data.error); serpData = data; break; } 
                catch (err) { lastErrorMsg = err.name === 'AbortError' ? '連線逾時' : err.message; if (err.message.toLowerCase().includes("invalid api key")) throw new Error("SerpApi 金鑰無效"); }
            }
            if (!serpData) throw new Error(`SerpApi 連線皆失敗 (${lastErrorMsg})`);
            let resultText = "【SerpApi 搜尋結果】\n";
            if (serpData.organic_results?.length > 0) { serpData.organic_results.slice(0, 5).forEach((item, i) => resultText += `${i + 1}. [${item.title}](${item.link})\n   ${item.snippet || ''}\n`); } 
            else resultText += "未找到相關結果。";
            return resultText;
        }

        async function checkDeepLinkIntent(text) {
            const key = appState.keys.gemini;
            if(!key) return null;
            
            const systemInstruction = `你是一個手機作業系統的智慧助手。任務是辨識使用者的自然語言指令，轉換為對應的 App 喚醒連結。
常見格式：
- 電話：tel:{電話號碼}
- 簡訊：sms:{電話號碼}?body={URL編碼}
- Email：mailto:{信箱}?subject={URL編碼}&body={URL編碼}
- Line 傳訊/開啟：https://line.me/R/msg/text/?{URL編碼(若無指定內容請填寫"你好")}
- YouTube 搜尋：https://www.youtube.com/results?search_query={URL編碼}
- Facebook：https://www.facebook.com/
- Instagram：https://www.instagram.com/

- 網頁搜尋：https://www.google.com/search?q={URL編碼}
- 台灣高鐵/T-EX行動購票：tex:// 或 https://tex.thsrc.com.tw/
- 蝦皮購物：shopee://tw 或 https://shopee.tw/
- 其他各式 APP (如銀行、訂票、社群)：請盡全力判斷並使用其專屬的 Custom Scheme (例如 appname://)；若不確定 Scheme，請輸出該 APP 的官方 HTTPS 網址 (現代手機會透過 Universal Link 自動攔截)。
注意：所有中文或特殊符號請務必 URL Encoding。只要判斷是開啟 APP，intentFound 就必須為 true。你必須嚴格遵守 JSON 格式。`;

            const schema = {
                type: "OBJECT",
                properties: {
                    intentFound: { type: "BOOLEAN", description: "是否成功辨識為應用程式開啟或系統動作指令" },
                    appName: { type: "STRING", description: "目標應用程式的名稱" },
                    actionDescription: { type: "STRING", description: "即將執行的動作描述" },
                    deepLinkUrl: { type: "STRING", description: "轉換後的跳轉網址(Universal Link 或 Custom Scheme)" },
                    replyMessage: { type: "STRING", description: "給使用者的友善回覆" }
                },
                required: ["intentFound", "appName", "actionDescription", "deepLinkUrl", "replyMessage"]
            };

            const payload = {
                systemInstruction: { parts: [{ text: systemInstruction }] },
                contents: [{ role: "user", parts: [{ text: text }] }],
                generationConfig: { responseMimeType: "application/json", responseSchema: schema, temperature: 0.2 }
            };

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload), signal: controller.signal
                });
                clearTimeout(timeoutId);
                const data = await res.json();
                if(data.candidates && data.candidates[0].content.parts[0].text) {
                    let rawTxt = data.candidates[0].content.parts[0].text;
                    rawTxt = rawTxt.replace(/```json/g, '').replace(/```/g, '').trim(); 
                    return JSON.parse(rawTxt);
                }
                return null;
            } catch (e) {
                clearTimeout(timeoutId);
                console.error("Deep Link 解析失敗", e);
                return null;
            }
        }

        // --- 核心訊息發送與處理邏輯 ---
        async function handleSendMessage() {
            if(appState.isThinking) return;
            
            const input = document.getElementById('user-input'); 
            let text = input.value.trim(); 
            const hasChatFile = appState.chatFile !== null;
            
            if (text.length >= 4 && text.length % 2 === 0) { 
                const mid = text.length / 2; 
                if (text.substring(0, mid) === text.substring(mid)) text = text.substring(0, mid); 
            }
            
            if(!text && !hasChatFile && !appState.isLiveMode) return;

            const cleanCmd = text.replace(/[\s，。、！!]/g, '').toLowerCase();
            if (cleanCmd.includes('結束口譯') || cleanCmd.includes('關閉口譯') || cleanCmd.includes('關閉即時口譯')) { 
                if (appState.translateMode !== 'off') toggleTranslateMode(true); 
                input.value=''; autoResizeInput(input); chatInitialInput=''; return; 
            }
            if (cleanCmd.includes('啟動即時口譯') || cleanCmd.includes('啟動口譯')) { 
                toggleTranslateMode(); 
                input.value=''; autoResizeInput(input); chatInitialInput=''; return; 
            }
            if (cleanCmd.includes('啟動live影像')) { toggleLiveMode(true); input.value=''; autoResizeInput(input); chatInitialInput=''; return; }
            if (cleanCmd.includes('關閉live影像')) { toggleLiveMode(false); input.value=''; autoResizeInput(input); chatInitialInput=''; return; }

            if (text.includes("開始錄音")) { input.value = ''; autoResizeInput(input); chatInitialInput = ''; addMessage(text, 'user'); startAudioRecording(); return; }
            if (text.includes("停止錄音") || text.includes("結束錄音")) { input.value = ''; autoResizeInput(input); chatInitialInput = ''; addMessage(text, 'user'); stopAudioRecording(); return; }

            appState.isThinking = true; 
            updateSendButtonState(true);

            try {
                const actionKeywords = ['打開', '開啟', 'open', '播放', '傳', '發', '發送', '導航', '帶我', '撥打', 'call', '打給', '幫我'];
                const isAction = actionKeywords.some(kw => text.toLowerCase().startsWith(kw));
                const isImageIntent = /^(畫|生成|產生|draw|generate)\s*(一張|一個|圖片|照片|圖|image|photo)/i.test(text.trim());

                            if(n.isHtml) n.content += analysisHtml;
                            else n.content += `\n\n====================\n[🤖 AI 深度分析摘要 (${MODEL_CONFIG[modelToUse]?.name})]\n${finalRes.text||finalRes}`;

                appState.pendingAnalyzeContextId = null; appState.pendingAnalyzeType = "";
            } finally {
                appState.isThinking = false; 
                updateSendButtonState(false); 
                renderThinkingState(false);
            }
        }

        async function fetchAIResponse(userText, model, options = {}) {
            const fetchWithTimeout = async (url, fetchOpts, timeout = 60000) => { 
                const controller = new AbortController(); const id = setTimeout(() => controller.abort(), timeout);
                try { const response = await fetch(url, { ...fetchOpts, signal: controller.signal }); clearTimeout(id); return response; } 
                catch (error) { clearTimeout(id); throw new Error(error.name === 'AbortError' ? '連線逾時，檔案可能過大或處理過久 (60s)' : error.message); }
            };

            try {
                const key = appState.keys[model]; if(!key) throw new Error(`未填寫 ${MODEL_CONFIG[model]?.name || model} API Key`);
                
                let chatHistory = [];
                if (appState.enableContext && appState.translateMode === 'off') {
                    chatHistory = appState.messages.filter(m => m.sender === 'user' || m.sender === 'ai').slice(-4);
                }

                let finalPrompt = userText;
                if (!options.isAnalysis) {
                    if (appState.replyLength === 'short') finalPrompt += "\n【限制：請使用極簡短的篇幅回覆，將字數控制在50字以內。】";
                    else if (appState.replyLength === 'medium') finalPrompt += "\n【限制：請使用中等長度的篇幅回覆，扼要說明重點即可。】";
                }

                const isImageIntent = /^(畫|生成|產生|draw|generate)\s*(一張|一個|圖片|照片|圖|image|photo)/i.test(finalPrompt.trim());

                if(model === 'gemini') {
                    let selectedModelName = appState.geminiModel;
                    let isAutoRouted = false;

                    if (isImageIntent && !selectedModelName.includes('imagen') && !selectedModelName.includes('image')) {
                        selectedModelName = 'imagen-4.0-generate-001'; 
                        isAutoRouted = true;
                    } 
                    else if (selectedModelName === 'gemini-multi') {
                        isAutoRouted = true;
                        selectedModelName = 'gemini-3.0-flash'; 
                        if (finalPrompt.length > 500 || /(深入|詳細|分析|總結|論文|報告|程式碼|複雜|重點摘要|結構化)/.test(finalPrompt) || (options.file && options.file.category === 'media')) {
                            selectedModelName = 'gemini-3.1-pro'; 
                        }
                    }

                    if (selectedModelName.includes('imagen')) {
                        let apiVersion = selectedModelName.includes('4.0') ? 'v1alpha' : 'v1beta';
                        let url = `https://generativelanguage.googleapis.com/${apiVersion}/models/${selectedModelName}:predict?key=${key}`;
                        
                        const payload = { instances: [{ prompt: finalPrompt }], parameters: { sampleCount: 1 } };
                        let res = await fetchWithTimeout(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                        let data = await res.json();
                        
                        if (!res.ok && data.error && data.error.code === 404 && selectedModelName.includes('4.0')) {
                            console.warn("Imagen 4.0 failed, falling back to 3.0");
                            selectedModelName = 'imagen-3.0-generate-001';
                            url = `https://generativelanguage.googleapis.com/v1beta/models/${selectedModelName}:predict?key=${key}`;
                            res = await fetchWithTimeout(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                            data = await res.json();
                            isAutoRouted = true;
                        }

                        if (!res.ok) throw new Error(data.error?.message || '圖像生成失敗，請檢查提示詞或API權限。');
                        
                        if (!data.predictions || data.predictions.length === 0 || !data.predictions[0].bytesBase64Encoded) {
                            throw new Error("無法生成圖片。這通常是因為提示詞 (Prompt) 觸發了 AI 的安全審查機制 (Safety Filter) 而遭到阻擋。請嘗試修改您的描述。");
                        }
                        
                        const base64Image = data.predictions[0].bytesBase64Encoded;
                        const fileObj = { category: 'image', data: `data:image/png;base64,${base64Image}`, name: 'Imagen_Generated.png' };
                        let resTxt = `✨ 圖片生成成功！已為您附在下方。`;
                        if(isAutoRouted) resTxt += `\n\n*(系統提示：已為您動態調配至 **${selectedModelName}** 執行繪圖任務)*`;
                        return { text: resTxt, sources: [], file: fileObj };
                    }

                    let apiVersion = 'v1beta';
                    if (selectedModelName.includes('preview') || selectedModelName.includes('gemini-3') || selectedModelName.includes('thinking') || selectedModelName.includes('research') || selectedModelName.includes('computer')) {
                        apiVersion = 'v1alpha'; 
                    }

                    const allMessages = [...chatHistory, { sender: 'user', text: finalPrompt, file: options.file }];
                    const contents = []; let currentRole = null; let currentParts = [];

                    for (const m of allMessages) {
                        const role = m.sender === 'user' ? 'user' : 'model';
                        let partsToAdd = [];
                        if (m.text) partsToAdd.push({ text: m.text }); 
                        else if (!m.file) partsToAdd.push({ text: "[沒有文字]" });

                        if (m === allMessages[allMessages.length - 1] && m.file && m.file.category !== 'text') {
                             const base64Data = m.file.data.split(',')[1];
                             partsToAdd.push({ inlineData: { mimeType: m.file.mime, data: base64Data } });
                        }
                        if (role === currentRole) currentParts.push(...partsToAdd); 
                        else {
                            if (currentRole) contents.push({ role: currentRole, parts: currentParts });
                            currentRole = role; currentParts = [...partsToAdd];
                        }
                    }
                    if (currentRole) contents.push({ role: currentRole, parts: currentParts });

                    const payload = { contents: contents, generationConfig: { temperature: 0.7, maxOutputTokens: 8192 } };
                    if ((appState.isSearchEnabled || options.enableSearch) && !options.disableSearch && !options.file) { payload.tools = [{ google_search: {} }]; }
                    
                    let endpoint = `https://generativelanguage.googleapis.com/${apiVersion}/models/${selectedModelName}:generateContent?key=${key}`;
                    let res = await fetchWithTimeout(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    let data = await res.json();
                    
                    if (!res.ok && data.error && data.error.code === 404 && (selectedModelName.includes('preview') || selectedModelName.includes('3.'))) {
                        console.warn(`[Auto-Fallback] Model ${selectedModelName} not found, retrying with 2.5 series.`);

                        apiVersion = 'v1beta';

                        res = await fetchWithTimeout(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                        data = await res.json();
                        isAutoRouted = true;
                    }

                    if (!res.ok) throw new Error(`${data.error?.message || res.status}`);

                    const candidate = data.candidates?.[0]; if (!candidate) return "⚠️ API 未回傳內容，請檢查設定。";
                    
                    let outputText = "";
                    let responseImageFile = null;

                    if (candidate.content && candidate.content.parts) {
                        outputText = candidate.content.parts.filter(p => p.text).map(p => p.text).join("");
                        const imgPart = candidate.content.parts.find(p => p.inlineData);
                        if (imgPart) {
                            responseImageFile = {
                                category: 'image',
                                data: `data:${imgPart.inlineData.mimeType};base64,${imgPart.inlineData.data}`,
                                name: 'AI_Generated_Image.png'
                            };
                        }
                    }

                    let sources = []; if (candidate.groundingMetadata?.groundingAttributions) { candidate.groundingMetadata.groundingAttributions.forEach(attr => { if (attr.web?.uri) sources.push({ title: attr.web.title || "參考連結", uri: attr.web.uri }); }); }
                    if (!outputText && !responseImageFile && sources.length > 0) outputText = "已為您搜尋到相關資訊，請參考來源連結。"; 
                    if (isAutoRouted && appState.translateMode === 'off' && !appState.isLiveMode && !options.isAnalysis) { outputText += `\n\n*(系統提示：已為您動態調配至 **${selectedModelName}** 執行此任務)*`; }

                    return { text: outputText || (responseImageFile ? "✨ 圖片生成成功！已為您附在下方。" : "(無回傳文字)"), sources: sources, file: responseImageFile };
                    
                } 
                else if (model === 'groq' || model === 'gpt') {
                    const messagesPayload = chatHistory.map(m => ({ role: m.sender === 'user' ? 'user' : 'assistant', content: m.text || "[附檔]" }));
                    let finalUserContent = finalPrompt;
                    if (options.file && options.file.category === 'image') {
                        const base64Data = options.file.data.split(',')[1];
                        finalUserContent = [ { type: "text", text: finalPrompt }, { type: "image_url", image_url: { url: `data:${options.file.mime};base64,${base64Data}` } } ];
                    }
                    messagesPayload.push({ role: 'user', content: finalUserContent });

                    let ep = '', mName = '';
                    if(model === 'groq') { ep = 'https://api.groq.com/openai/v1/chat/completions'; mName = 'llama-3.3-70b-versatile'; }
                    else { ep = 'https://api.openai.com/v1/chat/completions'; mName = 'gpt-4o-mini'; }

                    const res = await fetchWithTimeout(ep, { method:'POST', headers:{'Content-Type':'application/json', 'Authorization':`Bearer ${key}`}, body: JSON.stringify({model:mName, messages: messagesPayload}) });
                    const resText = await res.text(); let data; try { data = JSON.parse(resText); } catch(e) { throw new Error(`API 異常: ${resText.substring(0, 50)}`); }
                    if (!res.ok) throw new Error(`${data.error?.message || res.status}`); return data.choices?.[0]?.message?.content || "無回應";
                } 
                else if (model === 'cohere') {
                    const chatHistoryPayload = chatHistory.map(m => ({ role: m.sender === 'user' ? 'USER' : 'CHATBOT', message: m.text || "[附檔]" }));
                    const res = await fetchWithTimeout('https://api.cohere.com/v1/chat', { method: 'POST', headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json', 'Accept': 'application/json' }, body: JSON.stringify({ model: 'command-r-plus-08-2024', message: finalPrompt, chat_history: chatHistoryPayload }) });
                    const resText = await res.text(); let data; try { data = JSON.parse(resText); } catch(e) { throw new Error(`API 異常: ${resText.substring(0, 50)}`); }
                    if (!res.ok) throw new Error(`${data.message || res.status}`); return data.text || "無回應";
                } 
                else if (model === 'grok') {
                    const myProxy = 'https://grokcaller.kirishimatoka00.workers.dev/'; 
                    let mName = appState.grokModel || 'grok-multi'; 
                    let isGrokAutoRouted = false;

                    if (isImageIntent && !mName.includes('imagine')) {
                        mName = 'grok-imagine-image-pro';
                        isGrokAutoRouted = true;

                        mName = 'grok-4-1-fast-reasoning';
                        isGrokAutoRouted = true;
                    }

                    let apiUrl, payload;

                    } else {
                        apiUrl = 'https://api.x.ai/v1/chat/completions';
                        const messagesPayload = chatHistory.map(m => ({ role: m.sender === 'user' ? 'user' : 'assistant', content: m.text || "[附檔]" }));
                        let finalUserContent = finalPrompt;
                        if (options.file && options.file.category === 'image') {
                            const base64Data = options.file.data.split(',')[1];
                            finalUserContent = [ { type: "text", text: finalPrompt }, { type: "image_url", image_url: { url: `data:${options.file.mime};base64,${base64Data}` } } ];
                        }
                        messagesPayload.push({role: "user", content: finalUserContent});
                        payload = { model: mName, messages: messagesPayload, temperature: 0.7 };
                    }
                    const fullUrl = `${myProxy}?url=${encodeURIComponent(apiUrl)}`;
                    const res = await fetchWithTimeout(fullUrl, { method: 'POST', headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    const resText = await res.text();
                    if (!res.ok) throw new Error(`${resText}`);
                    const data = JSON.parse(resText);
                    
                    if (mName.includes('imagine')) {

                        if (isGrokAutoRouted) successTxt += `\n\n*(系統提示：Grok Multi 已自動為您調配至 **${mName}** 執行繪圖任務)*`;
                        
                        if (data.data && data.data[0]) {
                            if (data.data[0].b64_json) {
                                return { text: successTxt, sources: [], file: { category: 'image', data: `data:image/png;base64,${data.data[0].b64_json}`, name: 'Grok_Image.png' } };
                            } else if (data.data[0].url) {
                                return { text: successTxt, sources: [], file: { category: 'image', data: data.data[0].url, name: 'Grok_Image.png' } };
                            }
                        }
                        return `生成任務已處理，回傳內容：\n\`\`\`json\n${JSON.stringify(data, null, 2)}\n\`\`\``;
                    }

                    let outputText = data.choices?.[0]?.message?.content || "無回應";
                    if (isGrokAutoRouted && !options.isAnalysis) outputText += `\n\n*(系統提示：Grok Multi 已自動為您調配至 **${mName}** 執行此任務)*`;
                    return outputText;
                }
            } catch(e) { throw e; }
        }

        window.onload = async () => {
            try {
                await initDB();
                appState.messages = (await loadStoreFromDB('messages')).sort((a,b)=>a.id-b.id);
                appState.notes = (await loadStoreFromDB('notes')).sort((a,b)=>b.id-a.id);
                appState.todos = (await loadStoreFromDB('todos')).sort((a,b)=>b.id-a.id);
                appState.audioRecords = (await loadStoreFromDB('audioRecords')).sort((a,b)=>b.id-a.id);

                const migrateLS = (lsKey, storeName, stateArray) => {
                    const oldData = localStorage.getItem(lsKey);
                    if (oldData && stateArray.length === 0) {
                        try {
                            const parsed = JSON.parse(oldData); parsed.forEach(item => saveToDB(storeName, item));
                            stateArray.push(...parsed); localStorage.removeItem(lsKey);
                        } catch(e) {}
                    }
                };
                migrateLS('nova_messages', 'messages', appState.messages);
                migrateLS('nova_notes', 'notes', appState.notes);
                migrateLS('nova_todos', 'todos', appState.todos);
                migrateLS('nova_audio_records', 'audioRecords', appState.audioRecords);
            } catch (err) { console.error("IndexedDB 初始化失敗", err); }

            if(appState.messages.length === 0) {
                const welcomeMsg = { 
                    id: Date.now(), 
                    text: 'NOVA 102 SP 系統升級完畢！\n\n✅ **圖文筆記雲端備份強化**：現在將筆記上傳至 Google Drive 備份時，不再侷限於純文字。系統會自動生成並上傳內含「完整排版與圖片」的豐富圖文網頁檔 (.html)，完美保留所有重點截圖與筆記細節！', 
                    sender: 'ai', model: 'gemini', time: getTime(), sources: [], file: null 
                };
                appState.messages.push(welcomeMsg); saveToDB('messages', welcomeMsg);
            }
            
            renderAll();
            
            const safeSet = (id, val) => { const el = document.getElementById(id); if(el) el.value = val || ''; };
            safeSet('key-gemini', appState.keys.gemini); safeSet('key-groq', appState.keys.groq); safeSet('key-cohere', appState.keys.cohere); safeSet('key-openai', appState.keys.openai); safeSet('key-grok', appState.keys.grok); safeSet('key-serpapi', appState.keys.serpapi); safeSet('key-doc-url', appState.docMonitorUrl); safeSet('key-drive-url', appState.driveUrl);
            safeSet('key-voice-timeout', appState.voiceTimeout);
            safeSet('key-translate-b-timeout', appState.translateBTimeout);
            safeSet('key-vad-multiplier', appState.vadMultiplier);
            
            const rlEl = document.getElementById('key-reply-length'); if (rlEl) rlEl.value = appState.replyLength;
            const trEl = document.getElementById('key-tts-rate'); if (trEl) trEl.value = appState.ttsRate;
            const hideLiveCaptureEl = document.getElementById('key-hide-live-capture');
            if (hideLiveCaptureEl) hideLiveCaptureEl.checked = appState.hideLiveCapture;
            const autoTTSEl = document.getElementById('key-auto-tts');
            if (autoTTSEl) autoTTSEl.checked = appState.autoTTS;
            
            function attachRichPasteHandler(elementId) {
                const el = document.getElementById(elementId);
                if (!el) return;
                el.addEventListener('paste', function(e) {
                    const clipboardData = e.clipboardData || window.clipboardData;
                    if (!clipboardData) return;
                    
                    let plainText = clipboardData.getData('text/plain');
                    let ytMatch = plainText.match(/(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s\n]+)/);
                    if (ytMatch && ytMatch[1]) {
                        e.preventDefault();
                        let embedHtml = `<br><div contenteditable="false" style="margin: 10px 0;"><iframe width="100%" height="315" src="https://www.youtube.com/embed/${ytMatch[1]}" frameborder="0" allowfullscreen style="border-radius: 8px;"></iframe></div><br>`;
                        document.execCommand('insertHTML', false, embedHtml);
                        return;
                    }

                    let hasHtmlOrText = false;
                    for (let i = 0; i < clipboardData.types.length; i++) {
                        if (clipboardData.types[i] === 'text/html' || clipboardData.types[i] === 'text/plain') hasHtmlOrText = true;
                    }

                    if (!hasHtmlOrText) {
                        const items = clipboardData.items;
                        for (let i = 0; i < items.length; i++) {
                            if (items[i].type.indexOf("image") !== -1) {
                                e.preventDefault();
                                const blob = items[i].getAsFile();
                                const reader = new FileReader();
                                reader.onload = function(evt) { document.execCommand('insertImage', false, evt.target.result); };
                                reader.readAsDataURL(blob);
                                return;
                            }
                        }
                    }
                });
            }

            attachRichPasteHandler('edit-note-content');

            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) { 
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition; 
                
                recognition = new SR(); recognition.lang = 'zh-TW'; 
                recognition.continuous = false; 
                recognition.interimResults = true; 
                
                recognition.onend = () => { 
                    if ((appState.isContinuous || (mediaRecorder && mediaRecorder.state === 'recording')) && !appState.isTTSPlaying && !appState.isThinking && appState.translateMode !== 'auto') { 
                        setTimeout(() => { try { recognition.start(); } catch(e){} }, 300); 
                    }
                };
                
                recognition.onerror = (e) => {
                    console.warn("Speech Recognition Error:", e.error);
                };
                
                recognition.onresult = (e) => {
                    if (appState.translateMode === 'auto') return; 
                    if (appState.isTTSPlaying) return;

                    let finalT = "";
                    let interimT = "";
                    let fullSegment = "";
                    
                    for (let i = 0; i < e.results.length; ++i) {
                        fullSegment += e.results[i][0].transcript;
                    }
                    
                    for (let i = e.resultIndex; i < e.results.length; ++i) {
                        let text = e.results[i][0].transcript;
                        if (text.length >= 4 && text.length % 2 === 0) { 
                            const mid = text.length / 2; 
                            if (text.substring(0, mid) === text.substring(mid)) text = text.substring(0, mid); 
                        }
                        if (e.results[i].isFinal) finalT += text;
                        else interimT += text;
                    }
                    
                    let cleanSegment = fullSegment.replace(/[\s，。、！!]/g, '').toLowerCase();
                    if (cleanSegment.includes('結束口譯') || cleanSegment.includes('關閉口譯') || cleanSegment.includes('關閉即時口譯')) {
                        if (appState.translateMode !== 'off') toggleTranslateMode(true);
                        chatInitialInput = ''; 
                        const input = document.getElementById('user-input');
                        if (input) input.value = '';
                        return;
                    }

                    if (cleanSegment.includes('停止語音') || cleanSegment.includes('結束語音')) {
                        if (appState.isContinuous) {
                            toggleContinuous();
                            chatInitialInput = ''; 
                            const input = document.getElementById('user-input');
                            if (input) input.value = '';
                            addMessage("已停止連續語音", 'system');
                            return;
                        }
                    }

                    if (cleanSegment.includes('停止錄音') || cleanSegment.includes('結束錄音')) {
                        if (document.getElementById('recording-status').classList.contains('flex')) {
                            stopAudioRecording();
                            chatInitialInput = ''; 
                            const input = document.getElementById('user-input');
                            if (input) input.value = '';
                            return;
                        }
                    }
                    
                    if (finalT) {
                        chatInitialInput += (chatInitialInput ? " " : "") + finalT;
                    }

                    if (document.getElementById('recording-status').classList.contains('flex')) { 
                        appState.currentAudioTranscript = chatInitialInput + (interimT ? " " + interimT : ""); 
                    }
                    
                    const input = document.getElementById('user-input'); 
                    input.value = (chatInitialInput + (interimT ? " " + interimT : "")).trim(); 
                    autoResizeInput(input);

                    if (document.getElementById('recording-status').classList.contains('hidden')) { 
                        if (voiceTimer) clearTimeout(voiceTimer); 
                        voiceTimer = setTimeout(() => { 
                            if(input.value.trim() !== '' && !appState.isThinking) handleSendMessage(); 
                        }, appState.voiceTimeout * 1000); 
                    }
                };
                
                noteRecognition = new SR(); noteRecognition.lang = 'zh-TW'; 
                noteRecognition.continuous = false; 
                noteRecognition.interimResults = true;
                
                noteRecognition.onstart = () => { updateNoteVoiceUI(); };
                noteRecognition.onend = () => { 
                    if (appState.noteVoiceActive) { 
                        setTimeout(() => { try { noteRecognition.start(); } catch(e){} }, 300); 
                    } else {
                        updateNoteVoiceUI();
                    }
                };
                noteRecognition.onerror = (e) => { console.warn("Note Speech Error:", e.error); };

                noteRecognition.onresult = (e) => {
                    let finalT = "";
                    let interimT = "";
                    for (let i = e.resultIndex; i < e.results.length; ++i) {
                        let text = e.results[i][0].transcript;
                        if (text.length >= 4 && text.length % 2 === 0) { 
                            const mid = text.length / 2; 
                            if (text.substring(0, mid) === text.substring(mid)) text = text.substring(0, mid); 
                        }
                        if (e.results[i].isFinal) finalT += text;
                        else interimT += text;
                    }
                    
                    if (finalT) {
                        noteInitialInput += (noteInitialInput ? "\n" : "") + finalT;
                    }

                    const el = document.getElementById('edit-note-content'); 
                    if(el) el.innerText += (noteInitialInput + (interimT ? "\n" + interimT : "")).trim();
                    
                    if (noteVoiceTimer) clearTimeout(noteVoiceTimer); 
                    noteVoiceTimer = setTimeout(() => { 
                        appState.noteVoiceActive = false; 
                        noteRecognition.stop(); 
                    }, appState.voiceTimeout * 1000);
                };
            }
            tryGetLocation(true); updateModelUI(); 

            const checkReminders = () => {
                const now = Date.now();
                appState.todos.forEach(t => {
                    if (t.alertTime && t.alertEnabled !== false && !t.alerted && t.alertTime <= now && !t.done) {
                        t.alerted = true; saveToDB('todos', t); renderTodos();
                        document.getElementById('alarm-text').innerText = t.text; document.getElementById('alarm-modal').classList.remove('hidden'); document.getElementById('alarm-modal').classList.add('flex');
                        try {
                            alarmAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                            const osc = alarmAudioCtx.createOscillator(); const gain = alarmAudioCtx.createGain();
                            osc.type = 'sine'; osc.frequency.setValueAtTime(880, alarmAudioCtx.currentTime); osc.connect(gain); gain.connect(alarmAudioCtx.destination);
                            osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, alarmAudioCtx.currentTime + 0.5);
                            alarmInterval = setInterval(() => {
                                const osc2 = alarmAudioCtx.createOscillator(); const gain2 = alarmAudioCtx.createGain();
                                osc2.type = 'sine'; osc2.frequency.setValueAtTime(880, alarmAudioCtx.currentTime); osc2.connect(gain2); gain2.connect(alarmAudioCtx.destination);
                                osc2.start(); gain2.gain.exponentialRampToValueAtTime(0.00001, alarmAudioCtx.currentTime + 0.5);
                            }, 1000);
                        } catch(e) {}
                    }
                });
            };
            setInterval(checkReminders, 10000);

            window.stopAlarm = function() {
                document.getElementById('alarm-modal').classList.add('hidden'); document.getElementById('alarm-modal').classList.remove('flex');
                if (alarmInterval) { clearInterval(alarmInterval); alarmInterval = null; }
                if (alarmAudioCtx) { alarmAudioCtx.close(); alarmAudioCtx = null; }
            };
        };
    </script>
</body>
</html>
