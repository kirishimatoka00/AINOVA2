<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <!-- 網頁基本設定：編碼、響應式視口 (防止手機端縮放) -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVA 102 SP</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="icon.png">
    
    <!-- 引入外部庫：Tailwind CSS (樣式框架) 與 Phosphor Icons (圖示庫) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- 引入 Google 字體 Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS 自訂設定檔 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { slate: { 925: '#0f172a' } },
                    animation: { 'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite', 'spin-slow': 'spin 2s linear infinite' }
                }
            }
        }
    </script>
    
    <!-- 自訂 CSS 樣式 -->
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        
        .dot-flashing {
            position: relative; width: 6px; height: 6px; border-radius: 5px; background-color: #9880ff; color: #9880ff;
            animation: dot-flashing 1s infinite linear alternate; animation-delay: 0.5s;
        }
        .dot-flashing::before, .dot-flashing::after {
            content: ""; display: inline-block; position: absolute; top: 0; width: 6px; height: 6px; border-radius: 5px; background-color: #9880ff; color: #9880ff; animation: dot-flashing 1s infinite alternate;
        }
        .dot-flashing::before { left: -10px; animation-delay: 0s; }
        .dot-flashing::after { left: 10px; animation-delay: 1s; }
        @keyframes dot-flashing { 0% { background-color: #9880ff; } 50%, 100% { background-color: rgba(152, 128, 255, 0.2); } }
        
        .msg-content a { color: #60a5fa; text-decoration: underline; word-break: break-all; cursor: pointer; }
        .msg-content p { margin-bottom: 0.5em; line-height: 1.6; }
        .slide-in { animation: slideIn 0.3s ease-out; }
        
        .msg-group:hover .msg-actions { opacity: 1; }
        .msg-actions { opacity: 0; transition: opacity 0.2s; }
        
        @keyframes recordPulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
        .recording-dot { animation: recordPulse 1.5s infinite; }

        #toast {
            visibility: hidden; min-width: 250px; background-color: #334155; color: #fff; text-align: center;
            border-radius: 8px; padding: 12px; position: fixed; z-index: 100; left: 50%; transform: translateX(-50%);
            bottom: 30px; font-size: 14px; opacity: 0; transition: opacity 0.3s, bottom 0.3s; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        }
        #toast.show { visibility: visible; opacity: 1; bottom: 120px; }
        
        audio { outline: none; border-radius: 8px; }
        audio::-webkit-media-controls-panel { background-color: #1e293b; color: #fff; }
        audio::-webkit-media-controls-current-time-display, audio::-webkit-media-controls-time-remaining-display { color: #fff; }

        .note-html-content, .note-html-content * { color: inherit !important; background-color: transparent !important; font-family: inherit !important; }
        .note-html-content img { max-width: 100%; height: auto; border-radius: 0.5rem; margin: 0.5rem 0; background-color: #f8fafc; }
        .note-html-content a { color: #60a5fa !important; text-decoration: underline !important; }
        .note-html-content ul { list-style-type: disc; margin-left: 1.5rem; }
        .note-html-content ol { list-style-type: decimal; margin-left: 1.5rem; }
        .note-html-content iframe { border-radius: 0.5rem; max-width: 100%; }
        [contenteditable]:empty:before { content: attr(placeholder); color: #64748b; pointer-events: none; display: block; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans overflow-hidden selection:bg-blue-500/30">

    <div class="flex h-[100dvh] w-full relative">
        <!-- ================= 左側邊欄 ================= -->
        <aside class="hidden md:flex flex-col w-64 bg-slate-900 border-r border-slate-800 p-6 flex-shrink-0 z-10">
            <div class="flex items-center space-x-3 mb-10 px-2">
                <div class="w-10 h-10 bg-gradient-to-tr from-blue-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i class="ph-bold ph-infinity text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-white tracking-wide">NOVA 102</h1>
                    <p class="text-[10px] text-slate-400 uppercase tracking-wider">SP Edition</p>
                </div>
            </div>
            <nav class="flex-1 space-y-2">
                <button onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-item flex items-center space-x-3 w-full p-4 rounded-xl bg-gradient-to-r from-blue-600 to-blue-700 text-white shadow-lg transition-all"><i class="ph ph-chats-circle text-xl"></i><span class="font-medium">助理對話</span></button>
                <button onclick="switchTab('schedule')" id="nav-schedule" class="nav-item flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all"><i class="ph ph-calendar-check text-xl"></i><span class="font-medium">行程管理</span></button>
                <button onclick="switchTab('notes')" id="nav-notes" class="nav-item flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all"><i class="ph ph-notebook text-xl"></i><span class="font-medium">筆記/文件</span></button>
                <button onclick="switchTab('audio')" id="nav-audio" class="nav-item flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all"><i class="ph ph-waveform text-xl"></i><span class="font-medium">錄音紀錄</span></button>
            </nav>
            <div class="mt-auto space-y-3">
                <button onclick="openSettings()" class="flex items-center space-x-2 text-xs text-slate-500 hover:text-slate-300 w-full px-2"><i class="ph ph-gear"></i><span>設定 & 備份</span></button>
                <div class="bg-slate-800/50 rounded-xl p-4 border border-slate-700/50">
                    <div class="flex items-center space-x-2"><i id="status-icon" class="ph-fill ph-globe text-blue-400 text-lg"></i><span id="status-name" class="font-bold text-sm">Gemini</span></div>
                    <p id="model-version-display" class="text-[10px] text-slate-500 mt-1">Ready</p>
                </div>
            </div>
        </aside>

        <!-- ================= 主要內容顯示區 ================= -->
        <main class="flex-1 flex flex-col relative bg-slate-950 overflow-hidden min-h-0">
            <!-- 手機版頂部導航列 -->
            <div class="md:hidden flex items-center justify-between p-3 bg-slate-900 border-b border-slate-800 z-30 shrink-0">
                <div class="flex items-center space-x-2 shrink-0"><i class="ph-bold ph-infinity text-blue-500 text-xl"></i><span class="font-bold text-white">Nova 102 SP</span></div>
                <div class="flex items-center space-x-3 ml-auto pl-2">
                    <div class="flex items-center space-x-1 bg-slate-800/50 px-2 py-1 rounded-lg border border-slate-700/50 cursor-pointer active:scale-95 transition-transform" onclick="cycleManualLocation()">
                        <i id="mobile-weather-icon" class="ph-fill ph-navigation-arrow text-blue-400"></i><span id="mobile-weather-temp" class="text-xs font-bold text-white whitespace-nowrap">更新</span>
                    </div>
                    <button onclick="openSettings()"><i class="ph ph-gear text-slate-400 text-xl"></i></button>
                    <button onclick="toggleMobileMenu()"><i class="ph ph-list text-white text-2xl"></i></button>
                </div>
            </div>

            <!-- 手機版全螢幕彈出選單 -->
            <div id="mobile-menu" class="hidden md:hidden fixed inset-0 z-40 bg-slate-950/95 pt-20 px-6 backdrop-blur-md">
                <nav class="space-y-4">
                    <button onclick="switchTab('dashboard'); toggleMobileMenu()" class="flex items-center space-x-3 w-full p-4 rounded-xl bg-slate-800 text-white"><i class="ph ph-chats-circle text-xl"></i><span>助理對話</span></button>
                    <button onclick="switchTab('schedule'); toggleMobileMenu()" class="flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800"><i class="ph ph-calendar-check text-xl"></i><span>行程管理</span></button>
                    <button onclick="switchTab('notes'); toggleMobileMenu()" class="flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800"><i class="ph ph-notebook text-xl"></i><span>筆記/文件</span></button>
                    <button onclick="switchTab('audio'); toggleMobileMenu()" class="flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800"><i class="ph ph-waveform text-xl"></i><span>錄音紀錄</span></button>
                </nav>
            </div>

            <!-- ================= 設定彈窗 (Settings Modal) ================= -->
            <div id="settings-modal" class="hidden fixed inset-0 z-50 bg-slate-950/90 backdrop-blur-sm flex items-center justify-center p-4">
                <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-full max-w-md shadow-2xl flex flex-col max-h-[90vh]">
                    <div class="flex justify-between items-center mb-6 shrink-0"><h3 class="text-xl font-bold text-white">設定</h3><button onclick="closeSettings()"><i class="ph ph-x text-2xl text-slate-400"></i></button></div>
                    <div class="space-y-4 overflow-y-auto flex-1 pr-2 scrollbar-thin">
                        
                        <div class="bg-gradient-to-r from-blue-900/30 to-indigo-900/30 p-4 rounded-xl border border-blue-500/50 shadow-inner space-y-4">
                            <div>
                                <label class="block text-xs text-blue-300 mb-2 font-bold flex items-center gap-2"><i class="ph-fill ph-robot"></i> 系統代理 Google Doc URL</label>
                                <input type="text" id="key-doc-url" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-xs focus:border-blue-500 outline-none mb-2" placeholder="Apps Script URL">
                            </div>
                            <div class="border-t border-white/10 pt-2">
                                 <label class="block text-xs text-red-300 mb-1 font-bold"><i class="ph-fill ph-upload"></i> Google Drive 上傳 URL</label>
                                 <input type="text" id="key-drive-url" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-red-500 outline-none" placeholder="(選填) 雲端備份 Apps Script URL">
                            </div>
                        </div>
                        
                        <div class="space-y-3 pt-2 pb-4 border-b border-slate-800">
                            <div><label class="block text-xs text-blue-400 mb-1">Gemini API Key</label><input type="password" id="key-gemini" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-blue-500 outline-none"></div>
                            <div><label class="block text-xs text-green-400 mb-1">SerpApi Key</label><input type="password" id="key-serpapi" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-green-500 outline-none" placeholder="Your SerpApi Key"></div>
                            <div><label class="block text-xs text-rose-400 mb-1">Groq API Key</label><input type="password" id="key-groq" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-rose-500 outline-none"></div>
                            <div><label class="block text-xs text-violet-400 mb-1">Cohere API Key</label><input type="password" id="key-cohere" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-violet-500 outline-none"></div>
                            <div><label class="block text-xs text-emerald-400 mb-1">OpenAI API Key</label><input type="password" id="key-openai" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-emerald-500 outline-none"></div>
                            <div><label class="block text-xs text-slate-300 mb-1">Grok API Key</label><input type="password" id="key-grok" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-slate-500 outline-none"></div>
                            
                            <!-- 進階選項設定 -->
                            <div class="border-t border-slate-700 pt-3 mt-2 grid grid-cols-2 gap-2">
                                <div>
                                    <label class="block text-xs text-amber-400 mb-1 font-bold"><i class="ph-fill ph-timer"></i> 連續語音等待 (秒)</label>
                                    <input type="number" id="key-voice-timeout" min="1" max="60" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-amber-500 outline-none text-slate-300" placeholder="預設: 5">
                                </div>
                                <div>
                                    <label class="block text-xs text-purple-400 mb-1 font-bold"><i class="ph-fill ph-text-align-justify"></i> AI 回覆長度</label>
                                    <select id="key-reply-length" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-purple-500 outline-none text-slate-300">
                                        <option value="medium">中等 (適中)</option>
                                        <option value="short">極簡短 (約50字)</option>
                                        <option value="unlimited">不限長度 (完整)</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="border-t border-slate-700 pt-3 mt-2 grid grid-cols-2 gap-2">
                                <div class="col-span-2">
                                    <label class="block text-xs text-teal-400 mb-1 font-bold"><i class="ph-fill ph-microphone-stage"></i> 語音聲音選擇 (系統可用音軌)</label>
                                    <select id="key-tts-voice" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-teal-500 outline-none text-slate-300">
                                        <option value="">(系統智慧預設)</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-xs text-teal-400 mb-1 font-bold"><i class="ph-fill ph-speaker-high"></i> 語音速度</label>
                                    <select id="key-tts-rate" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-teal-500 outline-none text-slate-300">
                                        <option value="0.8">慢速 (0.8x)</option>
                                        <option value="1.0">正常 (1.0x)</option>
                                        <option value="1.2">快速 (1.2x)</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-xs text-amber-400 mb-1 font-bold"><i class="ph-fill ph-timer"></i> 口譯語音擷取等待 (秒)</label>
                                    <input type="number" id="key-translate-b-timeout" min="1" max="10" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-amber-500 outline-none text-slate-300" placeholder="預設: 2">
                                </div>
                                <div class="col-span-2 mt-1">
                                    <label class="block text-xs text-amber-400 mb-1 font-bold"><i class="ph-fill ph-waveform"></i> 口譯動態觸發門檻 (基底噪音的倍數)</label>
                                    <input type="number" id="key-vad-multiplier" min="1.1" max="10.0" step="0.1" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-amber-500 outline-none text-slate-300" placeholder="預設: 2.0 (設定收音音量必須大於環境背景底噪的幾倍)" title="系統會在啟動時自動採樣底噪，此倍數越大越不易誤觸發">
                                </div>
                            </div>

                            <div class="flex flex-col gap-3 border-t border-slate-700 pt-3 mt-2">
                                <div class="flex items-center justify-between">
                                    <div>
                                        <label class="block text-xs text-purple-400 font-bold flex items-center gap-1"><i class="ph-fill ph-speaker-high"></i> 自動播放 AI 語音</label>
                                        <p class="text-[10px] text-slate-500 mt-1">開啟時，連續語音或口譯的回覆會自動朗讀。</p>
                                    </div>
                                    <label class="relative inline-flex items-center cursor-pointer ml-3 shrink-0">
                                        <input type="checkbox" id="key-auto-tts" class="sr-only peer">
                                        <div class="w-9 h-5 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-purple-500"></div>
                                    </label>
                                </div>
                                <div class="flex items-center justify-between">
                                    <div>
                                        <label class="block text-xs text-emerald-400 font-bold flex items-center gap-1"><i class="ph-fill ph-eye-slash"></i> 隱藏 LIVE 自動截圖訊息</label>
                                        <p class="text-[10px] text-slate-500 mt-1">開啟後，聊天室不顯示自動傳送的相片畫面。</p>
                                    </div>
                                    <label class="relative inline-flex items-center cursor-pointer ml-3 shrink-0">
                                        <input type="checkbox" id="key-hide-live-capture" class="sr-only peer">
                                        <div class="w-9 h-5 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-emerald-500"></div>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- 備份與還原按鈕 -->
                    <div class="mt-4 pt-2 flex justify-between items-center shrink-0">
                        <div class="flex space-x-2">
                            <button onclick="exportSettings()" class="flex items-center gap-1 text-[11px] text-blue-400 bg-blue-900/30 border border-blue-500/30 px-3 py-2 rounded-lg hover:bg-blue-800/50 transition-colors"><i class="ph-bold ph-download-simple"></i> 完整備份</button>
                            <label for="import-settings-input" class="flex items-center gap-1 text-[11px] text-emerald-400 bg-emerald-900/30 border border-emerald-500/30 px-3 py-2 rounded-lg hover:bg-emerald-800/50 transition-colors cursor-pointer"><i class="ph-bold ph-upload-simple"></i> 還原備份</label>
                            <input type="file" id="import-settings-input" accept=".json" class="hidden" onchange="importSettings(event)">
                        </div>
                        <div class="flex space-x-3"><button onclick="closeSettings()" class="px-4 py-2 text-slate-400 text-sm">取消</button><button onclick="saveKeys()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-500">儲存</button></div>
                    </div>
                </div>
            </div>

            <!-- ================= 資料夾管理彈窗 (Folder Manage Modal) ================= -->
            <div id="folder-manage-modal" class="hidden fixed inset-0 z-[70] bg-slate-950/90 backdrop-blur-sm flex items-center justify-center p-4">
                <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-full max-w-sm shadow-2xl flex-col max-h-[80vh]">
                    <div class="flex justify-between items-center mb-6 shrink-0"><h3 class="text-xl font-bold text-white"><i class="ph-bold ph-folder-open text-emerald-400 mr-2"></i>管理資料夾</h3><button onclick="closeFolderManage()"><i class="ph ph-x text-2xl text-slate-400"></i></button></div>
                    <div id="folder-manage-list" class="space-y-2 overflow-y-auto mb-4 flex-1">
                        <!-- JS Dynamic -->
                    </div>
                    <button onclick="addNewFolder()" class="w-full bg-slate-800 hover:bg-slate-700 text-emerald-400 border border-slate-600 p-3 rounded-xl transition-colors font-bold flex justify-center items-center gap-2">
                        <i class="ph-bold ph-plus"></i> 新增資料夾
                    </button>
                </div>
            </div>

            <!-- ================= 鬧鐘提醒彈窗 (Alarm Modal) ================= -->
            <div id="alarm-modal" class="hidden fixed inset-0 z-[60] bg-slate-950/90 backdrop-blur-md flex flex-col items-center justify-center p-6">
                <div class="bg-slate-900 border border-red-500/50 rounded-2xl p-8 max-w-sm w-full text-center shadow-[0_0_50px_rgba(239,68,68,0.3)] animate-pulse">
                    <i class="ph-fill ph-alarm text-6xl text-red-500 mb-4 inline-block animate-bounce"></i>
                    <h3 class="text-2xl font-bold text-white mb-2">時間到！</h3>
                    <p id="alarm-text" class="text-lg text-slate-300 mb-8">提醒事項內容</p>
                    <button onclick="stopAlarm()" class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-4 rounded-xl text-xl shadow-lg transition-transform active:scale-95">
                        <i class="ph-bold ph-check-circle mr-2"></i> 確 定 (停止)
                    </button>
                </div>
            </div>

            <!-- ================= 待辦事項時間選擇彈窗 ================= -->
            <div id="todo-time-modal" class="hidden fixed inset-0 z-[70] bg-slate-950/90 backdrop-blur-sm flex items-center justify-center p-4">
                <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-full max-w-sm shadow-2xl flex-col">
                    <h3 class="text-lg font-bold text-white mb-4 flex items-center gap-2"><i class="ph-bold ph-bell text-yellow-500"></i> 設定提醒時間</h3>
                    <input type="hidden" id="picker-todo-id">
                    <input type="datetime-local" id="todo-native-picker" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-sm text-white focus:border-blue-500 outline-none mb-6 shadow-inner" style="color-scheme: dark;">
                    <div class="flex justify-between items-center mt-2">
                        <button onclick="clearTodoAlarm()" class="px-3 py-2 text-red-400 hover:bg-red-900/30 rounded-lg transition-colors text-sm flex items-center gap-1"><i class="ph-bold ph-bell-slash"></i> 關閉提醒</button>
                        <div class="flex space-x-2">
                            <button onclick="closeTodoPicker()" class="px-4 py-2 text-slate-400 hover:text-white transition-colors text-sm">取消</button>
                            <button onclick="saveTodoPicker()" class="px-5 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg transition-colors text-sm font-bold">儲存</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ================= 儀表板/聊天介面 (Dashboard View) ================= -->

        // --- IndexedDB 資料庫初始化與操作 ---
        const DB_NAME = 'NovaDB'; const DB_VERSION = 2; let db;

        function initDB() {
            return new Promise((resolve, reject) => {
                if (!window.indexedDB) { console.warn("瀏覽器不支援 IndexedDB"); resolve(null); return; }
                const req = indexedDB.open(DB_NAME, DB_VERSION);
                req.onupgradeneeded = (e) => {
                    db = e.target.result;
                    if (!db.objectStoreNames.contains('messages')) db.createObjectStore('messages', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('notes')) db.createObjectStore('notes', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('todos')) db.createObjectStore('todos', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('audioRecords')) db.createObjectStore('audioRecords', { keyPath: 'id' });
                };
                req.onsuccess = (e) => { db = e.target.result; resolve(db); };
                req.onerror = (e) => reject(e.target.error);
            });
        }
        function loadStoreFromDB(storeName) { return new Promise((resolve) => { if (!db) return resolve([]); try { const tx = db.transaction(storeName, 'readonly'); const req = tx.objectStore(storeName).getAll(); req.onsuccess = () => resolve(req.result || []); req.onerror = () => resolve([]); } catch(e) { resolve([]); } }); }
        function saveToDB(storeName, item) { if (!db) return; try { db.transaction(storeName, 'readwrite').objectStore(storeName).put(item); } catch(e) {} }
        function deleteFromDB(storeName, id) { 
            if (!db) return; 
            try { 
                const tx = db.transaction(storeName, 'readwrite');
                const store = tx.objectStore(storeName);
                store.delete(id); 
                if (typeof id === 'string' && !isNaN(Number(id))) store.delete(Number(id)); 
            } catch(e) { console.warn("Delete DB Error:", e); } 
        }
        function clearStoreDB(storeName) { if (!db) return; try { db.transaction(storeName, 'readwrite').objectStore(storeName).clear(); } catch(e) {} }

        function formatMessage(text) { 
            if (!text) return ''; 
            let images = [];
            let tempText = text.replace(/!\[(.*?)\]\((https?:\/\/[^\s<]+)\)/g, function(match, alt, url) {
                images.push({alt: alt, url: url}); return `___IMG_${images.length - 1}___`;
            });
            let safe = tempText.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            safe = safe.replace(/\*\*(.*?)\*\*/g, '<strong class="text-white font-bold">$1</strong>'); 
            safe = safe.replace(/\[([^\]]+)\]\((https?:\/\/[^\s<]+?)\)|(https?:\/\/[^\s<)\]]+)/g, function(match, mdTitle, mdUrl, rawUrl) {
                let url = mdUrl || rawUrl; url = url.replace(/&amp;/g, "&"); let title = mdTitle || url;
                return `<a href="${url}" target="_blank" class="text-blue-400 underline break-all">${title}</a>`;
            });
            safe = safe.replace(/___IMG_(\d+)___/g, function(match, id) {
                const img = images[id]; const realUrl = img.url.replace(/&amp;/g, "&");
                return `<div class="mt-3 relative group max-w-sm w-full"><img src="${realUrl}" alt="${escapeHtml(img.alt)}" class="rounded-lg border border-slate-700/50 shadow-sm w-full object-contain bg-slate-900"><a href="${realUrl}" target="_blank" download="image.png" class="absolute top-2 right-2 bg-blue-600/90 hover:bg-blue-500 text-white p-2 rounded-lg text-xs opacity-0 group-hover:opacity-100 transition-opacity backdrop-blur-md" title="開啟或下載原圖"><i class="ph-bold ph-download-simple"></i> 下載</a></div>`;
            });
            return safe.replace(/\n/g, '<br>'); 
        }

        async function getCityName(lat, lon) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10&addressdetails=1`);
                if(!res.ok) return "目前位置";
                const data = await res.json();
                return data.address.city || data.address.town || data.address.county || data.address.state || "目前位置";
            } catch(e) {
                return "目前位置";
            }
        }

        function tryGetLocation(isInit = false) {
            if (navigator.geolocation && appState.manualLocIndex === 0) {
                navigator.geolocation.getCurrentPosition(
                    async (pos) => { 
                        const lat = pos.coords.latitude;
                        const lon = pos.coords.longitude;
                        appState.weather.loc = "定位中...";
                        renderWeather();
                        const cityName = await getCityName(lat, lon);
                        appState.weather.loc = cityName;
                        fetchWeather(lat, lon);
                    },
                    (err) => { 
                        console.warn("Location error:", err); 
                        appState.weather.loc = appState.manualLocs[0].name;
                        fetchWeather(appState.manualLocs[0].lat, appState.manualLocs[0].lon);
                        appState.manualLocIndex = 1;
                    },
                    { timeout: 10000 }
                );
            } else if (isInit) {
                cycleManualLocation();
            }
        }

        window.cycleManualLocation = function() {
            appState.manualLocIndex = (appState.manualLocIndex + 1) % (appState.manualLocs.length + 1);
            if (appState.manualLocIndex === 0) {
                tryGetLocation();
            } else {
                const loc = appState.manualLocs[appState.manualLocIndex - 1];
                appState.weather.loc = loc.name;
                fetchWeather(loc.lat, loc.lon);
            }
        };

        async function fetchWeather(lat, lon) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const data = await res.json();
                if(data.current_weather) {
                    appState.weather.temp = Math.round(data.current_weather.temperature);
                    const code = data.current_weather.weathercode;
                    if(code <= 3) appState.weather.condition = 'sunny';
                    else if(code <= 60) appState.weather.condition = 'cloudy';
                    else appState.weather.condition = 'rainy';
                    renderWeather();
                }
            } catch(e) { console.warn("Weather API error", e); }
        }

        window.parseTimeNatural = function(text) {
            const now = new Date(); let target = new Date(now); let complete = false; let missing = null;
            let hasDate = false, hasTime = false, hasAmPm = false;
            if(text.includes('今天')) hasDate = true;
            else if(text.includes('明天')) { target.setDate(target.getDate() + 1); hasDate = true; }
            else if(text.includes('後天')) { target.setDate(target.getDate() + 2); hasDate = true; }
            if(text.includes('上午') || text.includes('早上')) hasAmPm = true;
            if(text.includes('下午') || text.includes('晚上')) { hasAmPm = true; target.setHours(target.getHours() >= 12 ? target.getHours() : target.getHours() + 12); }
            const timeMatch = text.match(/(\d+)(?:點|時)(?:(\d+)(?:分)?)?/);
            if(timeMatch) {
                hasTime = true; let h = parseInt(timeMatch[1]); const m = timeMatch[2] ? parseInt(timeMatch[2]) : 0;
                if(text.includes('下午') || text.includes('晚上') && h < 12) h += 12;
                target.setHours(h, m, 0, 0);
            }
            if(text.includes('半小時後')) { target = new Date(now.getTime() + 30*60000); complete = true; }
            else if(text.includes('1小時後') || text.includes('一小時後')) { target = new Date(now.getTime() + 60*60000); complete = true; }
            else if(hasDate && hasTime && hasAmPm) complete = true;
            else if(hasDate && hasTime && !hasAmPm) missing = 'ampm';
            else if(!hasDate && hasTime) missing = 'date';
            else if(hasDate && !hasTime) missing = 'time';
            return { complete, timestamp: target.getTime(), missing };
        };

        window.backupNoteToDrive = async function(id) {
            const n = appState.notes.find(x => String(x.id) === String(id)); if(!n) return;
            if(!appState.driveUrl) { alert("請先在「設定」中填寫 Google Drive 備份 URL (Apps Script)"); return; }
            
            const btn = document.getElementById('btn-backup-' + id);
            if(btn) { btn.innerHTML = '<i class="ph-bold ph-spinner animate-spin"></i> 備份中...'; btn.disabled = true; }
            
            try {
                let payloadObj = {};
                if (n.type === 'audio' && n.audioData) {
                    const base64data = n.audioData.split(',')[1];
                    payloadObj = { filename: n.filename || `NOVA_VoiceNote_${n.id}.weba`, mimeType: n.mimeType || 'audio/webm', data: base64data };
                } else {
                    let htmlContent = `<!DOCTYPE html><html><head><meta charset='utf-8'><title>${n.title}</title></head><body style="font-family: sans-serif; padding: 20px;"><h1>${n.title}</h1><p style="color: gray;">${n.date}</p><hr><div style="line-height: 1.6;">${n.isHtml ? n.content : n.content.replace(/\n/g, '<br>')}</div>`;
                    const displayImages = n.images || (n.image ? [n.image] : []);
                    if (displayImages.length > 0) {
                        htmlContent += `<div style="margin-top: 20px;">`;
                        displayImages.forEach(img => {
                            htmlContent += `<img src="${img}" style="max-width: 100%; border-radius: 8px; margin-top: 10px;"><br>`;
                        });
                        htmlContent += `</div>`;
                    }
                    htmlContent += `</body></html>`;
                    
                    const base64Text = btoa(unescape(encodeURIComponent(htmlContent)));
                    payloadObj = { filename: `${n.title}.html`, mimeType: 'text/html', data: base64Text };
                }
                
                const payload = JSON.stringify(payloadObj);
                const res = await fetch(appState.driveUrl, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: payload });
                
                if(!res.ok) throw new Error("Server error");
                const resText = await res.text();
                let finalUrl = resText; try { const j = JSON.parse(resText); finalUrl = j.url || j.link || resText; } catch(e){}
                n.driveUrl = finalUrl; saveToDB('notes', n); renderNotes(); showToast("✅ 筆記已成功備份至 Google Drive");
                if(btn) { btn.innerHTML = '<i class="ph-bold ph-cloud-arrow-up"></i> 雲端備份'; btn.disabled = false; }
            } catch(e) {
                if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError')) {
                    n.driveUrl = "https://drive.google.com/"; saveToDB('notes', n); renderNotes(); showToast("✅ 筆記已成功備份至 Google Drive");
                } else {
                    alert("備份失敗：" + e.message);
                }
                if(btn) { btn.innerHTML = '<i class="ph-bold ph-cloud-arrow-up"></i> 雲端備份'; btn.disabled = false; }
            }
        };

        function speakText(text, force = false, msgId = null) {
            const shouldAutoPlay = appState.isLiveMode || appState.translateMode !== 'off' || appState.isContinuous;
            
            const continueLoop = () => {
                if (appState.translateMode === 'auto') {
                    // 安全鎖：不斷輪詢確認系統語音已經完全停止，才敢重啟麥克風
                    const checkAndStart = () => {
                        if (window.speechSynthesis.speaking) {
                            setTimeout(checkAndStart, 500);
                        } else {
                            setTimeout(() => { startTranslateBAutoRecord(); }, 1000); // 確認無聲後再給1秒冷卻，防止喇叭硬體殘響
                        }
                    };
                    checkAndStart();
                } else if (appState.isContinuous || appState.isLiveMode) {
                    setTimeout(() => { 
                        if(!appState.isThinking) {
                            try { recognition.start(); } catch(e){} 
                        }
                    }, 500);
                }
            };

            // 【NOVA 101 SP】防呆鎖：如果在全自動翻譯模式的第一次收音前，強制忽略所有語音播報
            if (!force && appState.translateMode === 'auto' && appState.translateMuteUntilFirstCapture) {
                continueLoop();
                return;
            }

            if (!shouldAutoPlay && !force) return; 

            if (!text || text.trim() === "") {
                continueLoop();
                return;
            }

            // 若設定不自動播放，則直接跳過朗讀並進入下一個聆聽循環
            if (!force && !appState.autoTTS) {
                continueLoop();
                return;
            }

            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                appState.playingMsgId = msgId;
                
                let cleanText = text.replace(/[*_#`\[\]]/g, '').replace(/(https?:\/\/[^\s]+)/g, "網址連結");
                cleanText = cleanText.replace(/\(?系統提示：[^\)]+\)?/g, '').trim();
                cleanText = cleanText.replace(/✨ 圖片生成成功！已為您附在下方。/g, '為您生成圖片如下');
                
                let utterance = new SpeechSynthesisUtterance(cleanText);
                
                let lang = 'en-US'; 
                let testChunk = cleanText.substring(0, 150);
                
                if (/[\u3040-\u309F\u30A0-\u30FF]/.test(testChunk)) {
                    lang = 'ja-JP';
                } else if (/[\uAC00-\uD7AF]/.test(testChunk)) {
                    lang = 'ko-KR';
                } else if (/[\u4E00-\u9FFF]/.test(testChunk)) {
                    lang = 'zh-TW';
                }
                
                utterance.lang = lang;
                
                let voices = window.speechSynthesis.getVoices();
                if (appState.ttsVoice) {
                    let preferred = voices.find(v => v.name === appState.ttsVoice && v.lang.startsWith(lang.substring(0,2)));
                    if (preferred) utterance.voice = preferred;
                }
                if (!utterance.voice) {
                    let defaultVoice = voices.find(v => v.lang === lang || v.lang.startsWith(lang.substring(0,2)));
                    if (defaultVoice) utterance.voice = defaultVoice;
                }
                utterance.rate = parseFloat(appState.ttsRate) || 1.0;
                
                utterance.onstart = () => {
                    appState.isTTSPlaying = true;
                };
                
                utterance.onend = () => {
                    appState.isTTSPlaying = false;
                    appState.playingMsgId = null;
                    renderMessages();
                    continueLoop();
                };

                utterance.onerror = () => {
                    appState.isTTSPlaying = false;
                    appState.playingMsgId = null;
                    renderMessages();
                    continueLoop();
                };

                window.speechSynthesis.speak(utterance);
                renderMessages();
            } else if (force) {
                showToast("❌ 您的瀏覽器不支援語音朗讀功能");
            }
        }

        function base64ToBlob(base64URI) {
            const splitIndex = base64URI.indexOf(',');
            const mimeStr = base64URI.slice(5, splitIndex).split(';')[0];
            const byteString = atob(base64URI.slice(splitIndex + 1));
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) {
                ia[i] = byteString.charCodeAt(i);
            }
            return new Blob([ab], { type: mimeStr });
        }

        window.downloadLocalAudio = function(id, type) {
            let record = type === 'record' ? appState.audioRecords.find(x => String(x.id) === String(id)) : appState.notes.find(x => String(x.id) === String(id));
            if (!record || !record.audioData) { alert("找不到本地音檔資料"); return; }
            
            const dateObj = new Date(Number(id));
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const day = String(dateObj.getDate()).padStart(2, '0');
            const year = dateObj.getFullYear();
            const timeStr = dateObj.toTimeString().split(' ')[0].replace(/:/g, '');
            const finalFilename = `NOVA_Audio_${month}${day}${year}_${timeStr}.weba`;

            try {
                const blob = base64ToBlob(record.audioData);
                const blobUrl = URL.createObjectURL(blob);

                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = blobUrl;
                a.download = finalFilename;
                document.body.appendChild(a);
                a.click();
                
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(blobUrl);
                }, 2000);
                
                showToast(`✅ 已開始下載：${finalFilename}`);
            } catch(e) {
                alert("下載失敗：" + e.message);
            }
        };

            appState.currentNoteFolder = f;
            renderFolderTabs();

            renderFolderManageList();

            document.getElementById('folder-manage-modal').classList.add('hidden');
        }

        window.renderFolderManageList = function() {
            let container = document.getElementById('folder-manage-list');
            container.innerHTML = appState.noteFolders.map((f) => {
                if (f === '未分類' || f === '工作' || f === '生活') {

                    </div>
                </div>`;
            }).join('');
        }

        window.addNewFolder = function() {
            const fName = prompt("請輸入新資料夾名稱：");
            if (fName && fName.trim() && !appState.noteFolders.includes(fName.trim())) {
                appState.noteFolders.push(fName.trim());
                saveFolders();
                renderFolderManageList();
                renderFolderTabs();
                showToast(`📂 已新增資料夾：${fName.trim()}`);
            }
        }

        window.renameFolder = function(oldName) {
            const fName = prompt(`將「${oldName}」重新命名為：`, oldName);
            if (fName && fName.trim() && fName.trim() !== oldName && !appState.noteFolders.includes(fName.trim())) {
                let newName = fName.trim();
                let idx = appState.noteFolders.indexOf(oldName);
                if (idx !== -1) appState.noteFolders[idx] = newName;
                
                appState.notes.forEach(n => {
                    if (n.folder === oldName) { n.folder = newName; saveToDB('notes', n); }
                });
                
                if (appState.currentNoteFolder === oldName) appState.currentNoteFolder = newName;
                
                saveFolders();
                renderFolderManageList();
                renderFolderTabs();
                renderNotes();
                showToast(`📂 資料夾已重新命名為：${newName}`);
            }
        }

        window.deleteFolder = function(fName) {
            if (confirm(`確定要刪除資料夾「${fName}」嗎？\n(此資料夾內的筆記不會被刪除，而是會被移至「未分類」)`)) {
                appState.noteFolders = appState.noteFolders.filter(f => f !== fName);
                appState.notes.forEach(n => {
                    if (n.folder === fName) { n.folder = '未分類'; saveToDB('notes', n); }
                });
                if (appState.currentNoteFolder === fName) appState.currentNoteFolder = '全部';
                
                saveFolders();
                renderFolderManageList();
                renderFolderTabs();
                renderNotes();
                showToast(`🗑️ 資料夾已刪除`);
            }
        }

        function saveFolders() {
            localStorage.setItem('nova_folders', JSON.stringify(appState.noteFolders));
        }

        function renderNotes() { 
            const el = document.getElementById('full-note-list'); const mini = document.getElementById('mini-note-list');
            const searchInput = document.getElementById('note-search-input');
            const keyword = searchInput ? searchInput.value.toLowerCase() : '';

            let filteredNotes = appState.notes;
            if (appState.currentNoteFolder !== '全部') {
                filteredNotes = filteredNotes.filter(n => (n.folder || '未分類') === appState.currentNoteFolder);
            }
            if (keyword) {
                filteredNotes = filteredNotes.filter(n => {
                    const titleMatch = (n.title || '').toLowerCase().includes(keyword);
                    const contentMatch = (n.content || '').toLowerCase().includes(keyword);
                    return titleMatch || contentMatch;
                });
            }

            if(el) el.innerHTML = filteredNotes.map(n => {
                const isAudio = n.type === 'audio'; const icon = isAudio ? '<i class="ph-fill ph-microphone text-purple-400"></i>' : '<i class="ph-fill ph-notebook text-emerald-400"></i>';
                const folderBadge = `<span class="absolute top-3 right-3 text-[9px] bg-slate-800 text-slate-400 px-2 py-0.5 rounded border border-slate-700">${escapeHtml(n.folder || '未分類')}</span>`;
                
                let actionButtons = `<button onclick="exportNoteWord('${n.id}')" class="text-xs bg-slate-800 hover:bg-slate-700 px-2 py-1.5 rounded text-slate-300 transition-colors border border-slate-700 flex items-center gap-1" title="匯出為 Word"><i class="ph-bold ph-file-doc"></i> Word</button>`;
                actionButtons += `<button onclick="exportNoteRichText('${n.id}')" class="text-xs bg-slate-800 hover:bg-slate-700 px-2 py-1.5 rounded text-slate-300 transition-colors border border-slate-700 flex items-center gap-1" title="匯出為 HTML"><i class="ph-bold ph-file-html"></i> RichText</button>`;
                actionButtons += `<button id="btn-backup-${n.id}" onclick="backupNoteToDrive('${n.id}')" class="text-xs bg-blue-900/50 hover:bg-blue-800/50 border border-blue-500/50 px-2 py-1.5 rounded text-blue-200 transition-colors flex items-center gap-1"><i class="ph-bold ph-cloud-arrow-up"></i> 雲端備份</button>`;
                actionButtons += `<button onclick="openNoteEdit('${n.id}')" class="text-xs bg-emerald-900/50 hover:bg-emerald-800/50 border border-emerald-500/50 px-3 py-1.5 rounded text-emerald-200 transition-colors flex items-center gap-1 font-bold ml-auto"><i class="ph-bold ph-corners-out"></i> 檢視與編輯</button>`;

                let extraAudioButtons = '';
                if(isAudio) {
                    extraAudioButtons += `<button onclick="downloadLocalAudio('${n.id}', 'note')" class="text-xs bg-slate-800 hover:bg-slate-700 px-2 py-1.5 rounded text-slate-300 transition-colors border border-slate-700 flex items-center gap-1"><i class="ph-bold ph-download-simple"></i> 下載 .weba</button>`;
                    extraAudioButtons += `<button onclick="summarizeVoiceNote('${n.id}')" class="text-xs bg-purple-900/50 border border-purple-500/50 hover:bg-purple-800/50 px-2 py-1.5 rounded text-purple-200 transition-colors flex items-center gap-1"><i class="ph-bold ph-sparkle"></i> AI 分析</button>`;
                } else {
                    extraAudioButtons += `<button onclick="summarizeTextNote('${n.id}')" class="text-xs bg-purple-900/50 border border-purple-500/50 hover:bg-purple-800/50 px-2 py-1.5 rounded text-purple-200 transition-colors flex items-center gap-1"><i class="ph-bold ph-sparkle"></i> AI 分析</button>`;
                }
                
                let imgHtml = '';
                const displayImages = n.images || (n.image ? [n.image] : []);
                if (displayImages.length > 0) {
                    imgHtml = `<div class="mt-2 mb-2 flex flex-wrap gap-2">` + displayImages.map(img => `<img src="${img}" class="max-h-24 rounded border border-slate-700/50 object-cover">`).join('') + `</div>`;
                }

                let audioPlayerHtml = n.audioData ? `<div class="mt-3 mb-2"><audio controls src="${n.audioData}" class="w-full h-10 rounded-lg bg-slate-800 shadow-inner"></audio></div>` : '';
                let linkHtml = (n.driveUrl && !n.driveUrl.startsWith('blob:')) ? `<div class="mt-2"><a href="${n.driveUrl}" target="_blank" class="text-xs text-blue-400 underline flex items-center gap-1"><i class="ph-bold ph-cloud"></i> 在雲端查看已備份筆記</a></div>` : '';
                
                let renderedContent = n.isHtml ? n.content : formatMessage(n.content);
                
                return `<div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 flex flex-col relative overflow-hidden slide-in pt-8">${folderBadge}<div class="flex justify-between items-start mb-2"><h3 class="text-lg font-bold text-white flex items-center gap-2 truncate pr-2 w-full">${icon} <span class="truncate">${escapeHtml(n.title)}</span></h3><div class="flex space-x-1 shrink-0"><button onclick="deleteNote('${n.id}')" class="text-slate-500 hover:text-red-400 p-1.5 bg-slate-950/50 rounded"><i class="ph-bold ph-trash"></i></button></div></div><span class="text-[10px] text-slate-500 mb-2">${n.date}</span>${imgHtml}${audioPlayerHtml}<div class="note-html-content text-slate-300 text-sm overflow-y-auto max-h-40 scrollbar-thin ${n.isHtml ? 'whitespace-normal' : 'whitespace-pre-wrap'} relative after:absolute after:bottom-0 after:left-0 after:w-full after:h-8 after:bg-gradient-to-t after:from-slate-900 after:to-transparent">${renderedContent}</div>${linkHtml}<div class="flex flex-wrap gap-2 mt-4 pt-3 border-t border-slate-800">${extraAudioButtons}</div><div class="flex flex-wrap items-center gap-2 mt-2">${actionButtons}</div></div>`;
            }).join('')||'<p class="text-slate-500 text-center col-span-3 mt-10">找不到符合的筆記</p>'; 
            
            if(mini) mini.innerHTML=appState.notes.slice(0,2).map(n=>{
                let plainText = n.isHtml ? n.content.replace(/<[^>]+>/g, ' ') : n.content;
                return `<div class="bg-slate-950/50 p-3 rounded-lg border border-slate-800/50 cursor-pointer hover:border-slate-700" onclick="switchTab('notes')"><h4 class="text-slate-300 text-xs font-bold mb-1 truncate flex items-center gap-1">${n.type==='audio'?'<i class="ph-fill ph-microphone text-purple-400"></i>':''}${escapeHtml(n.title)}</h4><p class="text-slate-500 text-[10px] line-clamp-1">${escapeHtml(plainText)}</p></div>`;

        }

        function renderWeather() { 
            const {temp,condition,loc}=appState.weather; let icon='ph-cloud',color='text-slate-400',desc='多雲'; 
            if(condition==='sunny'){icon='ph-sun';color='text-yellow-400';desc='晴朗';} 
            if(condition==='rainy'){icon='ph-cloud-rain';color='text-blue-400';desc='有雨';} 
            const locEl = document.getElementById('location-name'); if(locEl) locEl.innerText=loc; 
            const tempEl = document.getElementById('weather-temp'); if(tempEl) tempEl.innerText=`${temp}°`; 
            const descEl = document.getElementById('weather-desc'); if(descEl) descEl.innerText=desc; 
            const iconEl = document.getElementById('weather-icon'); if(iconEl) iconEl.className=`ph-fill ${icon} text-4xl ${color}`; 
            const mTemp = document.getElementById('mobile-weather-temp'); if(mTemp) mTemp.innerText=loc==='定位中...'?'定位中...':`${temp}°`; 
            const mIcon = document.getElementById('mobile-weather-icon'); if(mIcon) mIcon.className=`ph-fill ${loc==='定位中...'?'ph-navigation-arrow animate-pulse':icon} ${color}`; 
        }

        function updateModelUI(){ 
            const conf=MODEL_CONFIG[appState.currentModel]; 
            const statusName = document.getElementById('status-name'); if(statusName) statusName.innerText=conf?.name || 'Unknown'; 
            const statusIcon = document.getElementById('status-icon'); if(statusIcon) statusIcon.className=`ph-fill ${conf?.icon || 'ph-cpu'} text-lg ${conf?.color || 'text-slate-400'}`; 
            const selectEl = document.getElementById('main-model-select'); if(selectEl) selectEl.value = appState.currentModel;
            const grokSelect = document.getElementById('grok-sub-model-select');
            if(grokSelect) { if (appState.currentModel === 'grok') { grokSelect.classList.remove('hidden'); grokSelect.value = appState.grokModel; } else { grokSelect.classList.add('hidden'); } }
            
            const geminiSelect = document.getElementById('gemini-sub-model-select');
            if(geminiSelect) { if (appState.currentModel === 'gemini') { geminiSelect.classList.remove('hidden'); geminiSelect.value = appState.geminiModel; } else { geminiSelect.classList.add('hidden'); } }

            const wrap = document.getElementById('input-wrapper'); if(wrap) wrap.className = `flex-1 flex items-end bg-slate-950 rounded-2xl px-3 py-1.5 border transition-colors border-slate-700 focus-within:border-${appState.currentModel==='gemini'?'blue':appState.currentModel==='groq'?'rose':appState.currentModel==='cohere'?'violet':appState.currentModel==='gpt'?'emerald':'slate'}-500`; 
            const badge=document.getElementById('web-search-badge'); const searchBtn=document.getElementById('search-toggle-btn'); const hint=document.getElementById('search-hint'); 
            if(searchBtn) {
                if(appState.isSearchEnabled){ searchBtn.classList.add('text-blue-400','bg-blue-900/50'); searchBtn.classList.remove('text-slate-400'); if(badge)badge.classList.remove('hidden'); if(hint)hint.classList.remove('hidden'); }

        // --- 攝影機與 LIVE 視覺功能 ---
        async function populateCameraSelect() {
            const select = document.getElementById('camera-select');
            if (!select) return;
            
            try {
                // 為了避免授權後麥克風卡死，建立暫時的 stream 來要權限，要完馬上釋放
                const tempStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                tempStream.getTracks().forEach(t => t.stop());

                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(d => d.kind === 'videoinput');
                
                select.innerHTML = '';
                if (videoDevices.length === 0) {
                    select.innerHTML = '<option value="">無相機</option>';
                    return;
                }

                videoDevices.forEach((d, i) => {
                    const option = document.createElement('option');
                    option.value = d.deviceId;
                    option.text = d.label || `相機 ${i + 1}`;
                    select.appendChild(option);
                });
                
                if (appState.currentDeviceId) {
                    let exists = videoDevices.find(d => d.deviceId === appState.currentDeviceId);
                    if(exists) select.value = appState.currentDeviceId;
                    else select.selectedIndex = 0;
                } else {
                    let backCams = videoDevices.filter(d => d.label.toLowerCase().includes('back') || d.label.toLowerCase().includes('後'));
                    let standardCam = backCams.find(d => !d.label.toLowerCase().includes('wide') && !d.label.toLowerCase().includes('廣角'));
                    if(standardCam) select.value = standardCam.deviceId;
                    else if(backCams.length > 0) select.value = backCams[0].deviceId;
                    else select.selectedIndex = 0;
                    
                    appState.currentDeviceId = select.value;
                }
            } catch(e) {
                select.innerHTML = '<option value="environment">後鏡頭 (預設)</option><option value="user">前鏡頭 (自拍)</option>';
            }
        }

        async function startTranslateBAutoRecord() {
            if (appState.translateMode !== 'auto') return;

            // 防護網 1: 硬體狀態鎖 (如果在發聲，絕對不啟動麥克風，防止迴圈)
            if (window.speechSynthesis.speaking) {
                setTimeout(startTranslateBAutoRecord, 500);
                return;
            }

            try {
                // 強制在獲取新權限前停止任何潛在的殘留音軌
                releaseMicrophone();

                // 防護網 2: 開啟硬體回音消除與降噪
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { 
                        echoCancellation: true, 
                        noiseSuppression: true, 
                        autoGainControl: true 
                    } 
                });

                if (appState.translateMode !== 'auto') {
                    stream.getTracks().forEach(t => t.stop());
                    return;
                }

                appState.recordingContext = 'translateB';
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                translateDiscardNext = false;
                
                // 將音軌全部推入全局管理，方便統一釋放
                appState.activeMediaTracks.push(...stream.getTracks());

                // 使用 AudioContext 進行音量靜音偵測 (Voice Activity Detection)
                vadAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                vadStream = vadAudioCtx.createMediaStreamSource(stream);
                vadAnalyser = vadAudioCtx.createAnalyser();
                vadAnalyser.fftSize = 512;
                vadStream.connect(vadAnalyser);
                const bufferLength = vadAnalyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);

                let isSpeaking = false;
                let silenceStart = Date.now();
                let consecutiveLoud = 0;
                let speakStartTime = 0;
                const initTime = Date.now();
                
                let baselineVolume = 0;
                let baselineSamples = [];
                let isBaselineCalculated = false;

                vadInterval = setInterval(() => {
                    if (appState.translateMode !== 'auto') {
                        releaseMicrophone();
                        return;
                    }

                    // 強制中斷保險 (即使開始錄音中被 TTS 突發打斷)
                    if (window.speechSynthesis.speaking && isSpeaking) {
                        isSpeaking = false;
                        silenceStart = Date.now();
                    }

                    const elapsed = Date.now() - initTime;
                    vadAnalyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for(let i = 0; i < bufferLength; i++) { sum += dataArray[i]; }
                    let avgVolume = sum / bufferLength;

                    // 1. 0~500ms 啟動寬限期：忽略前 500ms 的硬體初始化雜音與電流聲 (Pop noise)
                    if (elapsed < 500) {
                        silenceStart = Date.now(); // 鎖定靜音計時器
                        return;
                    }
                    
                    // 2. 500~1500ms：動態採集背景底噪
                    if (elapsed < 1500) {
                        baselineSamples.push(avgVolume);
                        silenceStart = Date.now(); // 鎖定靜音計時器
                        const statusText = document.getElementById('recording-status-text');
                        if (statusText) statusText.innerText = "環境底噪校正中，請保持安靜...";
                        return;
                    }
                    
                    // 結算底噪 (僅執行一次)
                    if (!isBaselineCalculated) {
                        if (baselineSamples.length > 0) {
                            baselineVolume = baselineSamples.reduce((a,b)=>a+b,0) / baselineSamples.length;
                        }
                        // 設定最低底噪為 15.0 絕對下限，避免在死音室中微小雜訊(如滑鼠聲)乘倍數後依然被觸發
                        baselineVolume = Math.max(baselineVolume, 15.0);
                        isBaselineCalculated = true;
                        
                        const statusText = document.getElementById('recording-status-text');
                        if (statusText) statusText.innerText = `等待語音中 (底噪基準: ${baselineVolume.toFixed(1)})`;
                        console.log(`[NOVA VAD] 環境底噪: ${baselineVolume.toFixed(1)}, 門檻倍數: ${appState.vadMultiplier}x, 觸發閥值: ${(baselineVolume * appState.vadMultiplier).toFixed(1)}`);
                    }

                    // 計算當下觸發的動態門檻 = 基底噪音 x 設定的倍數
                    const dynamicThreshold = baselineVolume * appState.vadMultiplier;

                    if (avgVolume > dynamicThreshold && !window.speechSynthesis.speaking) {
                        consecutiveLoud++;
                        silenceStart = Date.now(); // 重置靜音計時

                        // 3. 防誤觸機制：必須連續 3 次 (300ms) 都在動態門檻之上，才判定為真正開始說話
                        if (consecutiveLoud >= 3 && !isSpeaking) {
                            isSpeaking = true;
                            speakStartTime = Date.now();
                            const statusText = document.getElementById('recording-status-text');
                            if (statusText) statusText.innerText = "🔊 偵測到語音，收音中...";
                        }
                    } else {
                        consecutiveLoud = 0;
                        if (isSpeaking) {
                            let silentDuration = (Date.now() - silenceStart) / 1000;
                            if (silentDuration >= appState.translateBTimeout) {
                                let speakDuration = silenceStart - speakStartTime;
                                isSpeaking = false;

                                // 4. 最短語音長度：只有超過 500ms 的聲音才被當作有效句，避免咳嗽聲或碰撞聲被送出
                                if (speakDuration > 500) {
                                    stopTranslateBAndSend(false); // 觸發送出並斷開麥克風
                                } else {
                                    // 判定為無效短音：不切斷硬體麥克風，只重置 MediaRecorder 拋棄垃圾音軌
                                    try {
                                        if(mediaRecorder && mediaRecorder.state === 'recording') {
                                            translateDiscardNext = true;
                                            mediaRecorder.onstop = () => {
                                                audioChunks = [];
                                                if (appState.translateMode === 'auto') {
                                                    mediaRecorder.onstop = processTranslateB; // 還原正常的處理函數
                                                    translateDiscardNext = false;
                                                    try { mediaRecorder.start(); } catch(e){}
                                                }
                                            };
                                            mediaRecorder.stop();
                                        }
                                    } catch(e){}
                                    
                                    silenceStart = Date.now();
                                    const statusText = document.getElementById('recording-status-text');
                                    if (statusText) statusText.innerText = `等待語音中 (底噪基準: ${baselineVolume.toFixed(1)})`;
                                }
                            }
                        } else {
                            silenceStart = Date.now(); // 尚未開始說話，鎖住計時
                            const statusText = document.getElementById('recording-status-text');
                            if (statusText && !statusText.innerText.includes("等待語音中")) {
                                statusText.innerText = `等待語音中 (底噪基準: ${baselineVolume.toFixed(1)})`;
                            }
                        }
                    }
                }, 100);

                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = processTranslateB;
                mediaRecorder.start();

                document.getElementById('recording-status').classList.remove('hidden'); 
                document.getElementById('recording-status').classList.add('flex');
                document.getElementById('recording-status-text').innerText = "系統準備中... (忽略初始雜音)";
                
            } catch (err) {
                addMessage("⚠️ 無法啟動錄音麥克風，請檢查權限。", 'system');
                toggleTranslateMode(true);
            }
        }

        function stopTranslateBAndSend(discard = false) {
            translateDiscardNext = discard;
            releaseMicrophone(); // 呼叫全域底層麥克風強制釋放協議
            
            document.getElementById('recording-status').classList.add('hidden');
            document.getElementById('recording-status').classList.remove('flex');
        }

        async function processTranslateB() {
            if (audioChunks.length === 0 || translateDiscardNext) {
                audioChunks = [];
                return; 
            }
            
            // 【NOVA 101 SP】防呆鎖解除：只要有成功抓到音檔送出，就代表第一次收音完成，可以解鎖語音了
            appState.translateMuteUntilFirstCapture = false;
            
            const audioBlob = new Blob(audioChunks, { type: mediaRecorder?.mimeType || 'audio/webm' });
            audioChunks = [];
            
            const reader = new FileReader();
            reader.readAsDataURL(audioBlob);
            reader.onloadend = async () => {
                const base64dataWithPrefix = reader.result;
                appState.recordingContext = 'default';
                addMessage("🎙️ 音軌已自動擷取，AI 翻譯中... (麥克風已完全釋放)", "user");
                appState.isThinking = true;
                renderThinkingState(true);
                try {
                    // 防護網 3: AI 幻覺攔截器 (嚴厲禁止輸出預設回覆)
                    let prompt = "你是一位專業的同步口譯員。請直接聽取這段音檔中的對話並進行翻譯。如果說的是中文，請翻譯成自然流暢的英文；如果說的是任何外文，請翻譯成繁體中文。請『只輸出最終的翻譯結果文字』，絕對不要包含任何解釋、原文、拼音或個人評論。\n\n***極度重要防幻覺指令：如果音檔中只有雜音、風扇聲、沒有明顯可辨識的人類說話聲，請你務必只回傳「[NO_SPEECH]」這幾個字，絕對不要幻覺出「Thank you」、「Bye」等任何字詞！***";
                    
                    let res = await fetchAIResponse(prompt, 'gemini', { 
                        file: { category: 'media', data: base64dataWithPrefix, mime: mediaRecorder?.mimeType || 'audio/webm', name: 'Voice_Input.weba' } 
                    });
                    let finalTxt = typeof res === 'string' ? res : res.text;
                    
                    let checkCmd = finalTxt.replace(/[\s.,!?"'。，！？]/g, '').toLowerCase();

                    // --- 攔截 AI 幻覺雜音 (如果沒有人聲，直接靜默捨棄，不播報不進入迴圈) ---
                    if (checkCmd.includes('[no_speech]') || finalTxt.includes('[NO_SPEECH]')) {
                        console.log("[NOVA] 攔截到 AI 幻覺雜音或無人聲，靜默重啟收音...");
                        if (appState.translateMode === 'auto') {
                            setTimeout(startTranslateBAutoRecord, 500);
                        }
                        appState.isThinking = false;
                        renderThinkingState(false);
                        return;
                    }

                    // --- 攔截語音停止指令 (AI 翻譯結果判斷) ---
                    if (checkCmd.includes('結束口譯') || checkCmd.includes('關閉口譯') || checkCmd.includes('stoptranslation') || checkCmd.includes('endtranslation') || checkCmd === 'stop' || checkCmd.includes('停止翻譯')) {
                        addMessage("✅ 已聽到您的語音中止指令，全自動口譯已結束。", 'system');
                        toggleTranslateMode(true);
                        appState.isThinking = false;
                        renderThinkingState(false);
                        return;
                    }
                    
                    addMessage(finalTxt, 'ai', 'gemini');
                    
                    if (appState.translateMode === 'auto') {
                        const aiMsgId = appState.messages[appState.messages.length - 1].id;
                        speakText(finalTxt, false, String(aiMsgId));
                    }
                } catch(e) {
                    addMessage("翻譯失敗：" + e.message, 'system');
                    if (appState.translateMode === 'auto') setTimeout(startTranslateBAutoRecord, 2000);
                } finally {
                    appState.isThinking = false;
                    renderThinkingState(false);
                }
            };
        }

        async function startMeetingRecording(context = 'record') {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { 
                addMessage("⚠️ 瀏覽器不支援錄音", 'system'); return; 
            }
            
            appState.recordingContext = context;
            switchTab('dashboard');
            appState.currentAudioTranscript = "";
            
            releaseMicrophone(); // 啟動前強制清理乾淨

            let micStream = null;
            let sysStream = null;
            let mixedStream = null;

            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            try {
                const micConstraints = { audio: true };

                micStream = await navigator.mediaDevices.getUserMedia(micConstraints);
                appState.activeMediaTracks.push(...micStream.getTracks());

                if (!isMobile && navigator.mediaDevices.getDisplayMedia) {
                    try {
                        addMessage("💡 提示：請在彈出的視窗中選擇【分頁】或【整個螢幕】，並務必勾選左下角的【分享分頁音訊】或【分享系統音訊】，才能成功錄下會議中別人的聲音喔！", 'system');
                        sysStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                        appState.activeMediaTracks.push(...sysStream.getTracks());
                        sysStream.getVideoTracks().forEach(track => { track.stop(); });
                    } catch (sysErr) {
                        addMessage("⚠️ 未取得系統音訊授權或取消操作，將為您降級為僅錄製麥克風聲音。", 'system');
                    }
                } else if (isMobile) {
                    addMessage("⚠️ **系統限制提醒**：手機瀏覽器基於隱私安全，禁止側錄內部系統聲音。\n\n💡 若您要在手機上錄製會議，請**拔下耳機，改用手機擴音播放**，系統會透過麥克風一併收錄會議聲音。", 'system');
                }

                if (sysStream && sysStream.getAudioTracks().length > 0) {
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    const audioCtx = new AudioContextClass();
                    appState.recordingAudioCtx = audioCtx;
                    
                    const dest = audioCtx.createMediaStreamDestination();
                    
                    if (micStream.getAudioTracks().length > 0) {
                        const micSource = audioCtx.createMediaStreamSource(micStream);
                        micSource.connect(dest);
                    }
                    
                    if (sysStream.getAudioTracks().length > 0) {
                        const sysSource = audioCtx.createMediaStreamSource(sysStream);
                        sysSource.connect(dest);
                    }
                    
                    mixedStream = dest.stream;
                    let titleMsg = appState.recordingContext === 'note' ? "🎙️ 開始【雙軌語音筆記】... (已成功混合麥克風與系統聲音，點擊紅燈結束)" : "🎙️ 開始【雙軌會議錄音】... (已成功混合麥克風與系統聲音，點擊紅燈結束)";
                    addMessage(titleMsg, 'system');
                } else {
                    mixedStream = micStream;
                    let titleMsg = appState.recordingContext === 'note' ? "🎙️ 開始錄製語音筆記... (僅麥克風環境音，點擊紅燈結束)" : "🎙️ 開始錄音... (僅麥克風環境音，點擊紅燈結束)";
                    addMessage(titleMsg, 'system');
                }

                let actualMimeType = 'audio/webm';
                if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) actualMimeType = 'audio/webm;codecs=opus';
                else if (MediaRecorder.isTypeSupported('audio/mp4')) actualMimeType = 'audio/mp4';
                
                mediaRecorder = new MediaRecorder(mixedStream, { mimeType: actualMimeType });
                audioChunks = [];
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = uploadAudioRecording; 
                mediaRecorder.start();
                
                document.getElementById('recording-status').classList.remove('hidden'); 
                document.getElementById('recording-status').classList.add('flex');
                document.getElementById('recording-status-text').innerText = "錄音中... (點擊停止)";
                
                if (recognition && !appState.isListening) { 
                    chatInitialInput = document.getElementById('user-input').value; 
                    try { recognition.start(); } catch(e){}
                }

            } catch (err) {
                addMessage("⚠️ 無法啟動錄音，請檢查麥克風權限或瀏覽器設定。", 'system');
                console.error(err);
            }
        }

        async function startAudioRecording(customContext = null) {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { addMessage("⚠️ 瀏覽器不支援錄音", 'system'); return; }
            try {
                if(customContext) appState.recordingContext = customContext;

                releaseMicrophone();

                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                appState.activeMediaTracks.push(...stream.getTracks());

                mediaRecorder = new MediaRecorder(stream); audioChunks = []; appState.currentAudioTranscript = ""; 
                
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = uploadAudioRecording; 
                mediaRecorder.start();
                
                document.getElementById('recording-status').classList.remove('hidden'); document.getElementById('recording-status').classList.add('flex');
                
                let titleMsg = appState.recordingContext === 'note' ? "🎙️ 開始錄製「語音筆記」... (點擊上方紅燈停止)" : "🎙️ 開始錄音... (僅麥克風，點擊上方紅燈停止)";
                addMessage(titleMsg, 'system');
                document.getElementById('recording-status-text').innerText = "錄音中... (點擊停止)";
                
                if (recognition && !appState.isListening) { 
                    chatInitialInput = document.getElementById('user-input').value; 
                    try { recognition.start(); } catch(e){}
                }
            } catch (err) { addMessage("⚠️ 無法啟動錄音，請檢查麥克風權限", 'system'); }
        }

        function stopAudioRecording() {
