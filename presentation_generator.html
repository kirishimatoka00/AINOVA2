<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA 120 - AI Interactive Engine</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-1: #6366f1; --color-2: #ec4899; --accent: #818cf8;
            background-color: #020617;
        }
        body { font-family: 'Plus Jakarta Sans', 'Noto Sans TC', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 畫布容器 */
        #viewport-container {
            flex: 1; position: relative; background: #000; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        #main-canvas {
            width: 100%; height: 100%; max-width: 100vw; max-height: 56.25vw; /* 16:9 */
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%);
            box-shadow: 0 0 50px rgba(0,0,0,0.5); cursor: grab;
        }

        /* 縮圖區域 */
        #preview-bar {
            height: 120px; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; gap: 12px; padding: 12px; overflow-x: auto; scroll-behavior: smooth;
        }
        .preview-thumb {
            aspect-ratio: 16/9; height: 100%; background: #0f172a; border: 2px solid transparent;
            border-radius: 8px; flex-shrink: 0; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; font-size: 10px; color: #475569;
        }
        .preview-thumb.active { border-color: var(--accent); background: #1e293b; color: white; }

        /* 玻璃擬態卡片 */
        .glass-card {
            background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* 手機適配調校 */
        @media (max-width: 1024px) {
            #side-panel {
                position: absolute; bottom: 0; left: 0; right: 0; width: 100%; height: 50%;
                z-index: 100; border-radius: 2rem 2rem 0 0; transform: translateY(calc(100% - 60px));
                transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            }
            #side-panel.open { transform: translateY(0); }
            #viewport-container { height: 50%; }
        }

        .custom-scrollbar::-webkit-scrollbar { height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-100">

    <div id="viewport-container">
        <svg id="main-canvas" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <filter id="glow"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            </defs>
            <g id="slides-container"></g>
        </svg>

        <div class="lg:hidden absolute top-2 left-1/2 -translate-x-1/2 w-12 h-1 bg-slate-700 rounded-full"></div>
    </div>

    <div id="preview-bar" class="custom-scrollbar">
        </div>

    <aside id="side-panel" class="bg-slate-900/95 backdrop-blur-3xl border-t lg:border-t-0 lg:border-r border-slate-800 lg:relative lg:w-96 flex flex-col">
        <button class="lg:hidden w-full py-4 text-slate-500 font-bold text-xs" onclick="document.getElementById('side-panel').classList.toggle('open')">
            <i class="ph-bold ph-caret-up"></i> 生成設定面板
        </button>
        
        <div class="p-6 flex-1 overflow-y-auto space-y-6">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/30">
                    <i class="ph-bold ph-sparkle text-white"></i>
                </div>
                <h1 class="font-extrabold text-lg">NOVA 120 <span class="text-xs font-normal opacity-50">v2.0</span></h1>
            </div>

            <div class="space-y-4">
                <div class="bg-slate-950/50 p-4 rounded-2xl border border-slate-800">
                    <label class="text-[10px] font-black text-slate-500 uppercase mb-2 block">Agent A:主力內容 LLM</label>
                    <select id="model-llm" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-xs text-white outline-none">
                        <option value="gemini-3-flash-preview">Gemini 3 Flash Preview</option>
                        <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                        <option value="gemini-3.1-pro-preview" selected>Gemini 3.1 Pro Preview</option>
                        <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                    </select>
                </div>

                <div class="bg-slate-950/50 p-4 rounded-2xl border border-slate-800">
                    <label class="text-[10px] font-black text-slate-500 uppercase mb-2 block">Agent B:生圖視覺模型</label>
                    <select id="model-image" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-xs text-white outline-none">
                        <option value="grok-image-image">Grok Image Image</option>
                        <option value="grok-image-image-pro" selected>Grok Image Image Pro</option>
                        <option value="gemini-2.5-flash-image">Gemini 2.5 Flash-image</option>
                        <option value="gemini-3.1-flash-image">Gemini 3.1 Flash-image</option>
                    </select>
                </div>

                <div class="bg-slate-950/50 p-4 rounded-2xl border border-slate-800">
                    <label class="text-[10px] font-black text-slate-500 uppercase mb-2 block">生成張數: <span id="slide-count-val">5</span> 張</label>
                    <input type="range" id="slide-count" min="1" max="15" value="5" class="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-indigo-500" oninput="document.getElementById('slide-count-val').innerText = this.value">
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase mb-2 block">主題指令</label>
                    <textarea id="inp-topic" rows="3" class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 text-sm focus:border-indigo-500 outline-none transition-all" placeholder="例如：2025年火星殖民計畫..."></textarea>
                </div>

                <button onclick="generateSlides()" id="btn-generate" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-2xl transition-all shadow-xl shadow-indigo-500/20 flex items-center justify-center gap-2">
                    <i class="ph-bold ph-magic-wand"></i> 開始生成引擎
                </button>
            </div>
        </div>
    </aside>

    <script>
        // ════════════════════════════════════════════════
        // 核心狀態管理
        // ════════════════════════════════════════════════
        const AppState = {
            currentSlide: 0,
            totalSlides: 0,
            slidesData: [],
            isDragging: false,
            currentTarget: null,
            offset: { x: 0, y: 0 }
        };

        const canvas = document.getElementById('main-canvas');
        const container = document.getElementById('slides-container');
        const previewBar = document.getElementById('preview-bar');

        // ════════════════════════════════════════════════
        // SVG 互動邏輯 (精準座標轉換)
        // ════════════════════════════════════════════════
        function getMousePos(evt) {
            const CTM = canvas.getScreenCTM();
            const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
            const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
            return { x: (clientX - CTM.e) / CTM.a, y: (clientY - CTM.f) / CTM.d };
        }

        canvas.addEventListener('mousedown', (e) => {
            const group = e.target.closest('.draggable-node');
            if (group) {
                AppState.isDragging = true;
                AppState.currentTarget = group;
                const pos = getMousePos(e);
                const matrix = group.transform.baseVal.getItem(0).matrix;
                AppState.offset.x = pos.x - matrix.e;
                AppState.offset.y = pos.y - matrix.f;
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (AppState.isDragging && AppState.currentTarget) {
                const pos = getMousePos(e);
                AppState.currentTarget.transform.baseVal.getItem(0).setMatrix(
                    canvas.createSVGMatrix().translate(pos.x - AppState.offset.x, pos.y - AppState.offset.y)
                );
            }
        });

        window.addEventListener('mouseup', () => AppState.isDragging = false);

        // ════════════════════════════════════════════════
        // 生成邏輯 (Agent A, B, C 工作流)
        // ════════════════════════════════════════════════
        async function generateSlides() {
            const topic = document.getElementById('inp-topic').value;
            const count = parseInt(document.getElementById('slide-count').value);
            if (!topic) return alert("請輸入主題內容");

            const btn = document.getElementById('btn-generate');
            btn.innerHTML = `<i class="ph-bold ph-circle-notch animate-spin"></i> Agent A 構思內容中...`;
            btn.disabled = true;

            // 模擬 API 延遲與數據生成 (實務上請介接您的 API)
            setTimeout(() => {
                AppState.totalSlides = count;
                container.innerHTML = '';
                previewBar.innerHTML = '';
                
                for (let i = 0; i < count; i++) {
                    const slideGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
                    slideGroup.id = `slide-${i}`;
                    slideGroup.setAttribute("visibility", i === 0 ? "visible" : "hidden");
                    
                    // 背景裝飾 (Agent B 邏輯)
                    const bg = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    bg.setAttribute("cx", "960"); bg.setAttribute("cy", "540"); bg.setAttribute("r", "400");
                    bg.setAttribute("fill", `url(#grad-${i % 2})`); bg.setAttribute("opacity", "0.1");
                    slideGroup.appendChild(bg);

                    // 加入內容元件 (Agent C 邏輯)
                    addContentNode(slideGroup, 200, 200, `投影片 ${i+1}: ${topic.substring(0,5)}...`, "這是由 Agent C 注入的前端互動內容。您可以直接在此處編輯文字，或是在畫布上拖動我。");
                    addContentNode(slideGroup, 1200, 600, "關鍵特點", "1. 響應式佈局\n2. SVG 空間矩陣\n3. 多代理模型調用");

                    container.appendChild(slideGroup);
                    addPreviewThumb(i);
                }
                
                btn.innerHTML = `<i class="ph-bold ph-magic-wand"></i> 重新生成`;
                btn.disabled = false;
                switchSlide(0);
                if (window.innerWidth < 1024) document.getElementById('side-panel').classList.remove('open');
            }, 1500);
        }

        function addContentNode(parent, x, y, title, text) {
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("class", "draggable-node");
            g.setAttribute("transform", `translate(${x}, ${y})`);

            const fObj = document.createElementNS("http://www.w3.org/2000/svg", "foreignObject");
            fObj.setAttribute("width", "500");
            fObj.setAttribute("height", "300");

            const div = document.createElement("div");
            div.className = "glass-card p-8 text-white h-full";
            div.innerHTML = `
                <h2 class="text-2xl font-black mb-4 border-b border-white/10 pb-2 outline-none" contenteditable="true">${title}</h2>
                <p class="text-slate-400 leading-relaxed outline-none" contenteditable="true">${text}</p>
            `;

            fObj.appendChild(div);
            g.appendChild(fObj);
            parent.appendChild(g);
        }

        // ════════════════════════════════════════════════
        // 導覽邏輯
        // ════════════════════════════════════════════════
        function addPreviewThumb(index) {
            const thumb = document.createElement("div");
            thumb.className = `preview-thumb ${index === 0 ? 'active' : ''}`;
            thumb.id = `thumb-${index}`;
            thumb.innerHTML = `P${index + 1}`;
            thumb.onclick = () => switchSlide(index);
            previewBar.appendChild(thumb);
        }

        function switchSlide(index) {
            for (let i = 0; i < AppState.totalSlides; i++) {
                document.getElementById(`slide-${i}`).setAttribute("visibility", i === index ? "visible" : "hidden");
                document.getElementById(`thumb-${i}`).classList.toggle("active", i === index);
            }
            AppState.currentSlide = index;
        }

        // 初始漸層定義
        const defs = canvas.querySelector('defs');
        defs.innerHTML += `
            <linearGradient id="grad-0" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
            </linearGradient>
            <linearGradient id="grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#f43f5e;stop-opacity:1" />
            </linearGradient>
        `;
    </script>
</body>
</html>
