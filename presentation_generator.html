<!DOCTYPE html>

                <h2 class="text-xl font-bold text-white mb-2">HTML-Based Presentation 引擎</h2>
                <p class="text-slate-500 text-sm max-w-md">本次升級：LLM 將直接為您撰寫 HTML/CSS 版型。系統會在背景渲染後，以 4K 解析度無損轉印至 PPTX，達到真正的滿版與極致排版自由度。</p>

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[200] bg-slate-800 text-white text-sm font-medium px-4 py-2.5 rounded-xl shadow-2xl border border-slate-700 opacity-0 transition-all pointer-events-none translate-y-4"></div>

    <script>
    const AppState = {
        googleApiKey: '', xaiApiKey: '',
        kbDocs: [], logoBase64: null, 
        pptxObject: null, presentationData: null,
        isGenerating: false, cancelRequested: false, abortController: null,
        finalSlideImages: [] // 儲存 html2canvas 截圖
    };

    const GROK_PROXY   = 'https://grokcaller.kirishimatoka00.workers.dev/';
    const GROK_IMG_API = 'https://api.x.ai/v1/images/generations';

    const TEMPLATES = {
        modern: { accent: '#64748B', titleColor: '#FFFFFF', textColor: '#E2E8F0', font: 'Arial' },
        tech: { accent: '#0EA5E9', titleColor: '#38BDF8', textColor: '#BAE6FD', font: 'monospace' },
        corporate: { accent: '#2563EB', titleColor: '#FFFFFF', textColor: '#BFDBFE', font: 'Arial' },
        creative: { accent: '#EC4899', titleColor: '#F9A8D4', textColor: '#FBCFE8', font: 'Verdana' }
    };

    function init() {
        AppState.googleApiKey = localStorage.getItem('nova_key_gemini') || '';
        AppState.xaiApiKey = localStorage.getItem('nova_key_grok') || '';
        document.getElementById('api-gemini-status').textContent = AppState.googleApiKey ? '✓ 已設定' : '❌ 未設定';
        updateHeaderBadge();
        mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose' });
        toggleImageCount();
    }

    document.addEventListener('DOMContentLoaded', init);

    function togglePanel(id) {
        document.getElementById(id).classList.toggle('open');
    }

    function showToast(m) {
        const t = document.getElementById('toast');
        t.textContent = m; t.classList.remove('opacity-0', 'translate-y-4'); t.classList.add('opacity-100', 'translate-y-0');
        setTimeout(() => { t.classList.add('opacity-0', 'translate-y-4'); t.classList.remove('opacity-100', 'translate-y-0'); }, 2500);
    }

    function updateHeaderBadge() {
        const s = document.getElementById('sel-text-model');
        document.getElementById('header-model-name').textContent = s.options[s.selectedIndex].text;
    }

    function toggleImageCount() {
        const needImg = document.getElementById('sel-need-image').value;
        document.getElementById('div-image-count').style.display = needImg === 'NO' ? 'none' : 'block';
    }

    function updateImageCountLabel(val) {
        document.getElementById('image-count-val').textContent = parseInt(val) === 20 ? '自動 (無限制)' : val + ' 張';
    }

    function addLog(m, type = 'info') {
        const c = document.getElementById('log-container');
        const i = document.createElement('div');
        const colors = { info: 'text-slate-300', success: 'text-emerald-300', warning: 'text-amber-300', error: 'text-rose-300', ai: 'text-violet-300' };
        i.className = `py-0.5 ${colors[type]}`;
        i.textContent = `[${new Date().toLocaleTimeString()}] ${m}`;
        c.appendChild(i); c.scrollTop = c.scrollHeight;
    }

    function getGeminiApiVersion(modelName) {
        return (modelName.includes('preview') || modelName.includes('exp') || modelName.includes('gemini-3')) ? 'v1alpha' : 'v1beta';
    }

    function stopGeneration() {
        if (AppState.isGenerating) {
            AppState.cancelRequested = true;
            if (AppState.abortController) AppState.abortController.abort();
            addLog('⚠️ 使用者要求中斷生成...', 'warning');
            document.getElementById('btn-stop').disabled = true;
        }
    }

    // ★ 檔案解析功能實作 ★
    async function handleKbUpload(files) {
        for (const file of files) {
            try {
                let text = '';
                const ext = file.name.split('.').pop().toLowerCase();
                
                if (['txt', 'md', 'html', 'csv', 'json'].includes(ext)) {
                    text = await file.text();
                } else if (ext === 'pdf') {
                    const arr = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({data: arr}).promise;
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        text += content.items.map(item => item.str).join(' ') + '\n';
                    }
                } else if (ext === 'docx') {
                    const arr = await file.arrayBuffer();
                    const res = await mammoth.extractRawText({arrayBuffer: arr});
                    text = res.value;
                } else if (ext === 'xlsx') {
                    const arr = await file.arrayBuffer();
                    const wb = XLSX.read(arr);
                    wb.SheetNames.forEach(sheetName => {
                        text += XLSX.utils.sheet_to_txt(wb.Sheets[sheetName]) + '\n';
                    });
                } else if (ext === 'pptx') {
                    // 簡易 PPTX XML 文字提取
                    const zip = await JSZip.loadAsync(file);
                    for (const filename of Object.keys(zip.files)) {
                        if (filename.startsWith('ppt/slides/slide') && filename.endsWith('.xml')) {
                            const content = await zip.files[filename].async('string');
                            text += content.replace(/<[^>]+>/g, ' ') + '\n';
                        }
                    }
                }

                if(text) {
                    AppState.kbDocs.push({ name: file.name, text: text.substring(0, 30000) }); // 限制單檔字數防爆
                    addKbFileItem(file.name, AppState.kbDocs.length - 1);
                    showToast(`📚 已載入：${file.name}`);
                }
            } catch (e) {
                console.error(e);
                showToast(`❌ 無法讀取 ${file.name}`);
            }
        }
    }

    function addKbFileItem(name, index) {
        const list = document.getElementById('kb-file-list');
        const item = document.createElement('div');
        item.className = 'flex items-center justify-between bg-slate-800 rounded px-2 py-1 text-[11px]';
        item.innerHTML = `<span class="text-slate-300 truncate">${name}</span>
                          <button onclick="this.parentElement.remove(); AppState.kbDocs[${index}]=null;" class="text-rose-400 ml-2">&times;</button>`;
        list.appendChild(item);
    }

    function handleLogoUpload(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            AppState.logoBase64 = event.target.result;
            document.getElementById('logo-preview').src = AppState.logoBase64;
            document.getElementById('logo-preview-wrapper').classList.remove('hidden');
            showToast('✅ Logo 上傳成功');
        };
        reader.readAsDataURL(file);
    }

    function removeLogo() {
        AppState.logoBase64 = null;
        document.getElementById('logo-upload').value = '';
        document.getElementById('logo-preview-wrapper').classList.add('hidden');
    }

    /** ★ HTML-Based LLM Prompt 核心 ★ */
    async function callGeminiForHTMLOutline(topic, kbText) {
        if (AppState.cancelRequested) throw new Error('CanceledByUser');

        const apiKey = AppState.googleApiKey;
        const userChoice = document.getElementById('sel-text-model').value;
        const slideCount = document.getElementById('range-slide-count').value;
        const flowDir = document.getElementById('sel-flowchart-dir').value;
        const templateStyleKey = document.getElementById('sel-template').value;
        const templateObj = TEMPLATES[templateStyleKey];
        const userBgHex = document.getElementById('slide-bg-hex').value;
        const needImage = document.getElementById('sel-need-image').value === 'YES';

        let flowRules = flowDir === 'NONE' 
            ? "絕對不要生成 mermaid_code 與 flowchart。" 
            : `如果需要表達架構/流程，請使用 mermaid_code (格式: graph ${flowDir} 等)。不要在 HTML 中寫死圖表。`;

        let imgRules = needImage 
            ? "若要插入圖片，請在 html_code 中加入 `<img class=\"ai-img-placeholder\" style=\"...\">` 並提供 `image_prompt`。" 
            : "絕對不要插入圖片，請完全利用 HTML 排版與文字撐滿畫面。";

        const systemPrompt = `你是一位世界頂級的網頁設計師與簡報內容策略師。
請以「HTML/CSS」作為投影片排版語言，為以下主題生成一份具備極高知識密度、精美排版的簡報 JSON。

【排版與視覺限制 - 極度重要】：
1. 每張投影片的 \`html_code\` 必須是一個最外層的 <div>，且帶有行內樣式：\`style="width:1280px; height:720px; background-color:${userBgHex}; color:${templateObj.textColor}; font-family:${templateObj.font}; position:relative; overflow:hidden; box-sizing:border-box; padding:60px;"\`。
2. 你可以使用 Tailwind CSS classes 或 Inline CSS 進行內部排版（例如 flex, grid, absolute positioning）。
3. 重點強調色 (Accent Color) 為：${templateObj.accent}。標題顏色為：${templateObj.titleColor}。
4. 排版必須豐富滿版 (Full-bleed 概念)，不可讓右側或下方留白太多。可使用大字體、格狀版型(Grid) 或並排卡片(Cards) 來呈現數據。
5. ${imgRules}
6. ${flowRules} (如果產生 mermaid_code，請在 html_code 預留 \`<div class="mermaid-placeholder" style="width:100%; height:400px;"></div>\`)
7. 回傳純 JSON，不可有 markdown 標籤。

JSON Schema:
{
  "presentation_title": "標題",
  "slides": [
    { 
      "slide_number": 1, 
      "html_code": "<div style='width:1280px;height:720px;...'><h1 style='color:${templateObj.titleColor};font-size:64px;'>...</h1><div class='flex'>...</div></div>", 
      "image_prompt": "English prompt for image generation OR null", 
      "mermaid_code": "graph TD... OR null" 
    }
  ]
}`;

        const uniqueModels = [...new Set([userChoice, 'gemini-3.1-pro-preview', 'gemini-2.5-pro', 'gemini-2.5-flash'])];
        
        // 組合 KB text
        let fullContext = topic;
        const links = document.getElementById('kb-links-area').value.trim();
        if (kbText || links) {
            fullContext += `\n\n【參考資料/知識庫】\n${kbText}\n連結：${links}`;
        }

        let lastErr = null;
        for (const modelId of uniqueModels) {
            if (AppState.cancelRequested) throw new Error('CanceledByUser');
            const ver = getGeminiApiVersion(modelId);
            const endpoint = `https://generativelanguage.googleapis.com/${ver}/models/${modelId}:generateContent?key=${apiKey}`;
            try {
                addLog(`嘗試呼叫前端設計引擎 ${modelId} (${ver})...`, 'ai');
                const resp = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: 'user', parts: [{ text: systemPrompt + "\n\n主題與內容：\n" + fullContext }] }],
                        generationConfig: { responseMimeType: 'application/json', temperature: 0.8, maxOutputTokens: 8192 }
                    }),
                    signal: AppState.abortController.signal
                });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();
                let raw = data.candidates[0].content.parts[0].text;
                const jsonMatch = raw.match(/\{[\s\S]*\}/);
                if (jsonMatch) raw = jsonMatch[0];

                addLog(`✓ 成功使用 ${modelId} 生成 HTML 架構大綱`, 'success');
                return JSON.parse(raw);
            } catch (e) {
                lastErr = e;
                if (e.name === 'AbortError') throw new Error('CanceledByUser');
                addLog(`⚠ ${modelId} 失敗: ${e.message}，切換備用模型...`, 'warning');
            }
        }
        throw new Error(`所有引擎皆失敗。最後錯誤: ${lastErr.message}`);
    }

    async function buildImagePrompt(query) {
        const gKey = AppState.googleApiKey;
        if (!gKey) return `Professional 4k illustration: ${query}`;
        try {
            const r = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${gKey}`,
                {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: 'user', parts: [{ text: `Create a highly detailed English image generation prompt (max 30 words) based on: "${query}". Style: Minimalist corporate illustration, 4k. Return ONLY the prompt.` }] }],
                        generationConfig: { maxOutputTokens: 100, temperature: 0.6 }
                    }),
                    signal: AppState.abortController.signal
                }
            );
            return (await r.json()).candidates?.[0]?.content?.parts?.[0]?.text?.trim() || `Professional illustration: ${query}`;
        } catch { return `Professional illustration: ${query}`; }
    }

    async function generateImage(imagePrompt, slideNum) {
        if (AppState.cancelRequested) throw new Error('CanceledByUser');
        const finalPrompt = await buildImagePrompt(imagePrompt);
        const preferredModel = document.getElementById('sel-img-model').value;
        const fallbackQueue = [...new Set([preferredModel, 'grok-imagine-image-pro', 'grok-imagine-image', 'gemini-3.1-flash-image-preview', 'gemini-2.5-flash-image'])];

        for (const model of fallbackQueue) {
            if (AppState.cancelRequested) throw new Error('CanceledByUser');
            try {
                addLog(`🎨 呼叫配圖引擎 ${model}...`, 'ai');
                if (model.startsWith('grok')) {
                    if (!AppState.xaiApiKey) continue;
                    const r = await fetch(`${GROK_PROXY}?url=${encodeURIComponent(GROK_IMG_API)}`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${AppState.xaiApiKey}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ model: model, prompt: finalPrompt, response_format: 'b64_json' }),
                        signal: AppState.abortController.signal
                    });
                    if (r.ok) {
                        const item = (await r.json()).data?.[0];
                        if (item && item.b64_json) return `data:image/png;base64,${item.b64_json}`;
                    }
                } else if (model.startsWith('gemini')) {
                    if (!AppState.googleApiKey) continue;
                    const ver = model.includes('preview') ? 'v1alpha' : 'v1beta';
                    const r = await fetch(`https://generativelanguage.googleapis.com/${ver}/models/${model}:generateContent?key=${AppState.googleApiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: finalPrompt }] }], generationConfig: { responseModalities: ['TEXT', 'IMAGE'] } }),
                        signal: AppState.abortController.signal
                    });
                    if (r.ok) {
                        const imgPart = (await r.json()).candidates?.[0]?.content?.parts?.find(p => p.inlineData?.mimeType?.startsWith('image/'));
                        if (imgPart?.inlineData?.data) return `data:${imgPart.inlineData.mimeType};base64,${imgPart.inlineData.data}`;
                    }
                }
            } catch (e) {
                if (e.name === 'AbortError') throw new Error('CanceledByUser');
            }
        }
        return null;
    }

    async function mermaidToSvgBase64(code) {
        const container = document.getElementById('mermaid-render-container');
        let safeCode = code.replace(/```mermaid/gi, '').replace(/```/g, '').trim();
        try {
            const uniqueId = 'mmr-' + Date.now() + '-' + Math.floor(Math.random() * 10000);
            const { svg } = await mermaid.render(uniqueId, safeCode, container);
            const base64 = btoa(unescape(encodeURIComponent(svg)));
            return `data:image/svg+xml;base64,${base64}`;
        } catch (e) { 
            console.warn("Mermaid 渲染失敗:", e);
            return null; 
        }
    }

    async function startGeneration() {
        if (!AppState.googleApiKey) { showToast('❌ 請設定 Gemini API Key'); return; }
        const topic = document.getElementById('inp-topic').value.trim();
        if (!topic) { showToast('❌ 請輸入主題'); return; }

        AppState.isGenerating = true;
        AppState.cancelRequested = false;
        AppState.abortController = new AbortController();
        AppState.finalSlideImages = [];

        document.getElementById('section-empty').classList.add('hidden');
        document.getElementById('section-progress').classList.remove('hidden');
        document.getElementById('section-preview').classList.add('hidden');
        document.getElementById('log-container').innerHTML = '';
        document.getElementById('progress-bar').style.width = '5%';
        document.getElementById('btn-download').classList.add('hidden');
        
        document.getElementById('btn-generate').classList.add('hidden');
        document.getElementById('btn-stop').classList.remove('hidden');
        document.getElementById('btn-stop').disabled = false;

        try {
            // 合併知識庫文字
            let kbCombined = AppState.kbDocs.filter(d => d).map(d => `[${d.name}]\n${d.text}`).join('\n\n');

            const data = await callGeminiForHTMLOutline(topic, kbCombined);
            if (AppState.cancelRequested) throw new Error('CanceledByUser');
            AppState.presentationData = data;
            document.getElementById('progress-bar').style.width = '20%';

            const needImage = document.getElementById('sel-need-image').value === 'YES';
            const maxImages = needImage ? parseInt(document.getElementById('range-image-count').value) : 0;
            let imagesGenerated = 0;

            const slides = data.slides || [];
            const htmlStage = document.getElementById('html-render-stage');
            
            const pres = new PptxGenJS();
            pres.layout = 'LAYOUT_WIDE'; // 16:9

            for (let i = 0; i < slides.length; i++) {
                if (AppState.cancelRequested) throw new Error('CanceledByUser');
                const sData = slides[i];
                addLog(`正在編譯第 ${sData.slide_number} 頁 HTML...`, 'info');

                // 注入 HTML
                htmlStage.innerHTML = sData.html_code;
                const slideDiv = htmlStage.firstElementChild;
                
                // 強制加入 Logo (若有)
                if (AppState.logoBase64) {
                    const pos = document.getElementById('sel-logo-pos').value;
                    let style = "position:absolute; width:120px; height:auto; z-index:9999;";
                    if(pos==='TR') style += "top:30px; right:30px;";
                    if(pos==='BR') style += "bottom:30px; right:30px;";
                    if(pos==='TL') style += "top:30px; left:30px;";
                    if(pos==='BL') style += "bottom:30px; left:30px;";
                    const logoImg = document.createElement('img');
                    logoImg.src = AppState.logoBase64;
                    logoImg.style.cssText = style;
                    slideDiv.appendChild(logoImg);
                }

                // 處理生圖
                if (needImage && sData.image_prompt && imagesGenerated < maxImages) {
                    const imgHolders = slideDiv.querySelectorAll('.ai-img-placeholder, img');
                    if (imgHolders.length > 0) {
                        const imgB64 = await generateImage(sData.image_prompt, sData.slide_number);
                        if (imgB64) {
                            imgHolders.forEach(el => { el.src = imgB64; el.style.objectFit = 'cover'; });
                            imagesGenerated++;
                        }
                    }
                }

                // 處理流程圖
                if (sData.mermaid_code) {
                    const mHolders = slideDiv.querySelectorAll('.mermaid-placeholder, div.mermaid');
                    if (mHolders.length > 0) {
                        const svgB64 = await mermaidToSvgBase64(sData.mermaid_code);
                        if (svgB64) {
                            mHolders.forEach(el => {
                                const img = document.createElement('img');
                                img.src = svgB64;
                                img.style.width = '100%'; img.style.height = '100%'; img.style.objectFit = 'contain';
                                el.replaceWith(img);
                            });
                        }
                    }
                }

                // 等待圖片與字體渲染 (給瀏覽器一個呼吸時間)
                await new Promise(r => setTimeout(r, 200));

                // ★ 核心魔法：使用 html2canvas 將 HTML 轉換為高畫質圖片 ★
                const canvas = await html2canvas(slideDiv, { scale: 2, useCORS: true, backgroundColor: null });
                const slideBase64 = canvas.toDataURL('image/png');
                AppState.finalSlideImages.push(slideBase64);

                // 放入 PPTX (全滿版)
                const pptSlide = pres.addSlide();
                pptSlide.addImage({ data: slideBase64, x: 0, y: 0, w: 10, h: 5.625 });

                document.getElementById('progress-bar').style.width = `${20 + ((i+1)/slides.length)*75}%`;
            }

            AppState.pptxObject = pres;
            addLog('PPTX 組裝完成！', 'success');
            document.getElementById('progress-bar').style.width = '100%';
            document.getElementById('btn-download').classList.remove('hidden');
            document.getElementById('btn-download').classList.add('flex');
            showToast('✅ 簡報已就緒');
            
            renderSlidesPreview();

        } catch (e) {
            if (e.name === 'AbortError' || e.message === 'CanceledByUser') {
                addLog('⛔ 生成已中斷。', 'warning');
            } else {
                addLog(e.message, 'error');
                console.error(e);
            }
        } finally {
            AppState.isGenerating = false;
            document.getElementById('btn-stop').classList.add('hidden');
            document.getElementById('btn-generate').classList.remove('hidden');
        }
    }

    function renderSlidesPreview() {
        const list = document.getElementById('slides-preview-list');
        list.innerHTML = '';
        AppState.finalSlideImages.forEach((b64, idx) => {
            const div = document.createElement('div');
            div.className = 'bg-slate-900 border border-slate-800 p-2 rounded-xl text-center';
            div.innerHTML = `
                <div class="text-xs font-bold text-violet-400 mb-2 text-left px-2">PAGE ${idx+1}</div>
                <img src="${b64}" class="slide-preview-img">
            `;
            list.appendChild(div);
        });
        document.getElementById('section-preview').classList.remove('hidden');
    }

    async function downloadPptx() {
        if (!AppState.pptxObject) return;
        const name = (AppState.presentationData?.presentation_title || 'NOVA_Pro_HTML_Slide').replace(/\s/g, '_') + '.pptx';
        await AppState.pptxObject.writeFile({ fileName: name });
    }
    </script>
