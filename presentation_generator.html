<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 簡報生成器 · NOVA 120 Pro</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'Noto Sans TC', 'sans-serif'] },
                    colors: { slate: { 925: '#0f172a' } },
                    animation: { 'shimmer': 'shimmer 2s linear infinite', 'fade-in': 'fadeIn 0.4s ease-out' }
                }
            }
        }
    </script>

    <style>
        :root { background-color: #020617; color-scheme: dark; }
        html, body { background-color: #020617; min-height: 100vh; font-family: 'Plus Jakarta Sans', 'Noto Sans TC', sans-serif; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        .panel-body { overflow: hidden; max-height: 0; transition: max-height 0.35s ease-in-out, opacity 0.3s ease; opacity: 0; }
        .panel-body.open { max-height: 2000px; opacity: 1; }
        .drop-zone { border: 2px dashed #475569; transition: all 0.25s ease; }
        .drop-zone:hover { border-color: #818cf8; background-color: rgba(99, 102, 241, 0.08); }

        .layout-text_only { background: #1a2e1a; color: #86efac; }
        .layout-text_and_image { background: #2d1b4e; color: #c4b5fd; }
        .layout-flowchart_only { background: #3b1f0e; color: #fdba74; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <div id="mermaid-render-container" style="position:fixed; top:-9999px; left:-9999px; width:2560px; height:1440px; visibility:hidden; pointer-events:none;"></div>

    <header class="sticky top-0 z-50 bg-slate-950/90 backdrop-blur-xl border-b border-slate-800/70">
        <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between gap-3">
            <div class="flex items-center gap-3 min-w-0">
                <a href="./index.html" class="flex items-center gap-1.5 text-slate-400 hover:text-white text-sm font-medium">
                    <i class="ph-bold ph-arrow-left"></i><span>返回 NOVA 120</span>
                </a>
                <div class="w-px h-5 bg-slate-700"></div>
                <h1 class="text-sm font-bold text-white truncate">AI 簡報生成器 Pro</h1>
            </div>
            <div class="flex items-center gap-2">
                <div id="header-model-badge" class="hidden sm:flex items-center gap-1.5 text-xs text-slate-400 bg-slate-800 border border-slate-700 px-2.5 py-1 rounded-full">
                    <i class="ph-fill ph-cpu text-violet-400"></i><span id="header-model-name">檢測中</span>
                </div>
                <button id="btn-download" onclick="downloadPptx()" class="hidden items-center gap-2 bg-emerald-500 hover:bg-emerald-400 text-white text-xs font-bold px-3 py-2 rounded-xl transition-all shadow-lg">
                    <i class="ph-bold ph-download-simple"></i><span>下載 PPTX</span>
                </button>
                <button id="btn-generate" onclick="startGeneration()" class="flex items-center gap-2 bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-500 text-white text-xs font-bold px-3 py-2 rounded-xl transition-all shadow-lg">
                    <i class="ph-bold ph-sparkle"></i><span>開始生成</span>
                </button>
                <button id="btn-stop" onclick="stopGeneration()" class="hidden items-center gap-2 bg-rose-600 hover:bg-rose-500 text-white text-xs font-bold px-3 py-2 rounded-xl transition-all shadow-lg">
                    <i class="ph-bold ph-stop"></i><span>停止生成</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6 flex flex-col lg:flex-row gap-5">
        <aside class="lg:w-80 xl:w-96 flex flex-col gap-4 shrink-0">
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 flex items-center gap-3">
                <i class="ph-fill ph-key text-blue-400"></i>
                <div class="flex-1 text-[11px] text-slate-400 truncate">
                    Gemini Key: <span id="api-gemini-status">...</span>
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden">
                <button onclick="togglePanel('panel-config')" class="w-full flex items-center justify-between p-4 hover:bg-slate-800/50">
                    <div class="flex items-center gap-2.5">
                        <i class="ph-fill ph-sliders-horizontal text-amber-400"></i>
                        <span class="text-sm font-semibold text-white">進階細節指定</span>
                    </div>
                    <i id="panel-config-icon" class="ph-bold ph-caret-down text-slate-400 transition-transform"></i>
                </button>
                <div id="panel-config" class="panel-body open">
                    <div class="px-4 pb-4 space-y-4 text-xs">
                        
                        <div>
                            <label class="block text-slate-400 mb-1.5 font-semibold">首選文字模型 (LLM)</label>
                            <select id="sel-text-model" onchange="updateHeaderBadge()" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-2.5 text-slate-200 focus:border-amber-500 outline-none">
                                <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro Preview (最新旗艦)</option>
                                <option value="gemini-3-flash-preview">Gemini 3 Flash Preview (最新快速)</option>
                                <option value="gemini-2.5-pro" selected>Gemini 2.5 Pro (深度邏輯推薦)</option>
                                <option value="gemini-2.5-flash">Gemini 2.5 Flash (快速均衡)</option>
                                <option value="gemini-2.0-flash-exp">Gemini 2.0 Flash Exp</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-slate-400 mb-1.5 font-semibold">首選配圖模型 (Image)</label>
                            <select id="sel-img-model" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-2.5 text-slate-200 focus:border-amber-500 outline-none">
                                <option value="grok-imagine-image-pro">Grok Imagine Image Pro (推薦)</option>
                                <option value="grok-imagine-image">Grok Imagine Image</option>
                                <option value="gemini-3.1-flash-image-preview">Gemini 3.1 Flash Image</option>
                                <option value="gemini-2.5-flash-image">Gemini 2.5 Flash Image</option>
                            </select>
                            <p class="text-slate-500 text-[10px] mt-1">若失敗會自動依序降級調用其他模型</p>
                        </div>

                        <div>
                            <label class="block text-slate-400 mb-1.5 font-semibold">簡報視覺風格 (Template)</label>
                            <select id="sel-template" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-2.5 text-slate-200 focus:border-amber-500 outline-none">
                                <option value="modern">現代極簡 (Modern Minimalist)</option>
                                <option value="tech">科技未來 (Tech Future)</option>
                                <option value="corporate">商務專業 (Corporate Professional)</option>
                                <option value="creative">活潑創意 (Creative & Playful)</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-slate-400 mb-1.5 font-semibold">投影片背景底色</label>
                            <div class="flex gap-2">
                                <input type="color" id="slide-bg-color" value="#0F172A" class="h-9 w-12 bg-transparent border-none cursor-pointer">
                                <input type="text" id="slide-bg-hex" value="#0F172A" class="flex-1 bg-slate-950 border border-slate-700 rounded-xl px-3 text-slate-200 outline-none" oninput="document.getElementById('slide-bg-color').value=this.value">
                            </div>
                        </div>

                        <div>
                            <label class="block text-slate-400 mb-1.5 font-semibold">流程圖種類</label>
                            <select id="sel-flowchart-dir" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-2.5 text-slate-200 focus:border-amber-500 outline-none">
                                <option value="TD">由上至下 (Top-Down)</option>
                                <option value="LR">由左至右 (Left-Right)</option>
                                <option value="PIE">環形比例圖 (Pie Chart)</option>
                                <option value="MINDMAP">心智圖 (Mindmap)</option>
                                <option value="TIMELINE">時間軸 (Timeline)</option>
                                <option value="SEQUENCE">交互循序圖 (Sequence)</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-slate-400 mb-1.5 font-semibold flex justify-between">
                                <span>投影片張數</span><span id="slide-count-val" class="text-amber-400 font-bold">10 張</span>
                            </label>
                            <input type="range" id="range-slide-count" min="5" max="20" value="10" oninput="document.getElementById('slide-count-val').textContent = this.value + ' 張'" class="w-full">
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <div class="flex-1 min-w-0 flex flex-col gap-5">
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5">
                <label class="block text-sm font-semibold text-white mb-3"><i class="ph-fill ph-pencil-simple-line text-violet-400"></i> 簡報主題 / 指令 (請盡量詳細)</label>
                <textarea id="inp-topic" rows="4" placeholder="例如：請幫我生成一份深入探討「2025 AI 發展趨勢」的專業報告，內容需包含大量數據、具體案例與未來預測，不要流於空泛..." class="w-full bg-slate-950 border border-slate-700 rounded-xl p-3.5 text-sm text-slate-200 focus:border-violet-500 outline-none transition-colors"></textarea>
            </div>

            <div id="section-progress" class="hidden bg-slate-900 border border-slate-800 rounded-2xl p-5">
                <div class="flex items-center gap-2.5 mb-4">
                    <div id="progress-spinner" class="w-5 h-5 border-2 border-violet-500 border-t-transparent rounded-full animate-spin"></div>
                    <div class="flex-1 bg-slate-800 rounded-full h-1.5"><div id="progress-bar" class="h-1.5 bg-gradient-to-r from-violet-500 to-indigo-500 rounded-full transition-all" style="width: 0%"></div></div>
                    <span id="progress-pct" class="text-xs font-bold text-violet-400">0%</span>
                </div>
                <div id="log-container" class="space-y-1.5 max-h-52 overflow-y-auto text-[11px] no-scrollbar"></div>
            </div>

            <div id="section-preview" class="hidden"><div id="slides-preview-list" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div></div>
            
            <div id="section-empty" class="flex-1 flex flex-col items-center justify-center py-20 text-center">
                <div class="w-20 h-20 bg-violet-500/10 rounded-3xl flex items-center justify-center mb-5 border border-violet-500/20">
                    <i class="ph-bold ph-presentation-chart text-violet-400 text-3xl"></i>
                </div>
                <h2 class="text-xl font-bold text-white mb-2">準備好 Pro 等級的簡報了嗎？</h2>
                <p class="text-slate-500 text-sm max-w-sm">左側可精確指定模型、底色與版型風格，系統將自動套用動態排版，生成高解析度 16:9 專業簡報。</p>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[200] bg-slate-800 text-white text-sm font-medium px-4 py-2.5 rounded-xl shadow-2xl border border-slate-700 opacity-0 transition-all pointer-events-none translate-y-4"></div>

    <script>
    const AppState = {
        googleApiKey: '', xaiApiKey: '',
        kbDocs: [], logoBase64: null, coverBase64: null,
        pptxObject: null, presentationData: null,
        isGenerating: false,
        cancelRequested: false,       
        abortController: null         
    };

    const GROK_PROXY   = 'https://grokcaller.kirishimatoka00.workers.dev/';
    const GROK_IMG_API = 'https://api.x.ai/v1/images/generations';

    const TEMPLATES = {
        modern: { accent: '64748B', titleColor: 'FFFFFF', textColor: 'E2E8F0', font: 'Arial' },
        tech: { accent: '0EA5E9', titleColor: '38BDF8', textColor: 'BAE6FD', font: 'Courier New' },
        corporate: { accent: '2563EB', titleColor: 'FFFFFF', textColor: 'BFDBFE', font: 'Arial' },
        creative: { accent: 'EC4899', titleColor: 'F9A8D4', textColor: 'FBCFE8', font: 'Verdana' }
    };

    function init() {
        AppState.googleApiKey = localStorage.getItem('nova_key_gemini') || '';
        AppState.xaiApiKey = localStorage.getItem('nova_key_grok') || '';
        document.getElementById('api-gemini-status').textContent = AppState.googleApiKey ? '✓ 已設定' : '❌ 未設定';
        updateHeaderBadge();
        
        mermaid.initialize({ 
            startOnLoad: false, 
            theme: 'dark', 
            securityLevel: 'loose',
            themeVariables: { fontSize: '28px' } 
        });
    }

    document.addEventListener('DOMContentLoaded', init);

    function togglePanel(id) {
        document.getElementById(id).classList.toggle('open');
        document.getElementById(id + '-icon').classList.toggle('rotate-180');
    }

    function showToast(m) {
        const t = document.getElementById('toast');
        t.textContent = m; t.classList.remove('opacity-0', 'translate-y-4'); t.classList.add('opacity-100', 'translate-y-0');
        setTimeout(() => { t.classList.add('opacity-0', 'translate-y-4'); t.classList.remove('opacity-100', 'translate-y-0'); }, 2500);
    }

    function updateHeaderBadge() {
        const s = document.getElementById('sel-text-model');
        document.getElementById('header-model-name').textContent = s.options[s.selectedIndex].text;
    }

    function addLog(m, type = 'info') {
        const c = document.getElementById('log-container');
        const i = document.createElement('div');
        const colors = { info: 'text-slate-300', success: 'text-emerald-300', warning: 'text-amber-300', error: 'text-rose-300', ai: 'text-violet-300' };
        i.className = `py-0.5 ${colors[type]}`;
        i.textContent = `[${new Date().toLocaleTimeString()}] ${m}`;
        c.appendChild(i); c.scrollTop = c.scrollHeight;
    }

    function getGeminiApiVersion(modelName) {
        if (modelName.includes('preview') || modelName.includes('exp') || modelName.includes('gemini-3')) {
            return 'v1alpha';
        }
        return 'v1beta';
    }

    function stopGeneration() {
        if (AppState.isGenerating) {
            AppState.cancelRequested = true;
            if (AppState.abortController) {
                AppState.abortController.abort();
            }
            addLog('⚠️ 使用者要求中斷生成...', 'warning');
            document.getElementById('btn-stop').disabled = true;
            document.getElementById('btn-stop').querySelector('span').textContent = '正在中止...';
        }
    }

    /** 1. 增強 LLM 生成深度的 Prompt 設計 **/
    async function callGeminiForOutline(topic, kb) {
        if (AppState.cancelRequested) throw new Error('CanceledByUser');

        const apiKey = AppState.googleApiKey;
        const userChoice = document.getElementById('sel-text-model').value;
        const slideCount = document.getElementById('range-slide-count').value;
        const flowDir = document.getElementById('sel-flowchart-dir').value;
        const templateStyle = document.getElementById('sel-template').options[document.getElementById('sel-template').selectedIndex].text;

        const FALLBACK_MODELS = [
            userChoice,
            'gemini-3.1-pro-preview',
            'gemini-2.5-pro',
            'gemini-3-flash-preview',
            'gemini-2.5-flash'
        ];
        const uniqueModels = [...new Set(FALLBACK_MODELS)];

        let flowchartPrompt = "";
        switch(flowDir) {
            case 'PIE': flowchartPrompt = "mermaid_code 必須使用 pie chart 語法，例如: pie title 分布圖 \\n \"A\" : 40 \\n \"B\" : 60"; break;
            case 'MINDMAP': flowchartPrompt = "mermaid_code 必須使用 mindmap 語法，例如: mindmap \\n root((主題)) \\n   分支1 \\n   分支2"; break;
            case 'TIMELINE': flowchartPrompt = "mermaid_code 必須使用 timeline 語法，例如: timeline \\n title 發展歷史 \\n 2023 : 事件A \\n 2024 : 事件B"; break;
            case 'SEQUENCE': flowchartPrompt = "mermaid_code 必須使用 sequenceDiagram 語法，例如: sequenceDiagram \\n A->>B: 請求 \\n B-->>A: 回應"; break;
            default: flowchartPrompt = `mermaid_code 必須以 graph ${flowDir} 開頭進行繪製。`;
        }

        const systemPrompt = `你是一位世界頂級的簡報內容策略師與商業分析師。
請以 16:9 寬螢幕佈局思維，為以下主題生成一份【具備極高知識密度、深度分析與具體數據】的專業簡報 JSON。

簡報視覺與文案風格：${templateStyle}
目標投影片張數：${slideCount} 張
流程圖要求：${flowchartPrompt}

【內容品質要求 - 極度重要】：
1. 拒絕空泛：內容絕對不可只有「大綱式」或「名詞解釋」。必須包含具體案例、數據預估、優劣勢比較或深度邏輯推演。
2. 內容飽滿：每張投影片的 \`bullet_points\` 必須提供 3 到 5 點，且每點文字長度必須足夠長（約 15~40 字），以確保寬螢幕排版顯得豐滿充實。
3. 嚴格輸出純 JSON，不可包含 markdown 標籤（絕對不要輸出 \`\`\`json 標記）。
4. layout 只能是: "title_only", "text_only", "text_and_image", "flowchart_only"。
5. flowchart_only 必須包含 mermaid_code。mermaid_code 的節點文字請勿使用括號 ()、方括號 [] 或雙引號 "" 等特殊符號，以免造成渲染錯誤。字串內換行用 '\\n'。
6. image_prompt 必須是簡短的英文敘述（AI 繪圖提示詞），具體描述畫面中的物件、風格、光影。

JSON Schema:
{
  "presentation_title": "標題",
  "slides": [
    { "slide_number": 1, "layout": "title_only", "title": "...", "subtitle": "...", "bullet_points": ["內容飽滿的一句話...","具體數據佐證的第二句話..."], "image_prompt": "English prompt", "mermaid_code": null }
  ]
}`;
        let lastErr = null;
        for (const modelId of uniqueModels) {
            if (AppState.cancelRequested) throw new Error('CanceledByUser');
            const ver = getGeminiApiVersion(modelId);
            const endpoint = `https://generativelanguage.googleapis.com/${ver}/models/${modelId}:generateContent?key=${apiKey}`;
            try {
                addLog(`嘗試呼叫強邏輯引擎 ${modelId} (${ver})...`, 'ai');
                const resp = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: 'user', parts: [{ text: systemPrompt + "\n\n主題指令：" + topic + (kb ? "\n參考資料：" + kb : "") }] }],
                        generationConfig: { 
                            responseMimeType: 'application/json', 
                            temperature: 0.85, // 提高一點溫度，讓內容更豐富且具創造力
                            maxOutputTokens: 8192 // 確保長篇距不被截斷
                        }
                    }),
                    signal: AppState.abortController.signal
                });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();
                let raw = data.candidates[0].content.parts[0].text;
                
                const jsonMatch = raw.match(/\{[\s\S]*\}/);
                if (jsonMatch) raw = jsonMatch[0];

                addLog(`✓ 成功使用 ${modelId} 生成深度大綱`, 'success');
                return JSON.parse(raw);
            } catch (e) {
                lastErr = e;
                if (e.name === 'AbortError') throw new Error('CanceledByUser');
                addLog(`⚠ ${modelId} 失敗: ${e.message}，準備降級切換...`, 'warning');
            }
        }
        throw new Error(`所有文字引擎皆失敗。最後錯誤: ${lastErr.message}`);
    }

    async function buildImagePrompt(query) {
        const gKey = AppState.googleApiKey;
        if (!gKey) return `High quality modern presentation illustration: ${query}`;
        try {
            const r = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${gKey}`,
                {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: 'user', parts: [{ text: `Create a highly detailed, extremely concise English image generation prompt (max 40 words) for a presentation slide about: "${query}". Minimalist, professional corporate illustration style, 4k resolution.` }] }],
                        generationConfig: { maxOutputTokens: 100, temperature: 0.6 }
                    }),
                    signal: AppState.abortController.signal
                }
            );
            return (await r.json()).candidates?.[0]?.content?.parts?.[0]?.text?.trim() || `Professional illustration: ${query}`;
        } catch { return `Professional business illustration: ${query}`; }
    }

    async function generateImage(imagePrompt, slideNum) {
        if (AppState.cancelRequested) throw new Error('CanceledByUser');
        addLog(`為第 ${slideNum} 頁優化繪圖提示詞...`, 'info');
        const finalPrompt = await buildImagePrompt(imagePrompt);
        
        const preferredModel = document.getElementById('sel-img-model').value;
        const fallbackQueue = [
            preferredModel,
            'grok-imagine-image-pro',
            'grok-imagine-image',
            'gemini-3.1-flash-image-preview',
            'gemini-2.5-flash-image'
        ];
        const uniqueModels = [...new Set(fallbackQueue)];

        for (const model of uniqueModels) {
            if (AppState.cancelRequested) throw new Error('CanceledByUser');
            try {
                addLog(`🎨 嘗試呼叫配圖引擎 ${model}...`, 'ai');
                if (model.startsWith('grok')) {
                    if (!AppState.xaiApiKey) {
                        addLog(`⚠ 缺少 Grok Key，跳過 ${model}`, 'warning');
                        continue;
                    }
                    const r = await fetch(`${GROK_PROXY}?url=${encodeURIComponent(GROK_IMG_API)}`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${AppState.xaiApiKey}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ model: model, prompt: finalPrompt, response_format: 'b64_json' }),
                        signal: AppState.abortController.signal
                    });
                    if (r.ok) {
                        const item = (await r.json()).data?.[0];
                        if (item && item.b64_json) {
                            addLog(`✓ 成功使用 ${model} 生成高品質配圖`, 'success');
                            return `data:image/png;base64,${item.b64_json}`;
                        }
                    }
                } else if (model.startsWith('gemini')) {
                    if (!AppState.googleApiKey) continue;
                    const ver = model.includes('preview') ? 'v1alpha' : 'v1beta';
                    const r = await fetch(`https://generativelanguage.googleapis.com/${ver}/models/${model}:generateContent?key=${AppState.googleApiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: finalPrompt }] }], generationConfig: { responseModalities: ['TEXT', 'IMAGE'] } }),
                        signal: AppState.abortController.signal
                    });
                    if (r.ok) {
                        const imgPart = (await r.json()).candidates?.[0]?.content?.parts?.find(p => p.inlineData?.mimeType?.startsWith('image/'));
                        if (imgPart?.inlineData?.data) {
                            addLog(`✓ 成功使用 ${model} 生成高品質配圖`, 'success');
                            return `data:${imgPart.inlineData.mimeType};base64,${imgPart.inlineData.data}`;
                        }
                    }
                }
            } catch (e) {
                if (e.name === 'AbortError') throw new Error('CanceledByUser');
                addLog(`⚠ ${model} 失敗: ${e.message}`, 'warning');
            }
        }
        addLog(`⚠ 所有配圖引擎失敗，將保留空白框架`, 'error');
        return null;
    }

    /** * 2. 動態排版引擎 (Dynamic Layout Engine)
     * 解決「裁切形狀單調」與「版面利用率」問題 
     */

    function renderTextOnly(slide, slideData, themeConfig) {
        // 大面積滿版文字排版
        slide.addText(slideData.title || '', { x: 0.5, y: 0.4, w: 9.0, h: 1.0, fontSize: 38, bold: true, color: themeConfig.titleColor, fontFace: themeConfig.font });
        slide.addShape('rect', { x: 0.5, y: 1.4, w: 2.5, h: 0.06, fill: { color: themeConfig.accent } });
        
        if (slideData.bullet_points) {
            // 利用 16:9 全寬幅空間
            slide.addText(slideData.bullet_points.map(b => ({ text: b, options: { bullet: true, paraSpaceAfter: 15 } })), {
                x: 0.5, y: 1.8, w: 9.0, h: 3.5, fontSize: 22, color: themeConfig.textColor, valign: 'top', fontFace: themeConfig.font, lineSpacingMultiple: 1.3
            });
        }
    }

    function renderTextAndImage(slide, slideData, imgB64, themeConfig, slideIndex) {
        // 利用頁碼的奇偶數或隨機因子來決定當頁的排版風格
        const layoutStyle = slideIndex % 3; // 產生 0, 1, 2 三種風格交替

        slide.addText(slideData.title || '', { x: 0.5, y: 0.3, w: 9.0, h: 0.8, fontSize: 34, bold: true, color: themeConfig.titleColor, fontFace: themeConfig.font });
        slide.addShape('rect', { x: 0.5, y: 1.15, w: 1.5, h: 0.05, fill: { color: themeConfig.accent } });

        const formattedBullets = slideData.bullet_points ? slideData.bullet_points.map(b => ({ text: b, options: { bullet: true, paraSpaceAfter: 12 } })) : [];

        if (layoutStyle === 0) {
            // 【風格 A：傳統圖右文左】
            slide.addText(formattedBullets, { x: 0.5, y: 1.4, w: 5.0, h: 3.8, fontSize: 18, color: themeConfig.textColor, valign: 'top', fontFace: themeConfig.font, lineSpacingMultiple: 1.2 });
            if (imgB64) {
                slide.addImage({ data: imgB64, x: 5.7, y: 1.2, w: 4.0, h: 4.0, rounding: true });
            } else {
                slide.addShape('rect', { x: 5.7, y: 1.2, w: 4.0, h: 4.0, fill: { color: themeConfig.accent, transparency: 80 } });
            }
        } 
        else if (layoutStyle === 1) {
            // 【風格 B：圖文反轉 (圖左文右)，並使用特殊裁切/比例】
            if (imgB64) {
                // 將圖片裁切為更細長的直式或較大的方塊
                slide.addImage({ data: imgB64, x: 0.5, y: 1.4, w: 3.8, h: 3.8, rounding: true });
            } else {
                slide.addShape('rect', { x: 0.5, y: 1.4, w: 3.8, h: 3.8, fill: { color: themeConfig.accent, transparency: 80 } });
            }
            slide.addText(formattedBullets, { x: 4.6, y: 1.4, w: 5.0, h: 3.8, fontSize: 18, color: themeConfig.textColor, valign: 'top', fontFace: themeConfig.font, lineSpacingMultiple: 1.2 });
        }
        else {
            // 【風格 C：橫幅寬排版 (圖上文下，適合大圖片展示)】
            if (imgB64) {
                slide.addImage({ data: imgB64, x: 0.5, y: 1.3, w: 9.0, h: 2.2, rounding: true });
            } else {
                slide.addShape('rect', { x: 0.5, y: 1.3, w: 9.0, h: 2.2, fill: { color: themeConfig.accent, transparency: 80 } });
            }
            // 文字分為雙欄 (PptxGenJS 支援簡易分欄法：縮小寬度，這裡我們簡化為下方橫置)
            slide.addText(formattedBullets, { x: 0.5, y: 3.7, w: 9.0, h: 1.8, fontSize: 16, color: themeConfig.textColor, valign: 'top', fontFace: themeConfig.font, lineSpacingMultiple: 1.1 });
        }
    }

    function renderFlowchart(slide, slideData, chartB64, themeConfig) {
        slide.addText(slideData.title || '', { x: 0.4, y: 0.2, w: 9.2, h: 0.7, fontSize: 30, bold: true, color: themeConfig.titleColor, align: 'center', fontFace: themeConfig.font });
        if (chartB64) {
            slide.addImage({ data: chartB64, x: 0.4, y: 0.9, w: 9.2, h: 4.5 });
        }
    }

    async function startGeneration() {
        if (!AppState.googleApiKey) { showToast('❌ 請設定 Gemini API Key'); return; }
        const topic = document.getElementById('inp-topic').value.trim();
        if (!topic) { showToast('❌ 請輸入主題'); return; }

        AppState.isGenerating = true;
        AppState.cancelRequested = false;
        AppState.abortController = new AbortController();

        document.getElementById('section-empty').classList.add('hidden');
        document.getElementById('section-progress').classList.remove('hidden');
        document.getElementById('section-preview').classList.add('hidden');
        document.getElementById('log-container').innerHTML = '';
        document.getElementById('progress-bar').style.width = '5%';
        document.getElementById('btn-download').classList.add('hidden');
        
        document.getElementById('btn-generate').classList.add('hidden');
        document.getElementById('btn-stop').classList.remove('hidden');
        document.getElementById('btn-stop').disabled = false;
        document.getElementById('progress-spinner').classList.add('animate-spin');
        document.getElementById('progress-spinner').style.border = '';
        document.getElementById('progress-spinner').style.borderTopColor = 'transparent';

        try {
            const data = await callGeminiForOutline(topic, "");
            if (AppState.cancelRequested) throw new Error('CanceledByUser');
            AppState.presentationData = data;
            document.getElementById('progress-bar').style.width = '20%';
            
            const selectedTemplateKey = document.getElementById('sel-template').value;
            const themeConfig = TEMPLATES[selectedTemplateKey];
            const userBg = document.getElementById('slide-bg-hex').value.replace('#', '');

            const pres = new PptxGenJS();
            pres.layout = 'LAYOUT_WIDE'; // 16:9

            pres.defineSlideMaster({
                title: 'MASTER_PRO',
                background: { color: userBg },
                objects: [
                    { text: { text: "NOVA 120 Pro", options: { x: 8.0, y: 5.4, w: 1.8, color: themeConfig.accent, fontSize: 10, align: 'right' } } }
                ]
            });

            const slides = data.slides || [];
            
            for (let i = 0; i < slides.length; i++) {
                if (AppState.cancelRequested) throw new Error('CanceledByUser');

                const sData = slides[i];
                addLog(`正在製作第 ${sData.slide_number} 頁: ${sData.title || '封面'}`, 'info');
                const slide = pres.addSlide({ masterName: 'MASTER_PRO' });

                if (sData.layout === 'title_only') {
                    slide.addShape('rect', { x: 0, y: 0, w: 0.5, h: '100%', fill: { color: themeConfig.accent } });
                    slide.addText(sData.title || '未命名', { x: 0.8, y: 1.5, w: 9.0, h: 1.5, fontSize: 52, bold: true, color: themeConfig.titleColor, fontFace: themeConfig.font });
                    if(sData.subtitle) slide.addText(sData.subtitle, { x: 0.8, y: 3.2, w: 8.5, h: 1.0, fontSize: 26, color: themeConfig.textColor, fontFace: themeConfig.font });
                
                } else if (sData.layout === 'flowchart_only') {
                    const b64 = await mermaidToBase64(sData.mermaid_code || "", userBg, sData, false);
                    
                    if (b64) {
                        renderFlowchart(slide, sData, b64, themeConfig);
                    } else {
                        addLog(`⚠️ 第 ${sData.slide_number} 頁流程圖最終修復失敗，降級為純文字`, 'warning');
                        sData.bullet_points = sData.bullet_points || ["(系統提示：圖表解析異常)"];
                        renderTextOnly(slide, sData, themeConfig);
                    }
                
                } else if (sData.layout === 'text_and_image') {
                    const imgB64 = await generateImage(sData.image_prompt, sData.slide_number);
                    // 傳入 i (slideIndex) 讓排版引擎動態切換版型
                    renderTextAndImage(slide, sData, imgB64, themeConfig, i);
                
                } else {
                    renderTextOnly(slide, sData, themeConfig);
                }

                document.getElementById('progress-bar').style.width = `${20 + ((i+1)/slides.length)*75}%`;
            }

            AppState.pptxObject = pres;
            addLog('PPTX 組裝完成！', 'success');
            document.getElementById('progress-bar').style.width = '100%';
            document.getElementById('btn-download').classList.remove('hidden');
            document.getElementById('btn-download').classList.add('flex');
            
            document.getElementById('progress-spinner').classList.remove('animate-spin');
            document.getElementById('progress-spinner').style.border = '2px solid #10b981';
            
            showToast('✅ 簡報已就緒');
            renderSlidesPreview(data);

        } catch (e) {
            if (e.name === 'AbortError' || e.message === 'CanceledByUser') {
                addLog('⛔ 生成已由使用者中斷。', 'warning');
                showToast('⛔ 生成已中斷');
                document.getElementById('progress-spinner').classList.remove('animate-spin');
                document.getElementById('progress-spinner').style.border = '2px solid #f59e0b';
            } else {
                addLog(e.message, 'error');
                console.error(e);
                showToast('❌ 生成發生錯誤');
                document.getElementById('progress-spinner').classList.remove('animate-spin');
                document.getElementById('progress-spinner').style.border = '2px solid #ef4444';
            }
        } finally {
            AppState.isGenerating = false;
            document.getElementById('btn-stop').classList.add('hidden');
            document.getElementById('btn-stop').querySelector('span').textContent = '停止生成';
            document.getElementById('btn-generate').classList.remove('hidden');
        }
    }

    async function mermaidToBase64(code, bgColorHex, slideData, isRetry = false) {
        const container = document.getElementById('mermaid-render-container');
        let safeCode = code.replace(/```mermaid/gi, '').replace(/```/g, '').trim();
        const timeout = new Promise(r => setTimeout(() => r(null), 10000));
        
        const doRender = async () => {
            try {
                const uniqueId = 'mmr-' + Date.now() + '-' + Math.floor(Math.random() * 10000);
                const { svg } = await mermaid.render(uniqueId, safeCode, container);
                
                const parser = new DOMParser();
                const svgDoc = parser.parseFromString(svg, "image/svg+xml");
                const svgEl = svgDoc.documentElement;
                
                let origW = parseFloat(svgEl.getAttribute('width') || 1280);
                let origH = parseFloat(svgEl.getAttribute('height') || 720);
                
                if (!svgEl.getAttribute('viewBox')) {
                    svgEl.setAttribute('viewBox', `0 0 ${origW} ${origH}`);
                }
                
                const scaleFactor = 3;
                svgEl.setAttribute('width', (origW * scaleFactor).toString());
                svgEl.setAttribute('height', (origH * scaleFactor).toString());
                
                const modifiedSvg = new XMLSerializer().serializeToString(svgDoc);
                const svgBlob = new Blob([modifiedSvg], { type: 'image/svg+xml;charset=utf-8' });
                const url = URL.createObjectURL(svgBlob);
                
                return new Promise(res => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width + 100; 
                        canvas.height = img.height + 100; 
                        
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = '#' + bgColorHex;
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        
                        ctx.drawImage(img, 50, 50, img.width, img.height);
                        
                        URL.revokeObjectURL(url);
                        res(canvas.toDataURL('image/png'));
                    };
                    img.onerror = () => {
                        URL.revokeObjectURL(url);
                        res(null);
                    };
                    img.src = url;
                });
            } catch (e) { 
                console.warn("Mermaid 語法解析失敗:", e);
                return null; 
            }
        };

        let result = await Promise.race([doRender(), timeout]);

        if (!result && !isRetry && slideData) {
            addLog(`⚠️ 流程圖語法異常，啟動安全修復機制...`, 'warning');
            
            let fallbackCode = "graph TD\n";
            let safeTitle = (slideData.title || '主題').replace(/["\\[\]()]/g, ' ');
            fallbackCode += `  Root["${safeTitle}"]\n`;
            
            if (slideData.bullet_points && slideData.bullet_points.length > 0) {
                slideData.bullet_points.forEach((bp, idx) => {
                    let safeBp = bp.substring(0, 25).replace(/["\\[\]()]/g, ' ');
                    fallbackCode += `  Root --> Node${idx}["${safeBp}"]\n`;
                });
            } else {
                fallbackCode += `  Root --> Node1["內容生成中"]\n`;
            }
            
            return await mermaidToBase64(fallbackCode, bgColorHex, slideData, true);
        }

        return result;
    }

    function renderSlidesPreview(data) {
        const list = document.getElementById('slides-preview-list');
        list.innerHTML = '';
        data.slides.forEach(s => {
            const div = document.createElement('div');
            div.className = 'bg-slate-900 border border-slate-800 p-4 rounded-xl';
            div.innerHTML = `<div class="flex justify-between mb-2"><span class="text-xs font-bold text-violet-400">PAGE ${s.slide_number}</span><span class="layout-badge layout-${s.layout}">${s.layout}</span></div><h4 class="text-sm font-semibold text-slate-200">${s.title}</h4>`;
            list.appendChild(div);
        });
        document.getElementById('section-preview').classList.remove('hidden');
    }

    async function downloadPptx() {
        if (!AppState.pptxObject) return;
        const name = (AppState.presentationData?.presentation_title || 'NOVA_Pro_Slide').replace(/\s/g, '_') + '.pptx';
        await AppState.pptxObject.writeFile({ fileName: name });
    }
