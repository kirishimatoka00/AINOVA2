<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interactive Slide Engine · NOVA 120</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-1: #6366f1; --color-2: #ec4899; --color-3: #22c55e;
            background-color: #020617;
        }
        body { overflow: hidden; height: 100vh; width: 100vw; font-family: 'Plus Jakarta Sans', 'Noto Sans TC', sans-serif; }
        #main-canvas { width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%); touch-action: none; cursor: grab; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); resize: both; overflow: auto; }
        .draggable-group { cursor: move; }
        .side-panel { position: fixed; left: 1.5rem; top: 1.5rem; bottom: 1.5rem; width: 340px; z-index: 50; }
        .model-select { background: #0f172a; border: 1px solid #1e293b; color: #94a3b8; font-size: 11px; border-radius: 8px; padding: 4px 8px; width: 100%; outline: none; }
        .model-select:focus { border-color: #6366f1; color: white; }
    </style>
</head>
<body class="text-slate-100">

    <svg id="main-canvas" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <filter id="glow">
                <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
                <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
        </defs>
        <g id="subject-layer" filter="url(#glow)">
            <ellipse cx="960" cy="540" rx="350" ry="100" fill="none" stroke="var(--color-1)" stroke-width="1" opacity="0.3" />
            <text x="960" y="540" text-anchor="middle" fill="white" font-size="20" opacity="0.3" tracking="5">NOVA INTERACTIVE CANVAS</text>
        </g>
        <g id="component-layer"></g>
    </svg>

    <aside class="side-panel">
        <div class="bg-slate-900/90 backdrop-blur-2xl border border-slate-800 rounded-[2rem] p-6 h-full flex flex-col shadow-2xl">
            <div class="flex items-center gap-4 mb-8">
                <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <i class="ph-bold ph-cpu text-white text-2xl"></i>
                </div>
                <div>
                    <h1 class="font-extrabold text-lg tracking-tight">NOVA 120</h1>
                    <p class="text-[10px] text-indigo-400 font-bold uppercase tracking-widest">Multi-Agent Engine</p>
                </div>
            </div>

            <div class="space-y-6 overflow-y-auto pr-2 custom-scrollbar">
                <div class="p-4 bg-slate-950/50 rounded-2xl border border-slate-800">
                    <label class="text-[10px] font-black text-slate-500 uppercase mb-3 block">Agent A: NLP 知識萃取</label>
                    <select id="model-agent-a" class="model-select mb-3">
                        <option value="gemini-3-flash-preview">Gemini 3 Flash Preview</option>
                        <option value="gemini-2.5-pro" selected>Gemini 2.5 Pro</option>
                        <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro Preview</option>
                        <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                    </select>
                    <textarea id="inp-topic" rows="3" class="w-full bg-transparent border-b border-slate-800 p-2 text-sm focus:border-indigo-500 outline-none transition-all" placeholder="輸入您的簡報主題..."></textarea>
                </div>

                <div class="p-4 bg-slate-950/50 rounded-2xl border border-slate-800">
                    <label class="text-[10px] font-black text-slate-500 uppercase mb-3 block">Agent B: 主視覺生圖/SVG</label>
                    <select id="model-agent-b" class="model-select">
                        <option value="grok-image-image">Grok Image Image</option>
                        <option value="grok-image-image-pro" selected>Grok Image Image Pro</option>
                        <option value="gemini-2.5-flash-image">Gemini 2.5 Flash-image</option>
                        <option value="gemini-3.1-flash-image">Gemini 3.1 Flash-image</option>
                    </select>
                    <p class="text-[9px] text-slate-600 mt-2">負責中央視覺元件與空間 3D 路徑生成</p>
                </div>

                <div class="p-4 bg-slate-950/50 rounded-2xl border border-slate-800">
                    <label class="text-[10px] font-black text-slate-500 uppercase mb-3 block">Agent C: 前端互動架構</label>
                    <select id="model-agent-c" class="model-select">
                        <option value="gemini-3-flash-preview">Gemini 3 Flash Preview</option>
                        <option value="gemini-3.1-pro-preview" selected>Gemini 3.1 Pro Preview</option>
                        <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                    </select>
                </div>

                <button onclick="runWorkflow()" id="btn-generate" class="w-full bg-white text-slate-950 font-black py-4 rounded-2xl hover:bg-indigo-400 hover:scale-[1.02] active:scale-95 transition-all shadow-xl shadow-white/5 flex items-center justify-center gap-2">
                    <i class="ph-bold ph-lightning"></i> 執行多代理生成
                </button>
            </div>
        </div>
    </aside>

    <script>
        const svg = document.getElementById('main-canvas');
        const componentLayer = document.getElementById('component-layer');
        let isDragging = false, currentTarget = null, offset = { x: 0, y: 0 };

        // ════════════════════════════════════════════════
        // 核心：SVG 座標與矩陣轉換 (The Math of Dragging)
        // ════════════════════════════════════════════════
        function getMousePosition(evt) {
            const CTM = svg.getScreenCTM();
            const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
            const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
            return { x: (clientX - CTM.e) / CTM.a, y: (clientY - CTM.f) / CTM.d };
        }

        function startDrag(evt) {
            if (evt.target.isContentEditable || evt.target.closest('button')) return;
            const card = evt.target.closest('.draggable-group');
            if (card) {
                isDragging = true; currentTarget = card;
                const pos = getMousePosition(evt);
                const transform = currentTarget.transform.baseVal.getItem(0);
                offset.x = pos.x - transform.matrix.e;
                offset.y = pos.y - transform.matrix.f;
            }
        }

        function drag(evt) {
            if (isDragging && currentTarget) {
                const pos = getMousePosition(evt);
                const transform = currentTarget.transform.baseVal.getItem(0);
                transform.setMatrix(svg.createSVGMatrix().translate(pos.x - offset.x, pos.y - offset.y));
            }
        }

        window.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', drag);
        window.addEventListener('mouseup', () => isDragging = false);

        // ════════════════════════════════════════════════
        // 核心：ResizeObserver 同步 (SVG foreignObject 同步)
        // ════════════════════════════════════════════════
        const resizeObserver = new ResizeObserver(entries => {
            for (let entry of entries) {
                const fObj = entry.target.closest('foreignObject');
                if (fObj) {
                    fObj.setAttribute('width', entry.target.offsetWidth + 10);
                    fObj.setAttribute('height', entry.target.offsetHeight + 10);
                }
            }
        });

        function createComponent(x, y, title, content, color = '#6366f1') {
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("class", "draggable-group");
            g.setAttribute("transform", `translate(${x}, ${y})`);

            const fObj = document.createElementNS("http://www.w3.org/2000/svg", "foreignObject");
            fObj.setAttribute("width", "320");
            fObj.setAttribute("height", "220");

            const div = document.createElement("div");
            div.className = "glass-card rounded-[2rem] p-6 text-white";
            div.style.borderLeft = `4px solid ${color}`;
            div.innerHTML = `
                <h3 class="font-extrabold text-lg mb-2 outline-none" contenteditable="true">${title}</h3>
                <p class="text-sm text-slate-400 leading-relaxed outline-none" contenteditable="true">${content}</p>
                <div class="mt-4 flex gap-2">
                    <span class="w-2 h-2 rounded-full bg-white/20"></span>
                    <span class="w-2 h-2 rounded-full bg-white/20"></span>
                </div>
            `;

            fObj.appendChild(div);
            g.appendChild(fObj);
            componentLayer.appendChild(g);
            resizeObserver.observe(div);
        }

        // ════════════════════════════════════════════════
        // AI Workflow 與指定模型呼叫
        // ════════════════════════════════════════════════
        async function runWorkflow() {
            const topic = document.getElementById('inp-topic').value;
            const modelA = document.getElementById('model-agent-a').value;
            const modelB = document.getElementById('model-agent-b').value;
            const modelC = document.getElementById('model-agent-c').value;

            if (!topic) return alert("請輸入主題");

            const btn = document.getElementById('btn-generate');
            btn.innerHTML = `<i class="ph-bold ph-circle-notch animate-spin"></i> Agent A 萃取中...`;
            btn.disabled = true;

            try {
                // 這裡模擬多代理呼叫，實務上會依序呼叫不同 API
                console.log(`Agent A 啟動: ${modelA}`);
                console.log(`Agent B 啟動: ${modelB}`);
                console.log(`Agent C 啟動: ${modelC}`);

                // 模擬 API 回傳與組裝
                componentLayer.innerHTML = '';
                const demoData = [
                    { x: 100, y: 150, t: "核心架構", c: `基於 ${modelA} 萃取的邏輯框架，確保內容精準度。`, col: "#6366f1" },
                    { x: 1450, y: 150, t: "視覺引擎", c: `由 ${modelB} 生成的主視覺空間座標，支援 3D 渲染。`, col: "#ec4899" },
                    { x: 100, y: 700, t: "互動邏輯", c: `利用 ${modelC} 注入的 Vanilla JS，實現毫秒級拖曳響應。`, col: "#22c55e" }
                ];

                demoData.forEach((d, i) => {
                    setTimeout(() => createComponent(d.x, d.y, d.t, d.c, d.col), i * 400);
                });

            } catch (e) {
                alert("生成失敗，請檢查網路。");
            } finally {
                btn.innerHTML = `<i class="ph-bold ph-lightning"></i> 執行多代理生成`;
                btn.disabled = false;
            }
        }

        // 初始化
        window.onload = () => {
            createComponent(780, 800, "NOVA 120 啟動中", "請在左側選擇指定 Agent 模型並輸入主題，點擊按鈕開始生成。");
        };
    </script>
</body>
</html>
