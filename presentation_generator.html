<!DOCTYPE html>

<head>

                <p class="text-slate-500 text-xs sm:text-sm max-w-md leading-relaxed">
                    本次突破升級：AI 的內容會透過 <b>Hybrid Layout Engine</b> 進行精確尺寸換算，並轉換為 <b>100% 可編輯的原生 PPT 文字方塊與圖片</b>，確保排版完美適配！

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[200] bg-slate-800 text-white text-xs sm:text-sm font-medium px-4 py-2 rounded-xl shadow-2xl border border-slate-700 opacity-0 transition-all pointer-events-none translate-y-4"></div>

    <script>
    const AppState = {
        googleApiKey: '', xaiApiKey: '',
        kbDocs: [], logoBase64: null, 
        pptxObject: null, presentationData: null,
        isGenerating: false, cancelRequested: false, abortController: null,
        finalSlideHTMLs: [] 
    };

    const GROK_PROXY   = 'https://grokcaller.kirishimatoka00.workers.dev/';
    const GROK_IMG_API = 'https://api.x.ai/v1/images/generations';

    function init() {
        AppState.googleApiKey = localStorage.getItem('nova_key_gemini') || '';
        AppState.xaiApiKey = localStorage.getItem('nova_key_grok') || '';
        document.getElementById('api-gemini-status').textContent = AppState.googleApiKey ? '✓ 已設定' : '❌ 未設定';
        updateHeaderBadge();
        toggleImageCount();
    }

    document.addEventListener('DOMContentLoaded', init);

    function togglePanel(id) {
        document.getElementById(id).classList.toggle('open');
        document.getElementById(id + '-icon').classList.toggle('rotate-180');
    }

    function showToast(m) {
        const t = document.getElementById('toast');
        t.textContent = m; t.classList.remove('opacity-0', 'translate-y-4'); t.classList.add('opacity-100', 'translate-y-0');
        setTimeout(() => { t.classList.add('opacity-0', 'translate-y-4'); t.classList.remove('opacity-100', 'translate-y-0'); }, 2500);
    }

    function updateHeaderBadge() {
        const s = document.getElementById('sel-text-model');
        document.getElementById('header-model-name').textContent = s.options[s.selectedIndex].text;
    }

    function toggleImageCount() {
        const needImg = document.getElementById('sel-need-image').value;
        document.getElementById('div-image-count').style.display = needImg === 'NO' ? 'none' : 'block';
    }

    function updateImageCountLabel(val) {
        document.getElementById('image-count-val').textContent = parseInt(val) === 20 ? '自動 (無限制)' : val + ' 張';
    }

    function addLog(m, type = 'info') {
        const c = document.getElementById('log-container');
        const i = document.createElement('div');
        const colors = { info: 'text-slate-300', success: 'text-emerald-300', warning: 'text-amber-300', error: 'text-rose-300', ai: 'text-violet-300' };
        i.className = `py-0.5 ${colors[type]}`;
        i.textContent = `[${new Date().toLocaleTimeString()}] ${m}`;
        c.appendChild(i); c.scrollTop = c.scrollHeight;
    }

    // ★ 修正 1：非同步進度條更新器，使用 Promise + RequestAnimationFrame 強迫瀏覽器繪製畫面 ★
    async function updateProgress(pct) {
        const bar = document.getElementById('progress-bar');
        const pctText = document.getElementById('progress-pct');
        if (bar) bar.style.width = Math.min(pct, 100) + '%';
        if (pctText) pctText.textContent = Math.round(Math.min(pct, 100)) + '%';
        
        // 給予瀏覽器足夠的喘息時間來渲染 CSS 動畫
        await new Promise(resolve => setTimeout(resolve, 50));
        await new Promise(r => requestAnimationFrame(r));
    }

    function getGeminiApiVersion(modelName) {
        return (modelName.includes('preview') || modelName.includes('exp') || modelName.includes('gemini-3')) ? 'v1alpha' : 'v1beta';
    }

    function stopGeneration() {
        if (AppState.isGenerating) {
            AppState.cancelRequested = true;
            if (AppState.abortController) AppState.abortController.abort();
            addLog('⚠️ 使用者要求中斷生成...', 'warning');
            document.getElementById('btn-stop').disabled = true;
        }
    }

    // 檔案解析
    async function handleKbUpload(files) {
        for (const file of files) {
            try {
                let text = '';
                const ext = file.name.split('.').pop().toLowerCase();
                
                if (['txt', 'md', 'html', 'csv', 'json'].includes(ext)) {
                    text = await file.text();
                } else if (ext === 'pdf') {
                    const arr = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({data: arr}).promise;
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        text += content.items.map(item => item.str).join(' ') + '\n';
                    }
                } else if (ext === 'docx') {
                    const arr = await file.arrayBuffer();
                    const res = await mammoth.extractRawText({arrayBuffer: arr});
                    text = res.value;
                } else if (ext === 'xlsx') {
                    const arr = await file.arrayBuffer();
                    const wb = XLSX.read(arr);
                    wb.SheetNames.forEach(sheetName => {
                        text += XLSX.utils.sheet_to_txt(wb.Sheets[sheetName]) + '\n';
                    });
                } else if (ext === 'pptx') {
                    const zip = await JSZip.loadAsync(file);
                    for (const filename of Object.keys(zip.files)) {
                        if (filename.startsWith('ppt/slides/slide') && filename.endsWith('.xml')) {
                            const content = await zip.files[filename].async('string');
                            text += content.replace(/<[^>]+>/g, ' ') + '\n';
                        }
                    }
                }

                if(text) {
                    AppState.kbDocs.push({ name: file.name, text: text.substring(0, 30000) });
                    addKbFileItem(file.name, AppState.kbDocs.length - 1);
                    showToast(`📚 已載入：${file.name}`);
                }
            } catch (e) {
                console.error(e);
                showToast(`❌ 無法讀取 ${file.name}`);
            }
        }
    }

    function addKbFileItem(name, index) {
        const list = document.getElementById('kb-file-list');
        const item = document.createElement('div');
        item.className = 'flex items-center justify-between bg-slate-800 rounded px-2 py-1 text-[11px]';
        item.innerHTML = `<span class="text-slate-300 truncate">${name}</span>
                          <button onclick="this.parentElement.remove(); AppState.kbDocs[${index}]=null;" class="text-rose-400 ml-2">&times;</button>`;
        list.appendChild(item);
    }

    function handleLogoUpload(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            AppState.logoBase64 = event.target.result;
            document.getElementById('logo-preview').src = AppState.logoBase64;
            document.getElementById('logo-preview-wrapper').classList.remove('hidden');
            showToast('✅ Logo 上傳成功');
        };
        reader.readAsDataURL(file);
    }

    function removeLogo() {
        AppState.logoBase64 = null;
        document.getElementById('logo-upload').value = '';
        document.getElementById('logo-preview-wrapper').classList.add('hidden');
    }

    /** LLM 生成結構：加入極強防禦性宣告，避免陣列遺失導致長度報錯 */
    async function callGeminiForOutline(topic, kbText) {
        if (AppState.cancelRequested) throw new Error('CanceledByUser');

        const apiKey = AppState.googleApiKey;
        const userChoice = document.getElementById('sel-text-model').value;
        const slideCount = document.getElementById('range-slide-count').value;
        const userBgHex = document.getElementById('slide-bg-hex').value;
        const needImage = document.getElementById('sel-need-image').value === 'YES';
        const templateChoice = document.getElementById('sel-template').value;

        let imgRules = needImage 
            ? "若內容需要配圖輔助，請在該投影片物件中加入 `image_keyword` 屬性，提供一個明確的英文具象名詞，系統會去抓取真實圖片。" 
            : "絕對不要生成任何圖片關鍵字，全憑文字與排版決戰。";
            
        let themeRules = templateChoice === 'auto'
            ? "請根據主題的調性，自行發想適合的配色並在 `presentation_theme` 中回傳。包含 accentColor (強調色), titleColor (標題色), textColor (內文色)。"
            : `請遵循使用者指定的風格基調，你可以在 \`presentation_theme\` 微調相關的 accentColor 與文字色。`;

        const systemPrompt = `你是一位世界頂級的簡報內容策略師。
請為以下主題生成一份具備極高知識密度的簡報 JSON。

【目標與規範 - 防崩潰指令】：
1. 產生 ${slideCount} 張投影片。
2. 背景底色統一使用：${userBgHex}。
3. ${themeRules}
4. 每一頁請根據內容邏輯，挑選適合的 layout：
   - "title_only": 適合大標題封面。
   - "text_only": 適合多重點條列。
   - "text_and_image": 適合圖文並茂解說。
   - "columns": 適合左右對比、雙欄數據。
5. ${imgRules}
6. 【極度重要】必須嚴格輸出 JSON。JSON 的 Value 字串內部【絕對禁止使用未跳脫的雙引號 (")】。如果有需要標註，一律改用單引號 (')。
7. 【極度重要】每張 slide 都必須包含 \`bullet_points\` 陣列。如果你覺得該頁不需要重點清單，請務必給一個空陣列 \`[]\`，絕對不能設為 null 或遺漏這個 key，否則會導致系統解析長度時崩潰！

JSON Schema:
{
  "presentation_title": "標題",
  "presentation_theme": {
    "accentColor": "#38BDF8",
    "titleColor": "#FFFFFF",
    "textColor": "#F8FAFC"
  },
  "slides": [
    { 
      "slide_number": 1, 
      "layout": "title_only",
      "title": "主標題",
      "subtitle": "副標題 (可選)",
      "bullet_points": ["重點1", "重點2"],
      "image_keyword": "Future AI city OR null"
    }
  ]
}`;

        const uniqueModels = [...new Set([userChoice, 'grok-4-1-fast-reasoning', 'gemini-3.1-pro-preview', 'gemini-2.5-pro', 'gemini-2.5-flash'])];
        
        let fullContext = topic;
        const links = document.getElementById('kb-links-area').value.trim();
        if (kbText || links) fullContext += `\n\n【參考資料】\n${kbText}\n連結：${links}`;

        let lastErr = null;
        for (const modelId of uniqueModels) {
            if (AppState.cancelRequested) throw new Error('CanceledByUser');
            const ver = getGeminiApiVersion(modelId);
            const endpoint = `https://generativelanguage.googleapis.com/${ver}/models/${modelId.replace('grok-4-1-fast-reasoning', 'gemini-2.5-pro')}:generateContent?key=${apiKey}`;
            
            try {
                addLog(`呼叫邏輯引擎 ${modelId}...`, 'ai');
                const resp = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: 'user', parts: [{ text: systemPrompt + "\n\n主題與內容：\n" + fullContext }] }],
                        generationConfig: { responseMimeType: 'application/json', temperature: 0.7, maxOutputTokens: 8192 }
                    }),
                    signal: AppState.abortController.signal
                });
                
                if (!resp.ok) {
                    const eData = await resp.json().catch(()=>({}));
                    throw new Error(eData?.error?.message || `HTTP ${resp.status}`);
                }
                
                const data = await resp.json();
                let raw = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!raw) throw new Error("API 未回傳有效文字");

                const jsonMatch = raw.match(/\{[\s\S]*\}/);
                if (jsonMatch) raw = jsonMatch[0];

                let parsedJson;
                try {
                    parsedJson = JSON.parse(raw);
                } catch (jsonErr) {
                    console.error("Malformed JSON:", raw);
                    throw new Error("AI 生成的 JSON 格式異常，無法解析");
                }

                addLog(`✓ 成功生成簡報結構`, 'success');
                return parsedJson;
            } catch (e) {
                lastErr = e;
                if (e.name === 'AbortError') throw new Error('CanceledByUser');
                addLog(`⚠ ${modelId} 失敗，切換備用模型...`, 'warning');
            }
        }
        throw new Error(`所有引擎皆失敗。最後錯誤: ${lastErr.message}`);
    }

    async function fetchImageFromWikipedia(keyword) {
        if (!keyword) return null;
        try {
            let url = `https://en.wikipedia.org/w/api.php?action=query&prop=pageimages&format=json&piprop=original&titles=${encodeURIComponent(keyword)}&origin=*`;
            let res = await fetch(url);
            let data = await res.json();
            let pages = data.query?.pages;
            if (pages) {
                let pageId = Object.keys(pages)[0];
                if (pageId !== "-1" && pages[pageId].original) return pages[pageId].original.source;
            }
        } catch (e) { console.warn("Wiki search failed"); }
        return null;
    }

    async function processSlideImage(keyword) {
        addLog(`🔍 嘗試網路搜尋「${keyword}」...`, 'info');
        const wikiUrl = await fetchImageFromWikipedia(keyword);
        if (wikiUrl) {
            try {
                const res = await fetch(wikiUrl);
                const blob = await res.blob();
                return await new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(blob);
                });
            } catch(e) {}
        }
        addLog(`⚠ 搜尋無果，使用系統佔位符`, 'warning');
        return null; 
    }

    /** * ★ 修正 2：Hybrid Layout Engine (測量 + 原生物件) ★
     * 1. 將文字塞入隱藏的 HTML 畫布中
     * 2. 利用瀏覽器引擎測量文字的真實高度與折行狀況
     * 3. 將座標轉給 PptxGenJS 輸出真正的可編輯文字方塊
     */
    async function measureAndBuildNativeSlide(slide, sData, userBg, themeConfig) {
        const stage = document.getElementById('measure-stage');
        
        // 防禦性陣列：如果 AI 沒有給，預設為空陣列，防止 .length 報錯
        const safeBullets = Array.isArray(sData.bullet_points) ? sData.bullet_points : [];
        
        const accColor = themeConfig.accentColor || '#38BDF8';
        const txtColor = themeConfig.textColor || '#F8FAFC';
        const titColor = themeConfig.titleColor || '#FFFFFF';

        // 準備一個容器來模擬 16:9 投影片 (1280x720)
        let innerHtml = '';
        
        // ====== 階段 1：根據版型建構測量用的 HTML ======
        if (sData.layout === 'title_only') {
            innerHtml = `
                <div style="position:absolute; left:40px; top:0px; width:40px; height:720px; background-color:${accColor};"></div>
                <h1 style="position:absolute; left:100px; top:200px; width:1080px; font-size:64px; font-weight:bold; color:${titColor}; m-0 p-0">${sData.title || ''}</h1>
                <p style="position:absolute; left:100px; top:400px; width:1080px; font-size:32px; color:#94A3B8; m-0 p-0">${sData.subtitle || ''}</p>
            `;
        } 
        else if (sData.layout === 'text_and_image' && sData._hasImage) {
            // 圖右文左
            innerHtml = `
                <h2 style="position:absolute; left:60px; top:40px; width:640px; font-size:42px; font-weight:bold; color:${titColor}; m-0 p-0">${sData.title || ''}</h2>
                <div style="position:absolute; left:60px; top:130px; width:100px; height:6px; background-color:${accColor};"></div>
                <div id="bullet-container" style="position:absolute; left:60px; top:180px; width:640px; font-size:24px; color:${txtColor}; line-height:1.6;">
                    ${safeBullets.map(b => `<div style="margin-bottom:16px;">• ${b}</div>`).join('')}
                </div>
            `;
            // 圖片區域 (直接在 PPTX 繪製，這裡不測量)
            slide.addImage({ data: sData._imgData, x: 5.8, y: 1.0, w: 3.8, h: 4.0, sizing: { type: 'cover', w: 3.8, h: 4.0 } });
        }
        else if (sData.layout === 'columns') {
            // 雙欄排版
            innerHtml = `
                <h2 style="position:absolute; left:0px; top:40px; width:1280px; text-align:center; font-size:42px; font-weight:bold; color:${titColor}; m-0 p-0">${sData.title || ''}</h2>
                <div style="position:absolute; left:590px; top:120px; width:100px; height:6px; background-color:${accColor};"></div>
            `;
            
            let half = Math.ceil(safeBullets.length / 2);
            let col1 = safeBullets.slice(0, half);
            let col2 = safeBullets.slice(half);

            if (col1.length > 0) {
                innerHtml += `<div id="col1-container" style="position:absolute; left:60px; top:180px; width:550px; font-size:24px; color:${txtColor}; line-height:1.6; padding:20px; background-color:rgba(255,255,255,0.05); border-radius:12px;">
                    ${col1.map(b => `<div style="margin-bottom:16px;">• ${b}</div>`).join('')}
                </div>`;
            }
            if (col2.length > 0) {
                innerHtml += `<div id="col2-container" style="position:absolute; left:670px; top:180px; width:550px; font-size:24px; color:${txtColor}; line-height:1.6; padding:20px; background-color:rgba(255,255,255,0.05); border-radius:12px;">
                    ${col2.map(b => `<div style="margin-bottom:16px;">• ${b}</div>`).join('')}
                </div>`;
            }
        }
        else {
            // 預設純文字滿版
            innerHtml = `
                <h2 style="position:absolute; left:60px; top:40px; width:1160px; font-size:48px; font-weight:bold; color:${titColor}; m-0 p-0">${sData.title || ''}</h2>
                <div style="position:absolute; left:60px; top:140px; width:200px; height:6px; background-color:${accColor};"></div>
                <div id="bullet-container" style="position:absolute; left:60px; top:200px; width:1160px; font-size:28px; color:${txtColor}; line-height:1.6;">
                    ${safeBullets.map(b => `<div style="margin-bottom:20px;">• ${b}</div>`).join('')}
                </div>
            `;
        }

        stage.innerHTML = innerHtml;
        
        // 讓瀏覽器計算佈局
        await new Promise(r => setTimeout(r, 50));

        // ====== 階段 2：測量並轉換為 PptxGenJS 原生 API ======
        // PPT 單位為英吋 (1280px = 10 inch, 128px = 1 inch)
        const PxToInch = 10 / 1280;

        // 讀取所有第一層元素並轉換
        const elements = Array.from(stage.children);
        for (let el of elements) {
            const rect = el.getBoundingClientRect();
            const tagName = el.tagName.toLowerCase();
            
            let _x = rect.left * PxToInch;
            let _y = rect.top * PxToInch;
            let _w = rect.width * PxToInch;
            let _h = rect.height * PxToInch;

            // 調整防溢出
            if (_w > 9.8) _w = 9.8;

            if (tagName === 'div' && !el.id) {
                // 裝飾線條
                slide.addShape('rect', { x: _x, y: _y, w: _w, h: _h, fill: { color: accColor.replace('#','') } });
            } 
            else if (tagName === 'h1') {
                slide.addText(el.innerText, { x: _x, y: _y, w: _w, h: _h + 0.5, fontSize: 48, bold: true, color: titColor.replace('#',''), fontFace: 'Arial' });
            }
            else if (tagName === 'h2') {
                let align = el.style.textAlign === 'center' ? 'center' : 'left';
                slide.addText(el.innerText, { x: _x, y: _y, w: _w, h: _h + 0.5, fontSize: 36, bold: true, align: align, color: titColor.replace('#',''), fontFace: 'Arial' });
            }
            else if (tagName === 'p') {
                slide.addText(el.innerText, { x: _x, y: _y, w: _w, h: _h + 0.5, fontSize: 24, color: '94A3B8', fontFace: 'Arial' });
            }
            else if (tagName === 'div' && el.id) {
                // 如果是含有背景色的雙欄，先畫背景
                if (el.style.backgroundColor && el.style.backgroundColor !== 'rgba(0, 0, 0, 0)') {
                    slide.addShape('rect', { x: _x, y: _y, w: _w, h: _h, fill: { color: '1E293B' }, rounding: true });
                }

                // 取出裡面真正的 Bullet points
                let textArr = [];
                let childDivs = el.querySelectorAll('div');
                childDivs.forEach(cd => {
                    let cleanText = cd.innerText.replace(/^•\s*/, '');
                    textArr.push({ text: cleanText, options: { bullet: true, paraSpaceAfter: 12 } });
                });

                if (textArr.length > 0) {
                    let fontSize = el.id.includes('col') ? 16 : 20; // 根據容器決定字體大小
                    // 為了避免截斷，把 h 給寬裕一點
                    slide.addText(textArr, { x: _x + 0.1, y: _y + 0.1, w: _w - 0.2, h: _h + 1.0, fontSize: fontSize, color: txtColor.replace('#',''), valign: 'top', fontFace: 'Arial', lineSpacingMultiple: 1.2 });
                }
            }
        }

        // ====== 階段 3：保留一份 HTML 給預覽畫面 ======
        let previewHtml = `
            <div style="width:100%; height:100%; background-color:#${userBg}; position:relative; overflow:hidden;">
                <div style="transform: scale(0.25); transform-origin: top left; width:1280px; height:720px; position:absolute;">
                    ${stage.innerHTML}
                </div>
            </div>
        `;
        AppState.finalSlideHTMLs.push(previewHtml);
    }

    async function startGeneration() {
        if (!AppState.googleApiKey) { showToast('❌ 請設定 Gemini API Key'); return; }
        const topic = document.getElementById('inp-topic').value.trim();
        if (!topic) { showToast('❌ 請輸入主題'); return; }

        AppState.isGenerating = true;
        AppState.cancelRequested = false;
        AppState.abortController = new AbortController();
        AppState.finalSlideHTMLs = [];

        document.getElementById('section-empty').classList.add('hidden');
        document.getElementById('section-progress').classList.remove('hidden');
        document.getElementById('section-preview').classList.add('hidden');
        document.getElementById('log-container').innerHTML = '';
        await updateProgress(5);
        document.getElementById('btn-download').classList.add('hidden');
        
        document.getElementById('btn-generate').classList.add('hidden');
        document.getElementById('btn-stop').classList.remove('hidden');
        document.getElementById('btn-stop').disabled = false;

        try {
            let kbCombined = AppState.kbDocs.filter(d => d).map(d => `[${d.name}]\n${d.text}`).join('\n\n');

            const data = await callGeminiForOutline(topic, kbCombined);
            if (AppState.cancelRequested) throw new Error('CanceledByUser');
            AppState.presentationData = data;
            await updateProgress(15);

            const needImage = document.getElementById('sel-need-image').value === 'YES';
            const maxImages = needImage ? parseInt(document.getElementById('range-image-count').value) : 0;
            let imagesGenerated = 0;

            const slides = data.slides || [];
            const pres = new PptxGenJS();
            pres.layout = 'LAYOUT_16x9'; 
            
            const userBg = document.getElementById('slide-bg-hex').value.replace('#', '');
            
            // 將 AI 決定的 Theme 覆蓋，若無則使用預設
            const aiTheme = data.presentation_theme || {};
            const themeConfig = {
                accentColor: aiTheme.accentColor || '#38BDF8',
                titleColor: aiTheme.titleColor || '#FFFFFF',
                textColor: aiTheme.textColor || '#F8FAFC'
            };

            // 母片設定
            let masterObjects = [
                { text: { text: "NOVA 120 Pro Native", options: { x: 8.0, y: 5.4, w: 1.8, color: '64748B', fontSize: 10, align: 'right' } } },
                { text: { text: "第 ", options: { x: 0.5, y: 5.4, w: 0.5, color: '64748B', fontSize: 10 } } },
                { slideNumber: { x: 0.7, y: 5.4, color: '64748B', fontSize: 10 } }
            ];

            if (AppState.logoBase64) {
                const pos = document.getElementById('sel-logo-pos').value;
                let lx = 8.8, ly = 0.2; 
                if (pos === 'BR') { lx = 8.8; ly = 5.0; }
                else if (pos === 'TL') { lx = 0.2; ly = 0.2; }
                else if (pos === 'BL') { lx = 0.2; ly = 5.0; }
                masterObjects.push({ image: { x: lx, y: ly, w: 1.0, h: 0.5, sizing: { type: 'contain', w: 1.0, h: 0.5 }, data: AppState.logoBase64 } });
            }

            pres.defineSlideMaster({
                title: 'MASTER_PRO',
                background: { color: userBg },
                objects: masterObjects
            });

            // 逐頁處理
            for (let i = 0; i < slides.length; i++) {
                if (AppState.cancelRequested) throw new Error('CanceledByUser');
                const sData = slides[i];
                addLog(`正在編排第 ${sData.slide_number} 頁...`, 'info');

                const pptSlide = pres.addSlide({ masterName: 'MASTER_PRO' });
                
                // 處理生圖邏輯
                sData._hasImage = false;
                sData._imgData = null;
                if (needImage && sData.layout === 'text_and_image' && imagesGenerated < maxImages) {
                    if (sData.image_keyword) {
                        const imgB64 = await processSlideImage(sData.image_keyword);
                        if (imgB64) {
                            sData._hasImage = true;
                            sData._imgData = imgB64;
                            imagesGenerated++;
                        }
                    }
                }

                // 核心轉換：呼叫 Hybrid 引擎
                await measureAndBuildNativeSlide(pptSlide, sData, userBg, themeConfig);

                await updateProgress(15 + ((i+1)/slides.length)*85);
            }

            AppState.pptxObject = pres;
            addLog('原生可編輯 PPTX 組裝完成！', 'success');
            await updateProgress(100);
            
            document.getElementById('btn-download').classList.remove('hidden');
            document.getElementById('btn-download').classList.add('flex');
            showToast('✅ 簡報已就緒');
            
            renderSlidesPreview();

        } catch (e) {
            if (e.name === 'AbortError' || e.message === 'CanceledByUser') {
                addLog('⛔ 生成已中斷。', 'warning');
            } else {
                addLog(e.message, 'error');
                console.error(e);
            }
        } finally {
            AppState.isGenerating = false;
            document.getElementById('btn-stop').classList.add('hidden');
            document.getElementById('btn-generate').classList.remove('hidden');
        }
    }

    function renderSlidesPreview() {
        const list = document.getElementById('slides-preview-list');
        list.innerHTML = '';
        AppState.finalSlideHTMLs.forEach((html, idx) => {
            const div = document.createElement('div');
            div.className = 'slide-preview-card';
            div.innerHTML = `<div class="absolute top-1 left-2 text-xs font-bold text-violet-400 z-50">PAGE ${idx+1}</div>${html}`;
            list.appendChild(div);
        });
        document.getElementById('section-preview').classList.remove('hidden');
    }

    async function downloadPptx() {
        if (!AppState.pptxObject) return;
        const name = (AppState.presentationData?.presentation_title || 'NOVA_Native_Slide').replace(/\s/g, '_') + '.pptx';
        await AppState.pptxObject.writeFile({ fileName: name });
    }
