<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA 120 - AI 多代理簡報引擎 V3.0</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #6366f1; --bg-main: #020617; }
        body { font-family: 'Plus Jakarta Sans', 'Noto Sans TC', sans-serif; background: var(--bg-main); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* 介面佈局：上半部設定 / 下半部預覽 */
        #settings-zone { height: 50vh; overflow-y: auto; border-bottom: 1px solid #1e293b; background: #0a0f1e; }
        #preview-zone { height: 50vh; overflow: hidden; display: flex; flex-direction: column; position: relative; }
        
        #main-canvas { width: 100%; height: 100%; max-height: 56.25vw; background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%); cursor: grab; }

        /* 文字強制渲染 */
        .slide-text-box { color: white !important; font-family: 'Noto Sans TC', sans-serif !important; }
        .slide-title { font-size: 32px; font-weight: 900; line-height: 1.2; margin-bottom: 15px; }
        .slide-body { font-size: 16px; color: #cbd5e1; line-height: 1.6; }

        /* 導覽列 */
        .nav-bar { height: 80px; display: flex; gap: 10px; padding: 10px; overflow-x: auto; background: rgba(0,0,0,0.5); }
        .thumb { aspect-ratio: 16/9; height: 100%; border-radius: 6px; background: #0f172a; border: 2px solid transparent; cursor: pointer; flex-shrink: 0; transition: 0.2s; }
        .thumb.active { border-color: var(--primary); transform: scale(1.05); }

        /* 滾動條 */
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="settings-zone" class="custom-scroll p-6 space-y-8">
        <div class="flex items-center justify-between border-b border-slate-800 pb-4">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center"><i class="ph-bold ph-cpu text-white"></i></div>
                <h1 class="text-lg font-black italic">NOVA 120 <span class="text-indigo-500 font-normal text-xs uppercase tracking-tighter">Multi-Agent Engine</span></h1>
            </div>
            <div class="flex items-center gap-2 px-3 py-1 bg-green-500/10 border border-green-500/20 rounded-full">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                <span class="text-[10px] text-green-400 font-bold uppercase">API Linked from index.html</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <section class="space-y-4">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block">1. 模型與代理分配 (Agent Selection)</label>
                <div class="space-y-3">
                    <div class="bg-slate-900/50 p-3 rounded-2xl border border-slate-800">
                        <span class="text-[10px] text-slate-500 block mb-1">Agent A (內容分析) & Agent C (排版)</span>
                        <select id="sel-llm" class="w-full bg-transparent text-sm text-indigo-400 outline-none">
                            <option value="gemini-3-flash-preview">Gemini 3 Flash Preview (最新)</option>
                            <option value="gemini-2.5-pro">Gemini 2.5 Pro (穩定)</option>
                            <option value="gemini-3.1-pro-preview" selected>Gemini 3.1 Pro Preview (最強)</option>
                            <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                        </select>
                    </div>
                    <div class="bg-slate-900/50 p-3 rounded-2xl border border-slate-800">
                        <span class="text-[10px] text-slate-500 block mb-1">Agent B (視覺生圖)</span>
                        <select id="sel-img" class="w-full bg-transparent text-sm text-indigo-400 outline-none">
                            <option value="grok-imagine-image-pro">Grok Image Image Pro</option>
                            <option value="grok-imagine-image">Grok Image Image</option>
                            <option value="gemini-2.5-flash-image">Gemini 2.5 Flash-image</option>
                            <option value="gemini-3.1-flash-image-preview">Gemini 3.1 Flash-image</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="space-y-4">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block">2. 資料連動 (PDF/Word/YouTube/Links)</label>
                <input type="file" id="doc-input" accept=".txt,.pdf,.docx" class="hidden" onchange="handleFileUpload(this)">
                <label for="doc-input" class="w-full border-2 border-dashed border-slate-800 rounded-3xl p-6 flex flex-col items-center justify-center cursor-pointer hover:border-indigo-500 bg-slate-950/30 transition-all">
                    <i class="ph-bold ph-files text-2xl mb-1 text-slate-500"></i>
                    <span id="doc-status" class="text-xs text-slate-500 text-center">點擊掛載文檔 (Agent A 將分析其內容)</span>
                </label>
                <input type="text" id="url-input" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs outline-none focus:border-indigo-500" placeholder="貼上 YouTube 網址或參考網頁連結...">
            </section>

            <section class="space-y-4">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block">3. 風格預選與品牌識別</label>
                <div class="grid grid-cols-2 gap-2">
                    <select id="style-preset" class="bg-slate-900 border border-slate-800 rounded-xl p-3 text-xs text-slate-300">
                        <option value="tech">賽博科技 (Neon Tech)</option>
                        <option value="minimal">商務極簡 (Minimalist)</option>
                        <option value="academic">學術專業 (Academic)</option>
                        <option value="creative">創意無限 (Creative)</option>
                    </select>
                    <div class="flex gap-2">
                        <input type="file" id="logo-input" accept="image/*" class="hidden" onchange="loadLogo(this)">
                        <label for="logo-input" class="flex-1 bg-slate-900 border border-slate-800 rounded-xl p-3 text-xs flex items-center justify-center gap-2 cursor-pointer hover:border-indigo-500">
                            <i class="ph-bold ph-image-square"></i> 上傳 Logo
                        </label>
                    </div>
                </div>
                <select id="logo-pos" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-xs" onchange="updateLogoPos()">
                    <option value="TL">Logo 置於左上</option>
                    <option value="TR">Logo 置於右上</option>
                    <option value="BL">Logo 置於左下</option>
                    <option value="BR">Logo 置於右下</option>
                </select>
            </section>

            <section class="space-y-4">
                <div class="flex justify-between items-center"><label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">4. 簡報指令</label><span id="count-val" class="text-indigo-400 font-bold text-xs">5 張</span></div>
                <input type="range" id="slide-num" min="1" max="15" value="5" class="w-full accent-indigo-500" oninput="document.getElementById('count-val').innerText=this.value+' 張'">
                <textarea id="prompt-area" rows="3" class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 text-sm focus:border-indigo-500 outline-none" placeholder="描述您希望投影片呈現的主題與細節..."></textarea>
                <button onclick="executeAgentWorkflow()" id="run-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-[2rem] font-black text-white shadow-xl flex items-center justify-center gap-3 transition-all active:scale-95">
                    <i class="ph-bold ph-sparkle text-lg"></i> 啟動全代理生成引擎
                </button>
            </section>
        </div>
    </div>

    <div id="preview-zone">
        <svg id="main-canvas" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
            <image id="canvas-logo" x="60" y="60" width="140" height="70" href="" opacity="0.9" />
            <g id="slides-layer"></g>
        </svg>
        <div class="nav-bar custom-scroll" id="thumb-nav"></div>
    </div>

    <script>
        const State = {
            docText: "",
            slides: [],
            current: 0,
            // 直接連動 index.html 的設定
            keys: {
                gemini: localStorage.getItem('nova_key_gemini') || '',
                grok: localStorage.getItem('nova_key_grok') || ''
            }
        };

        function handleFileUpload(input) {
            const file = input.files[0];
            if (file) {
                document.getElementById('doc-status').innerText = `已掛載資料：${file.name}`;
                const reader = new FileReader();
                reader.onload = (e) => { State.docText = e.target.result; };
                reader.readAsText(file); // 針對 TXT，PDF/Word 實務上需後端解析或 js-pdf
            }
        }

        function loadLogo(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('canvas-logo').setAttribute('href', e.target.result);
                updateLogoPos();
            };
            reader.readAsDataURL(input.files[0]);
        }

        function updateLogoPos() {
            const pos = document.getElementById('logo-pos').value;
            const logo = document.getElementById('canvas-logo');
            const padding = 60;
            if(pos==='TL') { logo.setAttribute('x', padding); logo.setAttribute('y', padding); }
            else if(pos==='TR') { logo.setAttribute('x', 1920-140-padding); logo.setAttribute('y', padding); }
            else if(pos==='BL') { logo.setAttribute('x', padding); logo.setAttribute('y', 1080-70-padding); }
            else { logo.setAttribute('x', 1920-140-padding); logo.setAttribute('y', 1080-70-padding); }
        }

        async function executeAgentWorkflow() {
            const topic = document.getElementById('prompt-area').value;
            const url = document.getElementById('url-input').value;
            const modelA = document.getElementById('sel-llm').value;
            const slideCount = document.getElementById('slide-num').value;
            
            if (!topic) return alert("請輸入指令內容");
            if (!State.keys.gemini) return alert("未偵測到 API Key，請先於 index.html 設定。");

            const btn = document.getElementById('run-btn');
            btn.innerHTML = `<i class="ph-bold ph-circle-notch animate-spin"></i> Agent A 深度分析內容中...`;
            btn.disabled = true;

            try {
                // Agent A 核心大綱分析
                const systemPrompt = `你是由 Agent A/B/C 組成的 NOVA 120 引擎。
                分析文檔數據：${State.docText.substring(0, 2000)}
                分析外部連結：${url}
                生成張數：${slideCount}
                任務：根據以上資料與用戶要求生成結構化 JSON：[{"title": "...", "content": "...", "img_prompt": "..."}]`;

                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelA}:generateContent?key=${State.keys.gemini}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: systemPrompt + "\n指令：" + topic }] }] })
                });

                const data = await res.json();
                const raw = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
                State.slides = JSON.parse(raw);

                // 啟動 Agent C 渲染
                renderSlides();

            } catch (e) {
                console.error(e);
                alert("生成過程發生錯誤，請檢查 API 設定。");
            } finally {
                btn.innerHTML = `<i class="ph-bold ph-sparkle text-lg"></i> 重新生成`;
                btn.disabled = false;
            }
        }

        function renderSlides() {
            const layer = document.getElementById('slides-layer');
            const nav = document.getElementById('thumb-nav');
            layer.innerHTML = ''; nav.innerHTML = '';

            State.slides.forEach((s, i) => {
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                g.id = `slide-${i}`;
                g.setAttribute("visibility", i === 0 ? "visible" : "hidden");

                const foreign = document.createElementNS("http://www.w3.org/2000/svg", "foreignObject");
                foreign.setAttribute("x", "160"); foreign.setAttribute("y", "260");
                foreign.setAttribute("width", "1600"); foreign.setAttribute("height", "700");

                const div = document.createElement("div");
                div.className = "slide-text-box";
                div.innerHTML = `
                    <h2 class="slide-title" style="color:white !important;">${s.title}</h2>
                    <div class="slide-body" style="color:#cbd5e1 !important;">${s.content.replace(/\n/g, '<br>')}</div>
                    <div class="mt-8 flex gap-3">
                        <span class="px-3 py-1 bg-indigo-500/20 border border-indigo-500/30 rounded text-[10px] text-indigo-400 font-bold uppercase">Agent C Layout</span>
                        <span class="px-3 py-1 bg-slate-800 border border-slate-700 rounded text-[10px] text-slate-500 font-bold">IMAGE Prompt: ${s.img_prompt.substring(0,30)}...</span>
                    </div>
                `;

                foreign.appendChild(div);
                g.appendChild(foreign);
                layer.appendChild(g);

                const thumb = document.createElement('div');
                thumb.className = `thumb ${i===0?'active':''}`;
                thumb.id = `thumb-${i}`;
                thumb.innerText = `P${i+1}`;
                thumb.onclick = () => switchSlide(i);
                nav.appendChild(thumb);
            });
            switchSlide(0);
        }

        function switchSlide(idx) {
            State.slides.forEach((_, i) => {
                document.getElementById(`slide-${i}`).setAttribute("visibility", i === idx ? "visible" : "hidden");
                document.getElementById(`thumb-${i}`).classList.toggle('active', i === idx);
            });
            State.current = idx;
        }
    </script>
</body>
</html>
