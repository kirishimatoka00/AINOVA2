<!DOCTYPE html>

<head>

    <title>AI 簡報生成器 · NOVA 120 Pro</title>

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'Noto Sans TC', 'sans-serif'] },
                    colors: { slate: { 925: '#0f172a' } },
                    animation: { 'shimmer': 'shimmer 2s linear infinite', 'fade-in': 'fadeIn 0.4s ease-out' }

    <style>
        :root { background-color: #020617; color-scheme: dark; }

<body class="bg-slate-950 text-slate-100 min-h-screen">

    <div id="mermaid-render-container" style="position:fixed; top:-9999px; left:-9999px; width:1280px; height:720px; visibility:hidden; pointer-events:none;"></div>

    <header class="sticky top-0 z-50 bg-slate-950/90 backdrop-blur-xl border-b border-slate-800/70">
        <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between gap-3">
            <div class="flex items-center gap-3 min-w-0">
                <a href="./index.html" class="flex items-center gap-1.5 text-slate-400 hover:text-white text-sm font-medium">
                    <i class="ph-bold ph-arrow-left"></i><span>返回 NOVA 120</span>
                </a>
                <div class="w-px h-5 bg-slate-700"></div>
                <h1 class="text-sm font-bold text-white truncate">AI 簡報生成器 Pro</h1>
            </div>
            <div class="flex items-center gap-2">
                <div id="header-model-badge" class="hidden sm:flex items-center gap-1.5 text-xs text-slate-400 bg-slate-800 border border-slate-700 px-2.5 py-1 rounded-full">

    <main class="max-w-7xl mx-auto px-4 py-6 flex flex-col lg:flex-row gap-5">
        <aside class="lg:w-80 xl:w-96 flex flex-col gap-4 shrink-0">
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 flex items-center gap-3">

                <div class="flex-1 text-[11px] text-slate-400 truncate">

            <div class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden">
                <button onclick="togglePanel('panel-config')" class="w-full flex items-center justify-between p-4 hover:bg-slate-800/50">
                    <div class="flex items-center gap-2.5">

                </button>
                <div id="panel-config" class="panel-body open">
                    <div class="px-4 pb-4 space-y-4 text-xs">
                        
                        <div>
                            <label class="block text-slate-400 mb-1.5 font-semibold">首選文字模型 (LLM)</label>

                                <option value="gemini-2.5-pro">Gemini 2.5 Pro (穩定高智商)</option>

                        <div>

                        <div>

                            <select id="sel-template" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-2.5 text-slate-200 focus:border-amber-500 outline-none">
                                <option value="modern">現代極簡 (Modern Minimalist)</option>
                                <option value="tech">科技未來 (Tech Future)</option>

                        </div>

                        <div>
                            <label class="block text-slate-400 mb-1.5 font-semibold">投影片背景底色</label>

                                <input type="color" id="slide-bg-color" value="#0F172A" class="h-9 w-12 bg-transparent border-none cursor-pointer">
                                <input type="text" id="slide-bg-hex" value="#0F172A" class="flex-1 bg-slate-950 border border-slate-700 rounded-xl px-3 text-slate-200 outline-none" oninput="document.getElementById('slide-bg-color').value=this.value">
                            </div>
                        </div>

                        <div>
                            <label class="block text-slate-400 mb-1.5 font-semibold">流程圖種類</label>
                            <select id="sel-flowchart-dir" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-2.5 text-slate-200 focus:border-amber-500 outline-none">
                                <option value="TD">由上至下 (Top-Down)</option>
                                <option value="LR">由左至右 (Left-Right)</option>
                                <option value="PIE">環形比例圖 (Pie Chart)</option>

        <div class="flex-1 min-w-0 flex flex-col gap-5">

                <label class="block text-sm font-semibold text-white mb-3"><i class="ph-fill ph-pencil-simple-line text-violet-400"></i> 簡報主題 / 指令</label>
                <textarea id="inp-topic" rows="4" placeholder="請輸入簡報主題..." class="w-full bg-slate-950 border border-slate-700 rounded-xl p-3.5 text-sm text-slate-200 focus:border-violet-500 outline-none transition-colors"></textarea>
            </div>

            <div id="section-progress" class="hidden bg-slate-900 border border-slate-800 rounded-2xl p-5">
                <div class="flex items-center gap-2.5 mb-4">
                    <div id="progress-spinner" class="w-5 h-5 border-2 border-violet-500 border-t-transparent rounded-full animate-spin"></div>
                    <div class="flex-1 bg-slate-800 rounded-full h-1.5"><div id="progress-bar" class="h-1.5 bg-gradient-to-r from-violet-500 to-indigo-500 rounded-full transition-all" style="width: 0%"></div></div>
                    <span id="progress-pct" class="text-xs font-bold text-violet-400">0%</span>
                </div>
                <div id="log-container" class="space-y-1.5 max-h-52 overflow-y-auto text-[11px]"></div>
            </div>

            <div id="section-preview" class="hidden"><div id="slides-preview-list" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div></div>
            
            <div id="section-empty" class="flex-1 flex flex-col items-center justify-center py-20 text-center">
                <div class="w-20 h-20 bg-violet-500/10 rounded-3xl flex items-center justify-center mb-5 border border-violet-500/20">
                    <i class="ph-bold ph-presentation-chart text-violet-400 text-3xl"></i>
                </div>
                <h2 class="text-xl font-bold text-white mb-2">準備好 Pro 等級的簡報了嗎？</h2>
                <p class="text-slate-500 text-sm max-w-sm">左側可精確指定模型、底色與版型風格，輸入主題後即可生成 16:9 專業比例簡報。</p>
            </div>
        </div>

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[200] bg-slate-800 text-white text-sm font-medium px-4 py-2.5 rounded-xl shadow-2xl border border-slate-700 opacity-0 transition-all pointer-events-none translate-y-4"></div>

    <script>
    const AppState = {
        googleApiKey: '', xaiApiKey: '',
        kbDocs: [], logoBase64: null, coverBase64: null,
        pptxObject: null, presentationData: null,
        isGenerating: false,
    };

    const GROK_PROXY   = 'https://grokcaller.kirishimatoka00.workers.dev/';
    const GROK_IMG_API = 'https://api.x.ai/v1/images/generations';

    // 定義視覺風格
    const TEMPLATES = {
        modern: { accent: '64748B', titleColor: 'FFFFFF', textColor: 'E2E8F0', font: 'Arial' },
        tech: { accent: '0EA5E9', titleColor: '38BDF8', textColor: 'BAE6FD', font: 'Courier New' },
        corporate: { accent: '2563EB', titleColor: 'FFFFFF', textColor: 'BFDBFE', font: 'Arial' },
        creative: { accent: 'EC4899', titleColor: 'F9A8D4', textColor: 'FBCFE8', font: 'Verdana' }
    };

    function init() {
        AppState.googleApiKey = localStorage.getItem('nova_key_gemini') || '';
        AppState.xaiApiKey = localStorage.getItem('nova_key_grok') || '';
        document.getElementById('api-gemini-status').textContent = AppState.googleApiKey ? '✓ 已設定' : '❌ 未設定';
        updateHeaderBadge();
        mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose' });
    }

    document.addEventListener('DOMContentLoaded', init);

    function togglePanel(id) {
        document.getElementById(id).classList.toggle('open');
        document.getElementById(id + '-icon').classList.toggle('rotate-180');
    }

    function showToast(m) {
        const t = document.getElementById('toast');
        t.textContent = m; t.classList.remove('opacity-0', 'translate-y-4'); t.classList.add('opacity-100', 'translate-y-0');
        setTimeout(() => { t.classList.add('opacity-0', 'translate-y-4'); t.classList.remove('opacity-100', 'translate-y-0'); }, 2500);
    }

    function updateHeaderBadge() {
        const s = document.getElementById('sel-text-model');
        document.getElementById('header-model-name').textContent = s.options[s.selectedIndex].text;
    }

    function addLog(m, type = 'info') {
        const c = document.getElementById('log-container');
        const i = document.createElement('div');
        const colors = { info: 'text-slate-300', success: 'text-emerald-300', warning: 'text-amber-300', error: 'text-rose-300', ai: 'text-violet-300' };
        i.className = `py-0.5 ${colors[type]}`;
        i.textContent = `[${new Date().toLocaleTimeString()}] ${m}`;
        c.appendChild(i); c.scrollTop = c.scrollHeight;
    }

    /** 1. 修正的模型版本判定 (精確處理 v1alpha 與 v1beta) **/
    function getGeminiApiVersion(modelName) {
        // 含 preview, exp, gemini-3 的模型必須強制走 v1alpha
        if (modelName.includes('preview') || modelName.includes('exp') || modelName.includes('gemini-3')) {
            return 'v1alpha';
        }
        return 'v1beta';
    }

    async function callGeminiForOutline(topic, kb) {
        const apiKey = AppState.googleApiKey;
        const userChoice = document.getElementById('sel-text-model').value;
        const slideCount = document.getElementById('range-slide-count').value;
        const flowDir = document.getElementById('sel-flowchart-dir').value;
        const templateStyle = document.getElementById('sel-template').options[document.getElementById('sel-template').selectedIndex].text;

        // 確保優先使用指定模型，並設置安全的降級順序
        const FALLBACK_MODELS = [
            userChoice,
            'gemini-3.1-pro-preview',
            'gemini-2.5-pro',
            'gemini-3-flash-preview',
            'gemini-2.5-flash'
        ];
        const uniqueModels = [...new Set(FALLBACK_MODELS)];

        // 判斷流程圖語法提示
        let flowchartPrompt = flowDir === 'PIE' 
            ? "mermaid_code 必須使用 pie chart 語法，例如: pie title 分布圖 \\n \"A\" : 40 \\n \"B\" : 60"
            : `mermaid_code 必須以 graph ${flowDir} 開頭進行繪製。`;

        const systemPrompt = `你是一位世界級簡報設計師。
請以 16:9 寬螢幕佈局思維生成簡報 JSON。
簡報視覺與文案風格：${templateStyle}
流程圖要求：${flowchartPrompt}

重要規則：
1. 嚴格輸出純 JSON，不可包含 markdown 標籤（不要有 \`\`\`json）。
2. layout 只能是: "title_only", "text_only", "text_and_image", "flowchart_only"。
3. flowchart_only 必須包含 mermaid_code。
4. 針對 16:9 寬螢幕設計內容，bullet_points 應精簡但具備橫向擴展潛力，每點不超過 25 字。
5. image_prompt 必須是簡短的英文敘述（AI 繪圖提示詞），不可為空。

JSON Schema:
{
  "presentation_title": "標題",
  "slides": [
    { "slide_number": 1, "layout": "title_only", "title": "...", "subtitle": "...", "bullet_points": [], "image_prompt": "English prompt", "mermaid_code": null }
  ]
}`;
        let lastErr = null;
        for (const modelId of uniqueModels) {
            const ver = getGeminiApiVersion(modelId);
            const endpoint = `https://generativelanguage.googleapis.com/${ver}/models/${modelId}:generateContent?key=${apiKey}`;
            try {
                addLog(`嘗試呼叫文字引擎 ${modelId} (${ver})...`, 'ai');
                const resp = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: 'user', parts: [{ text: systemPrompt + "\n\n主題：" + topic + (kb ? "\n知識庫：" + kb : "") }] }],
                        generationConfig: { responseMimeType: 'application/json', temperature: 0.7 }
                    })
                });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();
                const raw = data.candidates[0].content.parts[0].text;
                addLog(`✓ 成功使用 ${modelId} 生成大綱`, 'success');
                return JSON.parse(raw.replace(/```json/g, '').replace(/```/g, '').trim());
            } catch (e) {
                lastErr = e;
                addLog(`⚠ ${modelId} 失敗: ${e.message}，準備降級切換...`, 'warning');
            }
        }
        throw new Error(`所有文字引擎皆失敗。最後錯誤: ${lastErr.message}`);
    }

    /** 2. 獨立的生圖處理邏輯 (結合使用者指定與降級) **/
    async function buildImagePrompt(query) {
        const gKey = AppState.googleApiKey;
        if (!gKey) return `Professional modern presentation illustration: ${query}`;
        try {
            const r = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${gKey}`,
                {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: 'user', parts: [{ text: `Create a concise English image generation prompt (max 40 words) for a presentation slide about: "${query}". Minimalist, professional business illustration style.` }] }],
                        generationConfig: { maxOutputTokens: 100, temperature: 0.5 }
                    })
                }
            );
            return (await r.json()).candidates?.[0]?.content?.parts?.[0]?.text?.trim() || `Professional illustration: ${query}`;
        } catch { return `Professional business illustration: ${query}`; }
    }

    async function generateImage(imagePrompt, slideNum) {
        addLog(`為第 ${slideNum} 頁優化繪圖提示詞...`, 'info');
        const finalPrompt = await buildImagePrompt(imagePrompt);
        
        const preferredModel = document.getElementById('sel-img-model').value;
        const fallbackQueue = [
            preferredModel,
            'grok-imagine-image-pro',
            'grok-imagine-image',
            'gemini-3.1-flash-image-preview',
            'gemini-2.5-flash-image'
        ];
        const uniqueModels = [...new Set(fallbackQueue)];

        for (const model of uniqueModels) {
            try {
                addLog(`🎨 嘗試呼叫配圖引擎 ${model}...`, 'ai');
                if (model.startsWith('grok')) {
                    if (!AppState.xaiApiKey) {
                        addLog(`⚠ 缺少 Grok Key，跳過 ${model}`, 'warning');
                        continue;
                    }
                    const r = await fetch(`${GROK_PROXY}?url=${encodeURIComponent(GROK_IMG_API)}`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${AppState.xaiApiKey}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ model: model, prompt: finalPrompt, response_format: 'b64_json' })
                    });
                    if (r.ok) {
                        const item = (await r.json()).data?.[0];
                        if (item && item.b64_json) {
                            addLog(`✓ 成功使用 ${model} 生成配圖`, 'success');
                            return `data:image/png;base64,${item.b64_json}`;
                        }
                    }
                } else if (model.startsWith('gemini')) {
                    if (!AppState.googleApiKey) continue;
                    const ver = model.includes('preview') ? 'v1alpha' : 'v1beta';
                    const r = await fetch(`https://generativelanguage.googleapis.com/${ver}/models/${model}:generateContent?key=${AppState.googleApiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: finalPrompt }] }], generationConfig: { responseModalities: ['TEXT', 'IMAGE'] } })
                    });
                    if (r.ok) {
                        const imgPart = (await r.json()).candidates?.[0]?.content?.parts?.find(p => p.inlineData?.mimeType?.startsWith('image/'));
                        if (imgPart?.inlineData?.data) {
                            addLog(`✓ 成功使用 ${model} 生成配圖`, 'success');
                            return `data:${imgPart.inlineData.mimeType};base64,${imgPart.inlineData.data}`;
                        }
                    }
                }
            } catch (e) {
                addLog(`⚠ ${model} 失敗: ${e.message}`, 'warning');
            }
        }
        addLog(`⚠ 所有配圖引擎失敗，將保留空白框架`, 'error');
        return null;
    }

    /** 16:9 座標系統 (單位：英吋，標準為 10 x 5.625) 結合自訂 Template **/
    function renderTextOnly(slide, slideData, themeConfig) {
        slide.addText(slideData.title || '', { x: 0.5, y: 0.4, w: 9.0, h: 0.8, fontSize: 32, bold: true, color: themeConfig.titleColor, fontFace: themeConfig.font });
        slide.addShape('rect', { x: 0.5, y: 1.2, w: 1.5, h: 0.05, fill: { color: themeConfig.accent } });
        
        if (slideData.bullet_points) {
            slide.addText(slideData.bullet_points.map(b => ({ text: b, options: { bullet: true, paraSpaceAfter: 10 } })), {
                x: 0.5, y: 1.6, w: 9.0, h: 3.5, fontSize: 18, color: themeConfig.textColor, valign: 'top', fontFace: themeConfig.font
            });
        }
    }

    function renderTextAndImage(slide, slideData, imgB64, themeConfig) {
        slide.addText(slideData.title || '', { x: 0.5, y: 0.4, w: 9.0, h: 0.8, fontSize: 28, bold: true, color: themeConfig.titleColor, fontFace: themeConfig.font });
        slide.addShape('rect', { x: 0.5, y: 1.15, w: 1.0, h: 0.04, fill: { color: themeConfig.accent } });
        
        // 左側文字 (佔 55%)
        slide.addText(slideData.bullet_points.map(b => ({ text: b, options: { bullet: true, paraSpaceAfter: 8 } })), {
            x: 0.5, y: 1.4, w: 5.0, h: 3.5, fontSize: 16, color: themeConfig.textColor, valign: 'top', fontFace: themeConfig.font
        });

        // 右側圖片 (佔 40%)
        if (imgB64) {
            slide.addImage({ data: imgB64, x: 5.8, y: 1.1, w: 3.7, h: 3.8, rounding: true });
        } else {
            slide.addShape('rect', { x: 5.8, y: 1.1, w: 3.7, h: 3.8, fill: { color: themeConfig.accent, transparency: 80 } });
        }
    }

    function renderFlowchart(slide, slideData, chartB64, themeConfig) {
        slide.addText(slideData.title || '', { x: 0.5, y: 0.3, w: 9.0, h: 0.6, fontSize: 24, bold: true, color: themeConfig.titleColor, align: 'center', fontFace: themeConfig.font });
        if (chartB64) {
            slide.addImage({ data: chartB64, x: 0.5, y: 1.0, w: 9.0, h: 4.2 });
        }
    }

    /** 核心組裝流程 **/
    async function startGeneration() {
        if (!AppState.googleApiKey) { showToast('❌ 請設定 Gemini API Key'); return; }
        const topic = document.getElementById('inp-topic').value.trim();
        if (!topic) { showToast('❌ 請輸入主題'); return; }

        AppState.isGenerating = true;
        document.getElementById('section-empty').classList.add('hidden');
        document.getElementById('section-progress').classList.remove('hidden');
        document.getElementById('section-preview').classList.add('hidden');
        document.getElementById('log-container').innerHTML = '';
        document.getElementById('progress-bar').style.width = '5%';
        document.getElementById('btn-download').classList.add('hidden');

        try {
            // 1. 生成大綱
            const data = await callGeminiForOutline(topic, "");
            AppState.presentationData = data;
            document.getElementById('progress-bar').style.width = '20%';
            
            // 取得 Template 與底色設定
            const selectedTemplateKey = document.getElementById('sel-template').value;
            const themeConfig = TEMPLATES[selectedTemplateKey];
            const userBg = document.getElementById('slide-bg-hex').value.replace('#', '');

            const pres = new PptxGenJS();
            pres.layout = 'LAYOUT_WIDE'; // 16:9 寬螢幕

            // 寫入 Master Slide
            pres.defineSlideMaster({
                title: 'MASTER_PRO',
                background: { color: userBg },
                objects: [
                    { text: { text: "NOVA 120 Pro", options: { x: 8.5, y: 5.3, w: 1.5, color: themeConfig.accent, fontSize: 10, align: 'right' } } }
                ]
            });

            const slides = data.slides || [];
            
            // 2. 逐頁生成素材與組裝
            for (let i = 0; i < slides.length; i++) {
                const sData = slides[i];
                addLog(`正在製作第 ${sData.slide_number} 頁: ${sData.title || '封面'}`, 'info');
                const slide = pres.addSlide({ masterName: 'MASTER_PRO' });

                if (sData.layout === 'title_only') {
                    // 封面特製
                    slide.addShape('rect', { x: 0, y: 0, w: 0.5, h: '100%', fill: { color: themeConfig.accent } });
                    slide.addText(sData.title || '未命名', { x: 0.8, y: 1.5, w: 8.5, h: 1.5, fontSize: 44, bold: true, color: themeConfig.titleColor, fontFace: themeConfig.font });
                    if(sData.subtitle) slide.addText(sData.subtitle, { x: 0.8, y: 3.2, w: 8.0, h: 1.0, fontSize: 24, color: themeConfig.textColor, fontFace: themeConfig.font });
                
                } else if (sData.layout === 'flowchart_only' && sData.mermaid_code) {
                    const b64 = await mermaidToBase64(sData.mermaid_code, userBg);
                    renderFlowchart(slide, sData, b64, themeConfig);
                
                } else if (sData.layout === 'text_and_image') {
                    // 觸發 AI 配圖
                    const imgB64 = await generateImage(sData.image_prompt, sData.slide_number);
                    renderTextAndImage(slide, sData, imgB64, themeConfig);
                
                } else {
                    renderTextOnly(slide, sData, themeConfig);
                }

                document.getElementById('progress-bar').style.width = `${20 + ((i+1)/slides.length)*75}%`;
            }

            AppState.pptxObject = pres;
            addLog('PPTX 組裝完成！', 'success');
            document.getElementById('progress-bar').style.width = '100%';
            document.getElementById('btn-download').classList.remove('hidden');
            document.getElementById('btn-download').classList.add('flex');
            showToast('✅ 簡報已就緒');
            renderSlidesPreview(data);

        } catch (e) {
            addLog(e.message, 'error');
            console.error(e);
            showToast('❌ 生成發生錯誤');
        } finally {
            AppState.isGenerating = false;
        }
    }

    async function mermaidToBase64(code, bgColorHex) {
        const container = document.getElementById('mermaid-render-container');
        try {
            const { svg } = await mermaid.render('mmr-' + Date.now(), code, container);
            const canvas = document.createElement('canvas');
            canvas.width = 1920; canvas.height = 1080; 
            const ctx = canvas.getContext('2d');
            const img = new Image();
            const svgBlob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(svgBlob);
            return new Promise(res => {
                img.onload = () => {
                    ctx.fillStyle = '#' + bgColorHex;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    // 留一點邊距，等比繪製
                    const scale = Math.min((canvas.width * 0.9) / img.width, (canvas.height * 0.9) / img.height);
                    const dw = img.width * scale;
                    const dh = img.height * scale;
                    ctx.drawImage(img, (canvas.width - dw) / 2, (canvas.height - dh) / 2, dw, dh);
                    URL.revokeObjectURL(url);
                    res(canvas.toDataURL('image/png'));
                };
                img.src = url;
            });
        } catch (e) { return null; }
    }

    function renderSlidesPreview(data) {
        const list = document.getElementById('slides-preview-list');
        list.innerHTML = '';
        data.slides.forEach(s => {
            const div = document.createElement('div');
            div.className = 'bg-slate-900 border border-slate-800 p-4 rounded-xl';
            div.innerHTML = `<div class="flex justify-between mb-2"><span class="text-xs font-bold text-violet-400">PAGE ${s.slide_number}</span><span class="layout-badge layout-${s.layout}">${s.layout}</span></div><h4 class="text-sm font-semibold text-slate-200">${s.title}</h4>`;
            list.appendChild(div);
        });
        document.getElementById('section-preview').classList.remove('hidden');
    }

    async function downloadPptx() {
        if (!AppState.pptxObject) return;
        const name = (AppState.presentationData?.presentation_title || 'NOVA_Pro_Slide').replace(/\s/g, '_') + '.pptx';
        await AppState.pptxObject.writeFile({ fileName: name });
    }
    </script>
