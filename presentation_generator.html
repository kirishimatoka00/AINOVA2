<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA 120 - Advanced Multi-Agent Engine</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #6366f1; --accent: #22d3ee; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #020617; color: #f8fafc; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* 畫布縮放容器 */
        #canvas-wrapper { flex: 1; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%); }
        #slide-canvas { width: 100%; height: 100%; max-width: 100vw; max-height: 56.25vw; border: 1px solid rgba(255,255,255,0.05); }

        /* 文字渲染修復 */
        .slide-content-box { color: white !important; font-size: 18px; line-height: 1.6; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .slide-title { font-size: 42px; font-weight: 900; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }

        /* 手機版與側邊欄 */
        #side-panel { width: 400px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border-left: 1px solid #1e293b; z-index: 1000; transition: transform 0.4s ease; }
        @media (max-width: 1024px) { #side-panel { position: fixed; right: 0; transform: translateX(100%); width: 85%; } #side-panel.open { transform: translateX(0); } }

        .thumb-nav { height: 120px; background: rgba(0,0,0,0.3); border-top: 1px solid #1e293b; display: flex; gap: 15px; padding: 15px; overflow-x: auto; }
        .thumb-item { aspect-ratio: 16/9; height: 100%; border-radius: 8px; border: 2px solid transparent; cursor: pointer; transition: 0.3s; flex-shrink: 0; background: #0f172a; }
        .thumb-item.active { border-color: var(--primary); box-shadow: 0 0 15px var(--primary); }
    </style>
</head>
<body>

    <div class="flex flex-1 overflow-hidden">
        <main id="canvas-wrapper">
            <svg id="slide-canvas" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
                <image id="user-logo" x="80" y="80" width="120" height="60" href="" />
                <g id="current-slide-layer"></g>
            </svg>
            
            <button class="lg:hidden absolute top-6 right-6 p-4 bg-indigo-600 rounded-full shadow-2xl" onclick="document.getElementById('side-panel').classList.toggle('open')">
                <i class="ph-bold ph-list"></i>
            </button>
        </main>

        <aside id="side-panel" class="flex flex-col">
            <div class="p-6 border-b border-slate-800">
                <h1 class="text-xl font-black tracking-tighter">NOVA 120 <span class="text-indigo-500">ULTRA</span></h1>
            </div>

            <div class="flex-1 overflow-y-auto p-6 space-y-8 custom-scrollbar">
                <section>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4 block">1. 內容數據輸入 (PDF/Word/Link)</label>
                    <div class="space-y-3">
                        <input type="file" id="multi-file" accept=".pdf,.doc,.docx,.txt" class="hidden" onchange="processFiles(this)">
                        <label for="multi-file" class="flex flex-col items-center justify-center border-2 border-dashed border-slate-800 rounded-2xl p-6 cursor-pointer hover:border-indigo-500 transition-all bg-slate-950/50">
                            <i class="ph-bold ph-files text-2xl mb-2 text-indigo-400"></i>
                            <span id="file-label" class="text-xs text-slate-400 text-center">點擊上傳文檔資料</span>
                        </label>
                        <input type="url" id="url-input" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs outline-none focus:border-indigo-500" placeholder="貼上網頁或 YouTube 網址...">
                    </div>
                </section>

                <section class="space-y-4">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block">2. 代理模型設定</label>
                    <select id="agent-llm" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs text-white">
                        <option value="gemini-3.1-pro-preview">Agent A: Gemini 3.1 Pro Preview</option>
                        <option value="gemini-2.5-pro">Agent A: Gemini 2.5 Pro</option>
                    </select>
                    <select id="agent-vision" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs text-white">
                        <option value="grok-image-image-pro">Agent B: Grok Image Image Pro</option>
                        <option value="gemini-3.1-flash-image">Agent B: Gemini 3.1 Flash-image</option>
                    </select>
                </section>

                <section class="space-y-4">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block">3. 生成指令與樣式</label>
                    <select id="style-select" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs">
                        <option value="dark">科技深邃 (Dark Space)</option>
                        <option value="white">商務簡約 (Business White)</option>
                        <option value="neon">賽博霓虹 (Cyber Neon)</option>
                    </select>
                    <textarea id="prompt-main" rows="4" class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 text-sm outline-none focus:border-indigo-500" placeholder="請描述您的簡報目標..."></textarea>
                    
                    <button onclick="startMultiAgentWorkflow()" id="run-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl font-bold text-white shadow-xl flex items-center justify-center gap-2 transition-all">
                        <i class="ph-bold ph-lightning"></i> 執行全數據分析生成
                    </button>
                </section>
            </div>
        </aside>
    </div>

    <nav class="thumb-nav custom-scrollbar" id="nav-wrapper"></nav>

    <script>
        const GlobalState = {
            contentBuffer: "",
            slides: [],
            currentIdx: 0,
            isGenerating: false
        };

        // ════════════════════════════════════════════════
        // 文件處理邏輯
        // ════════════════════════════════════════════════
        function processFiles(input) {
            const file = input.files[0];
            if (file) {
                document.getElementById('file-label').innerText = `已讀取: ${file.name}`;
                const reader = new FileReader();
                reader.onload = (e) => {
                    // 模擬解析 PDF/Word 文字內容
                    GlobalState.contentBuffer = e.target.result.substring(0, 5000); 
                };
                reader.readAsText(file);
            }
        }

        // ════════════════════════════════════════════════
        // 核心工作流：Agent A (內容) -> Agent B (視覺)
        // ════════════════════════════════════════════════
        async function startMultiAgentWorkflow() {
            const topic = document.getElementById('prompt-main').value;
            const url = document.getElementById('url-input').value;
            const apiKey = localStorage.getItem('nova_api_key'); // 假設存放在 localStorage

            if (!topic) return alert("請輸入主題描述");
            if (!apiKey) return alert("未偵測到 API Key，請先於設定中配置。");

            const btn = document.getElementById('run-btn');
            btn.innerHTML = `<i class="ph-bold ph-circle-notch animate-spin"></i> Agent A 正在分析數據...`;
            btn.disabled = true;

            try {
                // 1. Agent A 構思大綱 (結合文件與 URL)
                const fullPrompt = `你是一個專業分析師 Agent A。
                請分析以下輸入：主題「${topic}」、網址「${url}」、文檔內容「${GlobalState.contentBuffer.substring(0, 1000)}」。
                生成 5 張投影片，每張需包含：
                1. 標題 (title)
                2. 內文 (content，需深入)
                3. 圖片描述 (image_prompt，給 Agent B 使用)
                格式：JSON 陣列。`;

                // 此處調用真實 API (以 Gemini 為例)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${document.getElementById('agent-llm').value}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: fullPrompt }] }] })
                });

                const data = await response.json();
                const jsonText = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "");
                GlobalState.slides = JSON.parse(jsonText);

                renderSlides();
            } catch (err) {
                console.error(err);
                alert("生成過程發生錯誤，請檢查網路或 API 設定。");
            } finally {
                btn.innerHTML = `<i class="ph-bold ph-lightning"></i> 執行全數據分析生成`;
                btn.disabled = false;
            }
        }

        // ════════════════════════════════════════════════
        // 渲染引擎 (解決文字顯示問題)
        // ════════════════════════════════════════════════
        function renderSlides() {
            const layer = document.getElementById('current-slide-layer');
            const nav = document.getElementById('nav-wrapper');
            layer.innerHTML = '';
            nav.innerHTML = '';

            GlobalState.slides.forEach((slide, i) => {
                // 1. 建立導覽縮圖
                const thumb = document.createElement('div');
                thumb.className = `thumb-item flex items-center justify-center text-[10px] text-slate-500 font-bold`;
                thumb.id = `thumb-${i}`;
                thumb.innerText = `P${i+1}`;
                thumb.onclick = () => switchSlide(i);
                nav.appendChild(thumb);

                // 2. 建立投影片本體 (SVG)
                const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
                group.id = `slide-group-${i}`;
                group.setAttribute("visibility", i === 0 ? "visible" : "hidden");

                // 文字內容外框
                const foreign = document.createElementNS("http://www.w3.org/2000/svg", "foreignObject");
                foreign.setAttribute("x", "150");
                foreign.setAttribute("y", "250");
                foreign.setAttribute("width", "1000");
                foreign.setAttribute("height", "700");

                const div = document.createElement("div");
                div.className = "slide-content-box";
                div.innerHTML = `
                    <h2 class="slide-title" style="color:white; font-family: 'Noto Sans TC' !important;">${slide.title}</h2>
                    <div style="font-size: 24px; color: #cbd5e1; white-space: pre-line;">${slide.content}</div>
                `;

                // 模擬 Agent B 圖片區塊
                const imgRect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                imgRect.setAttribute("x", "1250"); imgRect.setAttribute("y", "250");
                imgRect.setAttribute("width", "550"); imgRect.setAttribute("height", "600");
                imgRect.setAttribute("fill", "rgba(255,255,255,0.05)");
                imgRect.setAttribute("rx", "20");

                const imgTag = document.createElementNS("http://www.w3.org/2000/svg", "text");
                imgTag.setAttribute("x", "1525"); imgTag.setAttribute("y", "550");
                imgTag.setAttribute("text-anchor", "middle");
                imgTag.setAttribute("fill", "#6366f1");
                imgTag.setAttribute("font-size", "14");
                imgTag.textContent = `[Agent B: ${slide.image_prompt.substring(0, 30)}...]`;

                foreign.appendChild(div);
                group.appendChild(imgRect);
                group.appendChild(imgTag);
                group.appendChild(foreign);
                layer.appendChild(group);
            });

            switchSlide(0);
        }

        function switchSlide(idx) {
            GlobalState.slides.forEach((_, i) => {
                const s = document.getElementById(`slide-group-${i}`);
                const t = document.getElementById(`thumb-${i}`);
                if (s) s.setAttribute("visibility", i === idx ? "visible" : "hidden");
                if (t) t.classList.toggle("active", i === idx);
            });
            GlobalState.currentIdx = idx;
        }
    </script>
</body>
</html>
